                                        </select>
                                    </div>
                                    <button className="w-full px-4 py-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-medium">Сохранить</button>
                                </div>
                            )}

                            {showModal === 'addTask' && (
                                <div className="space-y-4">
                                    <select className="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none">
                                        {employees.filter(e => e.status !== 'offline').map(e => <option key={e.id}>{e.name}</option>)}
                                    </select>
                                    <div className="grid grid-cols-2 gap-4">
                                        <input type="number" placeholder="Единиц" className="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" />
                                        <input type="number" placeholder="Время (мин)" className="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-blue-500 outline-none" />
                                    </div>
                                    <button className="w-full px-4 py-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 font-medium">Создать</button>
                                </div>
                            )}

                            {showModal === 'employeeDetail' && selectedEmployee && (
                                <div>
                                    <div className="flex items-center gap-4 mb-6 p-4 bg-gray-50 rounded-xl">
                                        <div className="w-16 h-16 rounded-xl bg-gray-200 flex items-center justify-center text-3xl">👤</div>
                                        <div>
                                            <h4 className="text-lg font-bold text-gray-800">{selectedEmployee.name}</h4>
                                            <p className="text-sm text-gray-500">{selectedEmployee.position} • {selectedEmployee.department}</p>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3 mb-6">
                                        <div className="p-3 bg-blue-50 rounded-xl text-center"><p className="text-xs text-blue-500">Ставка</p><p className="text-lg font-bold text-blue-700">{formatCurrency(selectedEmployee.hourlyRate)}/ч</p></div>
                                        <div className="p-3 bg-green-50 rounded-xl text-center"><p className="text-xs text-green-500">Статус</p><p className="text-lg font-bold text-green-700">{getStatusLabel(selectedEmployee.status)}</p></div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-gray-50">
                    {renderSidebar()}
                    <div className={`transition-all duration-300 ${sidebarCollapsed ? 'ml-20' : 'ml-64'}`}>
                        {renderHeader()}
                        <main className="p-6">
                            {activeTab === 'dashboard' && renderDashboard()}
                            {activeTab === 'employees' && renderEmployees()}
                            {activeTab === 'shifts' && renderShifts()}
                            {activeTab === 'tasks' && renderTasks()}
                            {activeTab === 'reports' && renderReports()}
                            {activeTab === 'payroll' && renderPayroll()}
                            {activeTab === 'settings' && renderSettings()}
                        </main>
                    </div>
                    {renderModal()}
                    
                    {selectedEmployee && showModal !== 'employeeDetail' && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onClick={() => setSelectedEmployee(null)}>
                            <div className="bg-white rounded-2xl p-6 max-w-lg w-full" onClick={(e) => e.stopPropagation()}>
                                <div className="flex items-center justify-between mb-4">
                                    <h3 className="text-xl font-bold">Профиль</h3>
                                    <button onClick={() => setSelectedEmployee(null)}><Icon name="x" size={24} className="text-gray-400" /></button>
                                </div>
                                <div className="flex items-center gap-4 mb-4">
                                    <div className="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center text-2xl">👤</div>
                                    <div>
                                        <h4 className="font-bold">{selectedEmployee.name}</h4>
                                        <p className="text-sm text-gray-500">{selectedEmployee.position}</p>
                                    </div>
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={() => { setShowModal('employeeDetail'); }} className="flex-1 py-2 bg-blue-600 text-white rounded-lg">Полный отчет</button>
                                    <button className="px-4 py-2 bg-red-50 text-red-600 rounded-lg"><Icon name="trash" size={16} /></button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
