<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
* { font-family: 'Inter', sans-serif; box-sizing: border-box; }
::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
.splash-screen { animation: splashFade 1.5s ease-in-out forwards; }
@keyframes splashFade { 0%{opacity:1} 80%{opacity:1} 100%{opacity:0;visibility:hidden} }
@keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
.animate-slideUp { animation: slideUp 0.5s ease-out; } .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes spin-slow { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} } .animate-spin-slow { animation: spin-slow 2s linear infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} } .animate-float { animation: float 3s ease-in-out infinite; }
@keyframes scanLine { 0%{top:0} 50%{top:calc(100% - 2px)} 100%{top:0} }
@keyframes voiceWave { 0%,100%{transform:scaleY(0.5)} 50%{transform:scaleY(1.2)} }
.glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
.dark .glass { background: rgba(15,23,42,0.8); border: 1px solid rgba(255,255,255,0.08); }
.card-hover { transition: all 0.3s ease; } .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
.sidebar-link { transition: all 0.2s ease; } .sidebar-link:hover, .sidebar-link.active { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
.status-badge { padding: 2px 8px; border-radius: 9999px; font-size: 0.7rem; font-weight: 600; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 100; display: flex; align-items: center; justify-content: center; }
.modal-content { background: #1e293b; border-radius: 16px; max-height: 90vh; overflow-y: auto; width: 90%; max-width: 700px; }
.scanner-frame { position: relative; border: 2px solid rgba(34,197,94,0.3); border-radius: 12px; overflow: hidden; }
.scanner-frame::before, .scanner-frame::after, .scanner-frame .bl, .scanner-frame .br { content: ''; position: absolute; width: 30px; height: 30px; border-color: #22c55e; border-style: solid; z-index: 10; }
.scanner-frame::before { top:0; left:0; border-width:3px 0 0 3px; } .scanner-frame::after { top:0; right:0; border-width:3px 3px 0 0; }
.scanner-frame .bl { bottom:0; left:0; border-width:0 0 3px 3px; } .scanner-frame .br { bottom:0; right:0; border-width:0 3px 3px 0; }
.scan-line { position: absolute; left: 10%; right: 10%; height: 2px; background: linear-gradient(90deg, transparent, #22c55e, transparent); animation: scanLine 2s ease-in-out infinite; }
.voice-wave { display: flex; align-items: center; gap: 2px; height: 20px; } .voice-wave span { display: block; width: 3px; background: #22c55e; border-radius: 2px; animation: voiceWave 0.8s ease-in-out infinite; }
.voice-wave span:nth-child(1){animation-delay:0s;height:8px} .voice-wave span:nth-child(2){animation-delay:0.1s;height:14px}
.voice-wave span:nth-child(3){animation-delay:0.2s;height:18px} .voice-wave span:nth-child(4){animation-delay:0.3s;height:12px}
.voice-wave span:nth-child(5){animation-delay:0.4s;height:6px}
.label-sheet { width: 100%; padding: 6px; background: white; color: #000; font-size: 7pt; font-family: Arial, sans-serif; display: flex; flex-direction: column; }
.label-sheet .lbl-header { font-weight: 900; text-align: center; border-bottom: 1.5px solid #000; padding-bottom: 1px; margin-bottom: 2px; }
.label-sheet .lbl-barcode-area { text-align: center; margin: 2px 0; } .label-sheet svg { width: 100%; height: 25px; }
#wbPrintArea { position: absolute; left: 0; top: 0; width: 0; height: 0; overflow: hidden; }
@media print {
  @page { margin: 0; size: 58mm 40mm; }
  body { background: #fff !important; color: #000 !important; }
  .no-print, header, aside, main, .toast-container, #modalContainer, #splashScreen, #loginScreen, #voicePanel { display: none !important; }
  #wbPrintArea { position: static !important; width: 100% !important; height: auto !important; overflow: visible !important; visibility: visible !important; }
  .label-sheet { width: 58mm !important; height: 40mm !important; page-break-after: always !important; border: none !important; padding: 2mm !important; visibility: visible !important; }
  .label-sheet * { visibility: visible !important; color: #000 !important; }
}
.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 18px; border-radius: 10px; font-size: 0.85rem; font-weight: 500; color: white; box-shadow: 0 8px 30px rgba(0,0,0,0.3); animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards; max-width: 340px; }
.toast.success { background: #22c55e; } .toast.error { background: #ef4444; } .toast.info { background: #3b82f6; } .toast.warning { background: #f59e0b; }
@keyframes toastIn { from{opacity:0;transform:translateX(30px)} to{opacity:1;transform:translateX(0)} }
@keyframes toastOut { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(30px)} }
.hidden { display: none !important; }
</style>
</head>

  </section>

<div id="modalContainer"></div>
<div id="wbPrintArea"></div>
<div class="toast-container" id="toastContainer"></div>

<script>
// ==================== SAFE INIT & DATA ====================
const DB_KEY = 'fp_uni_v2';
const getDefault = () => ({ products:[], receiving:[], shippingWB:{ excelData:[], mapping:{}, boxes:{1:{items:[]}}, currentBox:1, printedSet:[], printCopies:{} }, users:[{u:'admin',p:'admin123'}] });
let db;
try { db = JSON.parse(localStorage.getItem(DB_KEY)) || getDefault(); } catch(e) { db = getDefault(); }
function saveDB() { localStorage.setItem(DB_KEY, JSON.stringify(db)); }

// ==================== UTILS ====================
function showToast(msg, type='success') {
  const c = document.getElementById('toastContainer'), t = document.createElement('div');
  t.className = `toast ${type}`; t.textContent = msg; c.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}
function toggleTheme() { document.documentElement.classList.toggle('dark'); }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
function updateClock() { document.getElementById('headerTime').textContent = new Date().toLocaleTimeString(); }
setInterval(updateClock, 1000);

// ==================== NAVIGATION ====================
let currentPage = 'dashboard';
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.page-content').forEach(p=>p.classList.add('hidden'));
  document.getElementById('page-'+page).classList.remove('hidden');
  document.querySelectorAll('.sidebar-link').forEach(l=>l.classList.remove('active'));
  document.querySelector(`[data-nav="${page}"]`)?.classList.add('active');
  document.getElementById('pageTitle').textContent = {dashboard:'Дашборд',warehouse:'Склад',receiving:'Приёмка',shippingWB:'Отгрузка МП',settings:'Настройки'}[page]||page;
  if(page==='dashboard') renderDashboard();
  if(page==='warehouse') renderProducts();
  if(page==='shippingWB') { WBShipping.init(); setupWBTabs(); }
  if(window.innerWidth<1024) document.getElementById('sidebar').classList.add('-translate-x-full');
}

// ==================== MODALS ====================
function openModal(type) {
  const c = document.getElementById('modalContainer');
  let h = '';
  if(type === 'addProduct') {
    h = `<div class="modal-overlay" onclick="closeModal()"><div class="modal-content animate-slideUp p-6" onclick="event.stopPropagation()">
      <h3 class="text-lg font-bold mb-4">Новый товар</h3>
      <form onsubmit="saveProduct(event)" class="space-y-3">
        <input name="sku" required placeholder="Артикул" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2">
        <input name="name" required placeholder="Название" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2">
        <input name="barcode" placeholder="Штрихкод" value="200${Math.floor(Math.random()*9e7)}" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2">
        <input name="qty" type="number" required placeholder="Кол-во" class="w-full bg-slate-800 border border-slate-700 rounded px-3 py-2">
        <div class="flex gap-2"><button class="flex-1 bg-primary-600 py-2 rounded">Сохранить</button><button type="button" onclick="closeModal()" class="flex-1 bg-slate-700 py-2 rounded">Отмена</button></div>
      </form></div></div>`;
  }
  c.innerHTML = h;
}
function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }

// ==================== CRUD ====================
function saveProduct(e) {
  e.preventDefault(); const f=e.target;
  db.products.push({id:Date.now(), sku:f.sku.value, name:f.name.value, barcode:f.barcode.value, qty:parseInt(f.qty.value)||0});
  saveDB(); closeModal(); renderProducts(); showToast('Сохранено');
}
function renderProducts() {
  document.getElementById('productsTableBody').innerHTML = db.products.map(p=>`<tr class="border-b border-slate-800"><td class="px-4 py-3 font-mono">${p.sku}</td><td class="px-4 py-3">${p.name}</td><td class="px-4 py-3 font-bold">${p.qty}</td></tr>`).join('') || '<tr><td colspan="3" class="px-4 py-8 text-center text-slate-500">Нет товаров</td></tr>';
}
function renderDashboard() {
  document.getElementById('dashProducts').textContent = db.products.reduce((s,p)=>s+p.qty,0);
  document.getElementById('dashReceiving').textContent = db.receiving.length;
}

// ==================== RECEIVING ====================
let currentReceiving = null;
function startNewReceiving() { currentReceiving={items:[]}; document.getElementById('tsdReceivingInput').focus(); showToast('Режим приёмки активен'); }
function handleReceivingScan(e) {
  if(e.key!=='Enter') return;
  const bc = e.target.value.trim(); e.target.value='';
  if(!currentReceiving) { showToast('Сначала нажмите "Новая приёмка"','warning'); return; }
  const p = db.products.find(x=>x.barcode===bc || x.sku===bc);
  if(!p) { showToast('Товар не найден!','error'); return; }
  currentReceiving.items.push({...p, scanned: (currentReceiving.items.find(i=>i.barcode===bc)?.scanned||0)+1});
  renderReceivingList(); showToast(`✅ ${p.name} добавлен`);
}
function renderReceivingList() {
  const grouped = {}; currentReceiving.items.forEach(i=>grouped[i.barcode]=(grouped[i.barcode]||0)+1);
  document.getElementById('receivingItemsList').innerHTML = Object.entries(grouped).map(([bc,cnt])=>{
    const p=currentReceiving.items.find(x=>x.barcode===bc); return `<div class="flex justify-between p-2 bg-slate-800 rounded"><span>${p.name}</span><span class="font-bold text-primary-400">${cnt}</span></div>`;
  }).join('') || '<p class="text-slate-500 text-center">Пусто</p>';
}

// ==================== WB SHIPPING ====================
const WBShipping = {
  init() { this.renderLabels(); this.updateScannerUI(); },
  async handleFileUpload(e) {
    const file = e.target.files[0]; if(!file) return;
    const r = new FileReader(); r.onload = ev => {
      try {
        const wb = XLSX.read(ev.target.result, {type:'array'});
        db.shippingWB.excelData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:''});
        // Auto mapping (basic)
        const h = Object.keys(db.shippingWB.excelData[0]||{});
        db.shippingWB.mapping = { wb_article:h[0]||'Артикул', label_barcode:h[1]||'ШК', product_name:h[2]||'Название', total_quantity:h[3]||'Кол-во' };
        db.shippingWB.printCopies = db.shippingWB.excelData.map((_,i)=>parseInt(db.shippingWB.excelData[i][db.shippingWB.mapping.total_quantity])||1);
        saveDB(); this.renderLabels(); showToast(`✅ Загружено ${db.shippingWB.excelData.length} строк`);
      } catch(err) { showToast('Ошибка файла: '+err.message, 'error'); }
    }; r.readAsArrayBuffer(file); e.target.value='';
  },
  renderLabels() {
    const grid = document.getElementById('wbLabelGrid'); if(!grid) return;
    grid.innerHTML = db.shippingWB.excelData.map((item, idx) => {
      const art = item[db.shippingWB.mapping.wb_article] || '---';
      const bc = item[db.shippingWB.mapping.label_barcode] || '---';
      const copies = db.shippingWB.printCopies[idx] || 1;
      const isPrinted = db.shippingWB.printedSet.includes(idx);
      return `<div class="glass rounded-lg p-3 cursor-pointer hover:border-primary-500 ${isPrinted?'opacity-50':''}" onclick="WBShipping.printLabel(${idx})">
        <div class="text-xs text-white font-bold mb-1">${art}</div>
        <div class="text-xs text-slate-400 font-mono">${bc}</div>
        <div class="mt-2 text-xs text-primary-400">Копий: ${copies}</div>
      </div>`;
    }).join('') || '<div class="col-span-6 text-center text-slate-500 py-8">Загрузите ТЗ Excel</div>';
  },
  printLabel(idx) {
    const pa = document.getElementById('wbPrintArea');
    const bc = db.shippingWB.excelData[idx]?.[db.shippingWB.mapping.label_barcode] || '---';
    const art = db.shippingWB.excelData[idx]?.[db.shippingWB.mapping.wb_article] || '---';
    pa.innerHTML = `<div class="label-sheet" style="width:58mm;height:40mm;padding:3mm;border:1px dashed #ccc">
      <div class="lbl-header">ЕДИНЫЙ ТОВАР НЕ ВСКРЫВАТЬ</div>
      <div class="text-center font-bold">${art}</div>
      <div class="lbl-barcode-area"><svg id="wb_bp_svg_${idx}"></svg></div>
      <div class="text-center font-mono font-bold text-lg">${bc}</div>
    </div>`;
    pa.classList.remove('hidden');
    setTimeout(()=>{
      try { JsBarcode(`#wb_bp_svg_${idx}`, bc, {format:'CODE128', width:1.5, height:25, displayValue:false, margin:0}); } catch(e){}
      window.print();
    }, 200);
    setTimeout(()=>{
      pa.classList.add('hidden'); pa.innerHTML='';
      db.shippingWB.printedSet.push(idx); saveDB(); this.renderLabels(); showToast('Напечатано');
    }, 2500);
  },
  printAllLabels() { db.shippingWB.excelData.forEach((_,i)=>this.printLabel(i)); },
  printRemainingLabels() {
    db.shippingWB.excelData.forEach((_,i)=>{ if(!db.shippingWB.printedSet.includes(i)) setTimeout(()=>this.printLabel(i), i*500); });
  },
  handleHIDScan(e) {
    if(e.key!=='Enter') return;
    const bc = e.target.value.trim(); e.target.value='';
    const box = db.shippingWB.boxes[db.shippingWB.currentBox];
    const found = db.shippingWB.excelData.find(row => String(row[db.shippingWB.mapping.label_barcode]) === bc);
    if(!found) { showToast('ШК не найден в ТЗ','error'); return; }
    box.items.push(found); saveDB(); this.updateScannerUI(); showToast(`✅ Принято`);
  },
  updateScannerUI() {
    const body = document.getElementById('wbScannedBody'); if(!body) return;
    const box = db.shippingWB.boxes[db.shippingWB.currentBox] || {items:[]};
    const grouped = {}; box.items.forEach(i=>grouped[i[db.shippingWB.mapping.label_barcode]]=(grouped[i[db.shippingWB.mapping.label_barcode]]||0)+1);
    body.innerHTML = Object.entries(grouped).map(([bc,cnt])=>`<tr class="border-b border-slate-800"><td class="px-3 py-2 font-mono text-primary-400">${bc}</td><td class="px-3 py-2 font-bold">${cnt}</td></tr>`).join('') || '<tr><td class="px-3 py-4 text-center text-slate-500">Пусто</td></tr>';
  }
};

function setupWBTabs() {
  document.querySelectorAll('.wb-tab').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.wb-content').forEach(c=>c.classList.add('hidden'));
      document.getElementById('wb-tab-'+btn.dataset.tab).classList.remove('hidden');
      document.querySelectorAll('.wb-tab').forEach(b=>b.classList.replace('bg-primary-600','text-slate-400'));
      btn.classList.replace('text-slate-400','bg-primary-600');
      btn.classList.add('text-white');
    };
  });
}

// ==================== AUDIO & VOICE (ROBUST) ====================
const AudioEngine = { ctx:null, init(){ try{this.ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){} }, play(){ if(!this.ctx)this.init(); if(this.ctx.state==='suspended')this.ctx.resume(); const o=this.ctx.createOscillator(),g=this.ctx.createGain(); o.connect(g);g.connect(this.ctx.destination); o.frequency.value=800; g.gain.setValueAtTime(0.1,this.ctx.currentTime); o.start(); o.stop(this.ctx.currentTime+0.05); } };
const Voice = { recognition:null, synth:window.speechSynthesis, listening:false, init(){ if(!this.recognition) this.recognition=new(window.SpeechRecognition||window.webkitSpeechRecognition)(); if(!this.recognition) return; this.recognition.lang='ru-RU'; this.recognition.continuous=false; this.recognition.onresult=e=>{ const t=e.results[0][0].transcript.toLowerCase(); document.getElementById('voiceResponseText').textContent=`👂 ${t}`; this.process(t); }; this.recognition.onerror=()=>this.stop(); }, start(){ this.init(); if(!this.recognition) return showToast('Голос не поддерживается','warning'); this.recognition.start(); this.listening=true; document.getElementById('voiceListenBtn').innerHTML='<i class="fas fa-stop"></i> Стоп'; document.getElementById('voiceWaveIndicator').classList.remove('hidden'); }, stop(){ if(this.listening) this.recognition.stop(); this.listening=false; document.getElementById('voiceListenBtn').innerHTML='<i class="fas fa-microphone"></i> Слушаю...'; document.getElementById('voiceWaveIndicator').classList.add('hidden'); }, speak(t){ if(this.synth) { this.synth.cancel(); const u=new SpeechSynthesisUtterance(t); u.lang='ru-RU'; u.rate=0.9; this.synth.speak(u); } }, process(cmd){ if(cmd.includes('статус')) this.speak('Все системы работают штатно'); else if(cmd.includes('сколько')) this.speak(`На складе ${db.products.reduce((s,p)=>s+p.qty,0)} единиц`); else this.speak('Команда не распознана. Попробуйте "статус" или "сколько"'); } };
function toggleVoiceAssistant() { document.getElementById('voicePanel').classList.toggle('hidden'); }
function startVoiceCommand() { Voice.listening ? Voice.stop() : Voice.start(); }
document.addEventListener('click', ()=>AudioEngine.init(), {once:true});

// ==================== IMPORT / RESET ====================
function importExcel(e) {
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=ev=>{ try{ const wb=XLSX.read(ev.target.result,{type:'array'}); const d=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]); d.forEach(row=>db.products.push({id:Date.now(),sku:row['Артикул']||'SKU',name:row['Название']||'Товар',barcode:row['Штрих-код']||'',qty:row['Количество']||1})); saveDB(); renderProducts(); showToast(`Импортировано ${d.length}`); } catch(err){showToast('Ошибка: '+err.message,'error')} }; r.readAsArrayBuffer(f); e.target.value='';
}
function resetAllData() { if(confirm('Удалить все данные?')) { localStorage.removeItem(DB_KEY); location.reload(); } }

// ==================== INIT ====================
window.addEventListener('load', () => {
  setTimeout(()=>document.getElementById('splashScreen').style.display='none', 1500);
  if(sessionStorage.getItem('auth')) document.getElementById('mainApp').classList.remove('hidden');
  else document.getElementById('loginScreen').classList.remove('hidden');
  navigate('dashboard');
});
document.getElementById('loginForm').onsubmit = e => { e.preventDefault(); sessionStorage.setItem('auth','1'); document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('mainApp').classList.remove('hidden'); navigate('dashboard'); };
</script>
