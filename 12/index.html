<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Этикетки ТЗ 58x40 | Заказ №47</title>
    <!-- Библиотеки -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --border: #cbd5e1; --text: #0f172a; --success: #16a34a; }
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--text); }
        .container { max-width: 1400px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { margin: 0 0 15px 0; font-size: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Загрузка */
        .upload-box { border: 2px dashed var(--border); padding: 30px; text-align: center; border-radius: 10px; margin-bottom: 20px; background: #f1f5f9; cursor: pointer; transition: 0.2s; }
        .upload-box:hover { background: #e2e8f0; border-color: var(--primary); }
        .btn-upload { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        
        /* Интерфейс */
        .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; padding: 10px; background: #f8fafc; border-radius: 8px; align-items: center; }
        input, button.action-btn { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; }
        button.action-btn { background: var(--primary); color: white; border: none; cursor: pointer; }
        button.secondary { background: #64748b; }
        button.success { background: var(--success); }
        
        .table-wrap { overflow-x: auto; max-height: 50vh; border: 1px solid var(--border); border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
        th, td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #f1f5f9; position: sticky; top: 0; z-index: 10; }
        td[contenteditable="true"]:focus { background: #e0f2fe; outline: 2px solid var(--primary); }
        
        .stats { font-size: 13px; color: #475569; margin: 8px 0; display: flex; gap: 15px; }

        /* ПЕЧАТЬ 58x40 мм */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; height: auto; }
            
            /* Сетка для листа А4, если печатаете на обычном принтере для нарезки, 
               или просто поток этикеток для термопринтера */
            .label-grid { 
                display: flex; 
                flex-direction: column; 
                align-items: center; 
                width: 100%; 
            }

            .label { 
                width: 58mm; 
                height: 40mm; 
                border: 1px dotted #ccc; /* Граница для визуализации, на термопринтере можно убрать */
                padding: 2mm; 
                box-sizing: border-box; 
                font-family: Arial, sans-serif; 
                display: flex; 
                flex-direction: column; 
                justify-content: space-between; 
                page-break-after: always; /* Разрыв страницы после каждой этикетки для термопринтера */
                background: white; 
                overflow: hidden;
                position: relative;
            }

            /* Убираем разрыв страницы для последней этикетки, чтобы не печатать пустой лист */
            .label:last-child { page-break-after: auto; }

            .label .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1mm; }
            .label .sku { font-size: 11px; font-weight: bold; color: #000; line-height: 1.1; }
            .label .qty-badge { font-size: 9px; background: #eee; padding: 1px 3px; border-radius: 2px; }
            
            .label .barcode-container { text-align: center; margin: 1mm 0; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
            .label .barcode svg { max-width: 100%; height: 12mm !important; } /* Фиксированная высота штрихкода */
            
            .label .info-row { display: flex; justify-content: space-between; font-size: 9px; color: #333; margin-top: 1mm; }
            .label .name { font-size: 9px; line-height: 1.1; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-top: 1mm; }
            
            @page { size: 58mm 40mm; margin: 0; } /* Ключевая настройка для термопринтера */
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="no-print">🏷️ Этикетки 58x40 мм <span style="font-size:12px; color:#64748b;">Заказ №47</span></h1>
        
        <div class="upload-box no-print" id="dropZone">
            <p style="margin:0;">📂 Выберите файл Excel (.xlsx)</p>
            <button class="btn-upload" onclick="document.getElementById('fileInput').click()">Загрузить с компьютера</button>
            <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
        </div>

        <div id="editor" style="display:none;">
            <div class="controls no-print">
                <input type="text" id="filterText" placeholder="Поиск (Артикул, Имя, ТЗ)...">
                <input type="number" id="filterQty" placeholder="Мин. кол-во" min="0">
                <button class="action-btn" onclick="applyFilters()">Фильтр</button>
                <button class="action-btn secondary" onclick="resetFilters()">Сброс</button>
                <button class="action-btn success" onclick="generateLabels()">🖨️ Печать (58x40)</button>
            </div>
            <div class="stats no-print">
                <span id="statsTotal">Всего: 0</span>
                <span id="statsFiltered">Показано: 0</span>
                <span id="statsLabels">К печати: 0 шт.</span>
            </div>
            <div class="table-wrap">
                <table id="dataTable"><thead></thead><tbody></tbody></table>
            </div>
        </div>

        <div id="print-area" class="no-print">
            <div class="label-grid" id="labelGrid"></div>
        </div>
    </div>

    <script>
        let rawData = [];
        let filteredData = [];
        let headerRow = [];
        
        // Карта колонок из вашего файла
        const COL_MAP = {
            art_wb: 'Артикул ВБ', 
            name: 'наименование составляющего в наборе', 
            sku_label: 'ШК на этикетку ВБ', 
            art_label: 'Артикул на этикетку ВБ',
            qty_ship: 'ИТОГО К ОТГРУЗКЕ спаек', 
            expiry: 'ГОДЕН ДО', 
            tz: 'ТЗ'
        };

        document.getElementById('fileInput').addEventListener('change', handleFile);

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const data = new Uint8Array(ev.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const json = XLSX.utils.sheet_to_json(worksheet, {header: 1, defval: ''});
                    processData(json);
                } catch (err) {
                    console.error(err);
                    alert('Ошибка чтения файла. Убедитесь, что это корректный .xlsx');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function processData(sheet) {
            // Поиск заголовка
            let headerIdx = sheet.findIndex(r => r.some(c => String(c).includes('Артикул ВБ')));
            if (headerIdx === -1) return alert('Не найден заголовок "Артикул ВБ"');

            headerRow = sheet[headerIdx].map(h => String(h).trim());
            const colIndices = {};
            Object.values(COL_MAP).forEach(colName => {
                colIndices[colName] = headerRow.findIndex(h => h === colName);
            });

            rawData = [];
            for (let i = headerIdx + 1; i < sheet.length; i++) {
                const row = sheet[i];
                if (!row || row.length === 0) continue;
                
                // Пропуск итоговых строк
                if (String(row[0]).includes('ИТОГО')) break;

                const obj = {};
                Object.keys(COL_MAP).forEach(key => {
                    const idx = colIndices[COL_MAP[key]];
                    let val = (idx !== -1 && row[idx] !== undefined) ? row[idx] : '';
                    
                    // Очистка значений
                    if (typeof val === 'string') {
                        val = val.replace(/ERROR:#N\/A|ERROR:#REF!/gi, '').trim();
                    }
                    // Обработка чисел с запятыми (2,550 -> 2550)
                    if (key === 'qty_ship') {
                        val = String(val).replace(/\s/g, '').replace(/,/g, '');
                    }
                    obj[key] = val;
                });
                
                // Добавляем только если есть артикул
                if (obj.art_wb || obj.sku_label) {
                    rawData.push(obj);
                }
            }

            renderTable(rawData);
            document.getElementById('editor').style.display = 'block';
            document.querySelector('.upload-box').style.display = 'none';
        }

        function parseQty(val) {
            return Math.ceil(parseFloat(String(val).replace(/\s/g, '').replace(/,/g, '.')) || 0);
        }

        function renderTable(data) {
            const thead = document.querySelector('#dataTable thead');
            const tbody = document.querySelector('#dataTable tbody');
            
            // Показываем только ключевые колонки в таблице для удобства
            const visibleCols = ['art_wb', 'name', 'sku_label', 'qty_ship', 'expiry'];
            
            thead.innerHTML = '<tr>' + visibleCols.map(k => `<th>${COL_MAP[k]}</th>`).join('') + '</tr>';
            
            tbody.innerHTML = data.map((row, i) => {
                const idx = rawData.indexOf(row);
                return '<tr>' + visibleCols.map(k => {
                    let val = row[k] || '';
                    return `<td contenteditable="true" data-idx="${idx}" data-key="${k}" onblur="syncCell(this)">${val}</td>`;
                }).join('') + '</tr>';
            }).join('');
            
            updateStats(data.length);
        }

        function syncCell(td) {
            const idx = parseInt(td.dataset.idx);
            const key = td.dataset.key;
            rawData[idx][key] = td.textContent.trim();
            applyFilters();
        }

        function applyFilters() {
            const text = document.getElementById('filterText').value.toLowerCase().trim();
            const minQty = parseFloat(document.getElementById('filterQty').value) || 0;

            filteredData = rawData.filter(r => {
                let match = true;
                if (text) {
                    const str = `${r.art_wb} ${r.name} ${r.sku_label} ${r.tz}`.toLowerCase();
                    match = str.includes(text);
                }
                if (minQty > 0) match = match && parseQty(r.qty_ship) >= minQty;
                return match;
            });
            renderTable(filteredData);
        }

        function resetFilters() {
            document.getElementById('filterText').value = '';
            document.getElementById('filterQty').value = '';
            renderTable(rawData);
        }

        function updateStats(count) {
            document.getElementById('statsTotal').textContent = `Всего: ${rawData.length}`;
            document.getElementById('statsFiltered').textContent = `Показано: ${count}`;
        }

        function generateLabels() {
            const grid = document.getElementById('labelGrid');
            grid.innerHTML = '';
            const data = filteredData.length ? filteredData : rawData;
            
            if (!data.length) return alert('Нет данных для печати');

            let labelCount = 0;
            data.forEach(row => {
                const qty = parseQty(row.qty_ship);
                if (qty <= 0) return;

                for (let i = 0; i < qty; i++) {
                    const id = `bc_${Date.now()}_${i}_${Math.random().toString(36).substr(2, 5)}`;
                    const sku = row.sku_label || row.art_wb || 'NO-SKU';
                    const art = row.art_label || row.art_wb || '';
                    const exp = row.expiry || '';
                    const name = row.name || '';
                    
                    // Для 58мм ширины важно сократить текст ТЗ, если он длинный
                    let tzText = row.tz || '';
                    if (tzText.length > 60) tzText = tzText.substring(0, 57) + '...';

                    const el = document.createElement('div');
                    el.className = 'label';
                    el.innerHTML = `
                        <div class="header">
                            <div class="sku">Арт: ${art}</div>
                            ${qty > 1 ? `<div class="qty-badge">${i+1}/${qty}</div>` : ''}
                        </div>
                        <div class="barcode-container">
                            <svg id="${id}"></svg>
                        </div>
                        <div class="info-row">
                            <span>Годен до: ${exp}</span>
                        </div>
                        <div class="name">${name}</div>
                        ${tzText ? `<div style="font-size:8px; color:#666; margin-top:1px; text-align:center;">${tzText}</div>` : ''}
                    `;
                    grid.appendChild(el);

                    // Генерация штрихкода CODE128 (оптимально для WB/Ozon)
                    try {
                        JsBarcode(`#${id}`, sku, {
                            format: "CODE128",
                            width: 1.2,       // Толщина линий
                            height: 30,       // Высота в пикселях (примерно 10-12мм)
                            displayValue: true,
                            fontSize: 10,
                            margin: 0,
                            textMargin: 2
                        });
                    } catch(e) {
                        console.error("Barcode error", e);
                    }
                    labelCount++;
                }
            });
            
            document.getElementById('statsLabels').textContent = `К печати: ${labelCount} шт.`;
            
            // Небольшая задержка для рендеринга SVG перед печатью
            setTimeout(() => {
                window.print();
            }, 500);
        }
    </script>
</body>
</html>
