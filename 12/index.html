<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Этикетки ТЗ 58x40 Озон/ВБ</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --bg: #f0f2f5; --text: #333; --border: #ddd; }
        body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; background: var(--bg); color: var(--text); margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { margin: 0 0 20px; font-size: 24px; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn:hover { background: #1d4ed8; }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #15803d; }
        .btn-secondary { background: #6b7280; }
        .btn-secondary:hover { background: #4b5563; }
        .upload-area { border: 2px dashed var(--border); padding: 40px; text-align: center; margin-bottom: 20px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .upload-area:hover, .upload-area.dragover { background: #f8fafc; border-color: var(--primary); }
        input, select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
        .controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; vertical-align: top; }
        th { background: #f9fafb; position: sticky; top: 0; font-weight: 600; }
        td[contenteditable] { background: #fffbe6; outline: none; }
        td[contenteditable]:focus { background: #fff3cd; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal { background: white; width: 95%; max-width: 950px; max-height: 85vh; border-radius: 10px; padding: 20px; display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #eee; }
        .modal-body { flex: 1; overflow: auto; margin-bottom: 15px; }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; padding-top: 10px; border-top: 1px solid #eee; flex-wrap: wrap; }
        .modal-table { width: 100%; border-collapse: collapse; }
        .modal-table th, .modal-table td { padding: 6px 8px; font-size: 12px; white-space: nowrap; }
        .modal-table tr { border-bottom: 1px solid #f3f4f6; }
        .modal-table tr:hover { background: #f8fafc; }
        .checkbox-cell { width: 30px; text-align: center; }
        .modal-controls { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
        .info-badge { background: #e0e7ff; color: #1e3a8a; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }

        #print-area { position: absolute; left: -9999px; top: 0; width: 100%; }
        .label-grid { display: flex; flex-direction: column; align-items: flex-start; }
        .label {
            width: 58mm; height: 40mm; padding: 2mm; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between;
            font-family: Arial, sans-serif; overflow: hidden; background: white;
        }
        .lbl-header { display: flex; justify-content: space-between; align-items: center; font-size: 10px; font-weight: bold; margin-bottom: 1mm; }
        .lbl-barcode { text-align: center; margin: 1mm 0; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .lbl-barcode svg { max-height: 14mm; max-width: 100%; display: block; }
        .lbl-info { display: flex; justify-content: space-between; font-size: 8px; color: #444; }
        .lbl-name { font-size: 9px; line-height: 1.2; max-height: 2.4em; overflow: hidden; margin-bottom: 1mm; }
        .lbl-counter { font-size: 9px; color: #666; }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; z-index: 9999; }
            .label { page-break-after: always; border: 1px dashed #999; }
            .label:last-child { page-break-after: auto; }
            @page { size: 58mm 40mm; margin: 0; }
            .no-print { display: none !important; }
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container no-print">
    <h1>🏷️ Генератор этикеток 58x40 мм (Озон/ВБ)</h1>
    
    <div class="upload-area" id="dropZone">
        <p>Нажмите сюда или перетащите файл Excel (.xlsx)</p>
        <button class="btn" id="uploadBtn" type="button">Загрузить ТЗ</button>
        <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
    </div>

    <div id="editor" class="hidden">
        <div class="controls">
            <input type="text" id="search" placeholder="Поиск: Артикул, ШК, Название...">
            <input type="number" id="minQty" placeholder="Мин. кол-во к отгрузке" value="0">
            <button class="btn" onclick="applyFilter()">🔍 Применить фильтр</button>
            <button class="btn btn-success" onclick="openPrintDialog()">🖨️ Настроить и Печать</button>
        </div>
        <div id="stats" style="margin-bottom:10px; color:#666; font-size:13px;"></div>
        <div style="overflow-x:auto; max-height: 500px; border: 1px solid #eee; border-radius: 6px;">
            <table id="dataTable">
                <thead></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<div id="print-modal" class="modal-overlay">
    <div class="modal">
        <div class="modal-header">
            <h2 style="margin:0; font-size:18px;">⚙️ Настройка печати</h2>
            <button class="btn-secondary btn" onclick="closePrintDialog()">✕ Закрыть</button>
        </div>
        <div class="modal-body">
            <div class="modal-controls">
                <input type="text" id="modalSearch" placeholder="Фильтр строк (по всем колонкам)..." style="flex:2;">
                <select id="bcFormat" style="flex:1;">
                    <option value="CODE128">ШК: CODE128 (рекомендуется)</option>
                    <option value="EAN13">ШК: EAN13</option>
                    <option value="UPC">ШК: UPC</option>
                    <option value="CODE39">ШК: CODE39</option>
                </select>
                <label style="display:flex; align-items:center; gap:5px; font-size:13px; cursor:pointer;">
                    <input type="checkbox" id="selectAllModal" onchange="toggleModalSelectAll(this.checked)"> Выбрать всё
                </label>
                <span class="info-badge" id="modalCount">Выбрано: 0</span>
            </div>
            <table class="modal-table" id="modalTable">
                <thead></thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary btn" onclick="closePrintDialog()">Отмена</button>
            <button class="btn btn-success" id="btnExecutePrint" onclick="executePrint()">🖨️ Печать выбранных</button>
        </div>
    </div>
</div>

<div id="print-area">
    <div class="label-grid" id="labelGrid"></div>
</div>

<script>
    let allData = [];
    let filteredData = [];
    let modalData = [];
    
    const COLUMNS = {
        art_wb: 'Артикул ВБ',
        name: 'наименование составляющего в наборе',
        sku_label: 'ШК на этикетку ВБ',
        art_label: 'Артикул на этикетку ВБ',
        quant: 'квант спайки',
        qty_ship: 'ИТОГО К ОТГРУЗКЕ спаек',
        expiry: 'ГОДЕН ДО',
        tz: 'ТЗ'
    };

    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const uploadBtn = document.getElementById('uploadBtn');

    uploadBtn.addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => { if(fileInput.files[0]) loadFile(fileInput.files[0]); });

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault(); dropZone.classList.remove('dragover');
        if (e.dataTransfer.files[0]) { loadFile(e.dataTransfer.files[0]); fileInput.files = e.dataTransfer.files; }
    });

    function loadFile(file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const workbook = XLSX.read(new Uint8Array(ev.target.result), {type: 'array'});
                const worksheet = workbook.Sheets[workbook.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(worksheet, {header: 1, defval: ''});
                parseData(json);
            } catch (err) { alert('Ошибка: ' + err.message); console.error(err); }
        };
        reader.readAsArrayBuffer(file);
    }

    function parseData(rows) {
        let headerIndex = -1;
        for(let i=0; i<rows.length; i++) { if((rows[i]||[]).join(' ').includes('Артикул ВБ')) { headerIndex = i; break; } }
        if(headerIndex === -1) { alert('Заголовок "Артикул ВБ" не найден'); return; }

        const headers = rows[headerIndex];
        const idx = {};
        Object.keys(COLUMNS).forEach(key => {
            idx[key] = headers.findIndex(h => String(h).trim() === COLUMNS[key]);
        });

        allData = [];
        for(let i=headerIndex+1; i<rows.length; i++) {
            const row = rows[i] || [];
            if(String(row[0]||'').toUpperCase().includes('ИТОГО') && String(row[0]).length < 30) break;
            
            const item = {};
            Object.keys(COLUMNS).forEach(key => {
                let v = (idx[key] >= 0 && idx[key] < row.length) ? row[idx[key]] : '';
                if(typeof v === 'string') v = v.replace(/ERROR:#N\/A|ERROR:#REF!/gi, '').trim();
                if(['qty_ship','quant'].includes(key)) v = String(v).replace(/\s/g, '').replace(/,/g, '');
                item[key] = v;
            });
            if(item.art_wb || item.sku_label) allData.push(item);
        }

        if(!allData.length) { alert('Данные не найдены'); return; }
        filteredData = [...allData];
        renderTable(filteredData);
        document.getElementById('editor').classList.remove('hidden');
        dropZone.style.display = 'none';
    }

    function renderTable(data) {
        const keys = ['art_wb','name','sku_label','quant','qty_ship','expiry'];
        const labels = {art_wb:'Арт.ВБ', name:'Наименование', sku_label:'ШК этикетки', quant:'Квант', qty_ship:'К отгрузке', expiry:'Годен до'};
        
        const thead = document.querySelector('#dataTable thead');
        thead.innerHTML = '<tr>' + keys.map(k => `<th>${labels[k]}</th>`).join('') + '</tr>';
        
        let html = '';
        data.forEach((item, i) => {
            html += `<tr>${keys.map(k => `<td contenteditable="true" onblur="updateData(${i},'${k}',this.innerText)">${escapeHtml(item[k]||'')}</td>`).join('')}</tr>`;
        });
        document.querySelector('#dataTable tbody').innerHTML = html;
        document.getElementById('stats').textContent = `Загружено: ${allData.length} | Отображено: ${data.length}`;
    }

    function updateData(index, key, value) { if(allData[index]) { allData[index][key] = value.trim(); applyFilter(); } }

    function applyFilter() {
        const search = document.getElementById('search').value.toLowerCase();
        const minQ = parseFloat(document.getElementById('minQty').value) || 0;
        filteredData = allData.filter(item => {
            const q = parseFloat(String(item.qty_ship).replace(/,/g,'.')) || 0;
            const match = Object.values(item).some(v => String(v).toLowerCase().includes(search));
            return match && q >= minQ;
        });
        renderTable(filteredData);
    }

    // MODAL & PRINT LOGIC
    function openPrintDialog() {
        modalData = filteredData.length > 0 ? filteredData : allData;
        renderModalTable(modalData);
        document.getElementById('modalSearch').value = '';
        document.getElementById('print-modal').classList.add('active');
    }

    function closePrintDialog() { document.getElementById('print-modal').classList.remove('active'); }

    function renderModalTable(data) {
        const keys = ['art_wb','name','sku_label','qty_ship','expiry'];
        const labels = {art_wb:'Артикул', name:'Наименование', sku_label:'ШК', qty_ship:'Кол-во', expiry:'Годен до'};
        
        const thead = document.querySelector('#modalTable thead');
        thead.innerHTML = '<tr><th class="checkbox-cell">✔</th>' + keys.map(k => `<th>${labels[k]}</th></tr>`).join('');
        
        let html = '';
        data.forEach((item, i) => {
            const qty = Math.ceil(parseFloat(String(item.qty_ship).replace(/,/g,'.')) || 0);
            if(qty <= 0) return;
            html += `<tr data-index="${i}" data-search="${escapeHtml(Object.values(item).join(' '))}">
                <td class="checkbox-cell"><input type="checkbox" class="print-row-check" data-idx="${i}" onchange="updateModalCount()"></td>
                ${keys.map(k => `<td>${escapeHtml(String(item[k]||''))}</td>`).join('')}
            </tr>`;
        });
        document.querySelector('#modalTable tbody').innerHTML = html || '<tr><td colspan="6" style="text-align:center;color:#888;">Нет строк с количеством > 0</td></tr>';
        document.getElementById('modalCount').textContent = 'Выбрано: 0';
    }

    document.getElementById('modalSearch').addEventListener('input', function() {
        const q = this.value.toLowerCase();
        document.querySelectorAll('#modalTable tbody tr').forEach(tr => {
            const txt = tr.dataset.search || '';
            tr.style.display = txt.includes(q) ? '' : 'none';
        });
    });

    function toggleModalSelectAll(checked) {
        document.querySelectorAll('#modalTable tbody tr').forEach(tr => {
            if(tr.style.display !== 'none') { tr.querySelector('.print-row-check').checked = checked; }
        });
        updateModalCount();
    }

    function updateModalCount() {
        const checked = document.querySelectorAll('#modalTable tbody .print-row-check:checked').length;
        document.getElementById('modalCount').textContent = `Выбрано: ${checked}`;
    }

    function executePrint() {
        const grid = document.getElementById('labelGrid');
        grid.innerHTML = '';
        const bcFormat = document.getElementById('bcFormat').value;
        const selectedIndices = Array.from(document.querySelectorAll('#modalTable .print-row-check:checked')).map(cb => parseInt(cb.dataset.idx));
        
        if(!selectedIndices.length) { alert('Выберите хотя бы одну строку для печати'); return; }

        let labelIdx = 0;
        selectedIndices.forEach(idx => {
            const item = allData[idx];
            const qty = Math.ceil(parseFloat(String(item.qty_ship).replace(/,/g,'.')) || 0);
            if(qty <= 0) return;

            for(let i=0; i<qty; i++) {
                labelIdx++;
                const id = 'lbl_bc_' + labelIdx;
                const sku = item.sku_label || item.art_wb || '';
                const art = item.art_label || item.art_wb || '';
                let tz = item.tz || ''; if(tz.length>60) tz = tz.substring(0,57)+'...';

                const div = document.createElement('div');
                div.className = 'label';
                div.innerHTML = `
                    <div class="lbl-header"><span>Арт: ${escapeHtml(art)}</span>${qty>1 ? `<span class="lbl-counter">${i+1}/${qty}</span>` : ''}</div>
                    <div class="lbl-barcode"><svg id="${id}"></svg></div>
                    <div class="lbl-name">${escapeHtml(item.name)}</div>
                    <div class="lbl-info">
                        <span>Годен до: ${escapeHtml(item.expiry)}</span>
                        <span>Квант: ${escapeHtml(item.quant)}</span>
                    </div>
                    ${tz ? `<div class="lbl-name" style="margin-top:0.5mm; color:#555;">${escapeHtml(tz)}</div>` : ''}
                `;
                grid.appendChild(div);

                if(sku) {
                    try {
                        JsBarcode('#' + id, sku, {
                            format: bcFormat, width: 1.5, height: 30, displayValue: true, fontSize: 10, margin: 0
                        });
                    } catch(e) { console.warn('Barcode error', e); div.querySelector('#'+id).innerHTML = '<span style="font-size:9px;color:red">Ошибка ШК: '+escapeHtml(sku)+'</span>'; }
                }
            }
        });

        if(!labelIdx) { alert('Нет этикеток для печати (количество = 0)'); return; }
        closePrintDialog();
        setTimeout(() => window.print(), 300);
    }

    function escapeHtml(str) {
        const d = document.createElement('div'); d.appendChild(document.createTextNode(str)); return d.innerHTML;
    }
</script>
</body>
</html>
