<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Этикетки ТЗ 58x40</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; color: #333; }
        
        /* Загрузка */
        .upload-area { border: 2px dashed #ccc; padding: 40px; text-align: center; margin-bottom: 20px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .upload-area:hover { background: #eef; border-color: #2563eb; }
        .btn { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn:hover { background: #1d4ed8; }
        
        /* Таблица и фильтры */
        .controls { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; flex: 1; min-width: 200px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 8px; text-align: left; }
        th { background: #f9fafb; }
        td[contenteditable] { background: #fffbe6; }
        
        /* ПЕЧАТЬ 58x40 мм */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; }
            
            .label-grid { display: flex; flex-direction: column; align-items: center; width: 100%; }
            
            .label {
                width: 58mm;
                height: 40mm;
                border: 1px dotted #ccc; /* Для визуализации границ */
                padding: 2mm;
                box-sizing: border-box;
                page-break-after: always; /* Каждая этикетка на новой странице/отрезе */
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                font-family: Arial, sans-serif;
                overflow: hidden;
            }
            
            .label:last-child { page-break-after: auto; }
            
            .lbl-header { display: flex; justify-content: space-between; font-size: 10px; font-weight: bold; }
            .lbl-art { font-size: 10px; }
            .lbl-barcode { text-align: center; margin: 2mm 0; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
            .lbl-barcode svg { max-height: 12mm; max-width: 100%; }
            .lbl-info { font-size: 9px; display: flex; justify-content: space-between; }
            .lbl-name { font-size: 9px; line-height: 1.1; height: 2.2em; overflow: hidden; }
            
            @page { size: 58mm 40mm; margin: 0; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

<div class="container no-print">
    <h1>🏷️ Генератор этикеток 58x40 мм</h1>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <p>Нажмите сюда или перетащите файл Excel (.xlsx)</p>
        <button class="btn">Загрузить ТЗ</button>
        <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none">
    </div>

    <div id="editor" style="display:none;">
        <div class="controls">
            <input type="text" id="search" placeholder="Поиск: Артикул, ШК, Название, Квант...">
            <input type="number" id="minQty" placeholder="Мин. кол-во к отгрузке">
            <button class="btn" onclick="applyFilter()">Применить фильтр</button>
            <button class="btn" style="background:#16a34a" onclick="printLabels()">🖨️ Печать этикеток</button>
        </div>
        <div id="stats" style="margin-bottom:10px; color:#666;"></div>
        <div style="overflow-x:auto; max-height: 500px;">
            <table id="dataTable">
                <thead></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<div id="print-area" class="no-print">
    <div class="label-grid" id="labelGrid"></div>
</div>

<script>
    let allData = [];
    let filteredData = [];
    
    // Названия колонок из вашего файла
    const COLUMNS = {
        art_wb: 'Артикул ВБ',
        name: 'наименование составляющего в наборе',
        sku_label: 'ШК на этикетку ВБ',
        art_label: 'Артикул на этикетку ВБ',
        quant: 'квант спайки',
        qty_ship: 'ИТОГО К ОТГРУЗКЕ спаек',
        expiry: 'ГОДЕН ДО',
        tz: 'ТЗ'
    };

    document.getElementById('fileInput').addEventListener('change', handleFile);

    function handleFile(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                
                // Читаем как массив массивов, чтобы найти заголовок вручную
                const json = XLSX.utils.sheet_to_json(worksheet, {header: 1, defval: ''});
                parseData(json);
            } catch (err) {
                alert("Ошибка чтения файла: " + err.message);
                console.error(err);
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function parseData(rows) {
        // 1. Ищем индекс строки заголовка
        let headerIndex = -1;
        for (let i = 0; i < rows.length; i++) {
            const rowStr = rows[i].join(' ');
            if (rowStr.includes('Артикул ВБ')) {
                headerIndex = i;
                break;
            }
        }

        if (headerIndex === -1) {
            alert('Не найден заголовок "Артикул ВБ". Проверьте файл.');
            return;
        }

        const headers = rows[headerIndex];
        
        // 2. Находим индексы нужных колонок
        const idx = {};
        Object.keys(COLUMNS).forEach(key => {
            idx[key] = headers.findIndex(h => String(h).trim() === COLUMNS[key]);
        });

        // 3. Парсим данные
        allData = [];
        for (let i = headerIndex + 1; i < rows.length; i++) {
            const row = rows[i];
            if (!row || row.length === 0) continue;
            
            // Останавливаемся на итоговой строке
            if (String(row[0]).includes('ИТОГО') && String(row[0]).length < 20) break;

            const item = {};
            Object.keys(COLUMNS).forEach(key => {
                let val = row[idx[key]] !== undefined ? row[idx[key]] : '';
                
                // Очистка значений
                if (typeof val === 'string') {
                    val = val.replace(/ERROR:#N\/A|ERROR:#REF!/gi, '').trim();
                }
                
                // Преобразование чисел (2,550 -> 2550)
                if (key === 'qty_ship' || key === 'quant') {
                    val = String(val).replace(/\s/g, '').replace(/,/g, '');
                }
                
                item[key] = val;
            });

            // Добавляем только если есть артикул
            if (item.art_wb || item.sku_label) {
                allData.push(item);
            }
        }

        if (allData.length === 0) {
            alert('Данные не найдены. Проверьте структуру файла.');
            return;
        }

        renderTable(allData);
        document.getElementById('editor').style.display = 'block';
        document.querySelector('.upload-area').style.display = 'none';
    }

    function renderTable(data) {
        const thead = document.querySelector('#dataTable thead');
        const tbody = document.querySelector('#dataTable tbody');
        
        // Показываем только важные колонки
        const visibleKeys = ['art_wb', 'name', 'sku_label', 'quant', 'qty_ship', 'expiry'];
        
        thead.innerHTML = '<tr>' + visibleKeys.map(k => `<th><LaTex>id_6</LaTex>{visibleKeys.map(k => `<td contenteditable="true" onblur="updateData(${index}, '${k}', this.innerText)">${item[k]}</td>`).join('')}
            </tr>`;
        }).join('');
        
        document.getElementById('stats').innerText = `Всего позиций: ${data.length}`;
    }

    function updateData(index, key, value) {
        allData[index][key] = value.trim();
        applyFilter(); // Обновляем фильтр при изменении
    }

    function applyFilter() {
        const search = document.getElementById('search').value.toLowerCase();
        const minQty = parseFloat(document.getElementById('minQty').value) || 0;

        filteredData = allData.filter(item => {
            const qty = parseFloat(String(item.qty_ship).replace(',', '.')) || 0;
            const matchesSearch = 
                String(item.art_wb).toLowerCase().includes(search) ||
                String(item.name).toLowerCase().includes(search) ||
                String(item.sku_label).toLowerCase().includes(search) ||
                String(item.quant).toLowerCase().includes(search);
            
            return matchesSearch && qty >= minQty;
        });

        renderTable(filteredData);
    }

    function printLabels() {
        const grid = document.getElementById('labelGrid');
        grid.innerHTML = '';
        
        const dataToPrint = filteredData.length > 0 ? filteredData : allData;
        
        if (dataToPrint.length === 0) {
            alert('Нет данных для печати');
            return;
        }

        let count = 0;
        dataToPrint.forEach(item => {
            const qty = Math.ceil(parseFloat(String(item.qty_ship).replace(',', '.')) || 0);
            if (qty <= 0) return;

            for (let i = 0; i < qty; i++) {
                const id = `bc_<LaTex>id_5</LaTex>{Date.now()}`;
                const sku = item.sku_label || item.art_wb;
                const art = item.art_label || item.art_wb;
                
                // Сокращаем ТЗ для этикетки
                let tzShort = item.tz || '';
                if (tzShort.length > 60) tzShort = tzShort.substring(0, 57) + '...';

                const div = document.createElement('div');
                div.className = 'label';
                div.innerHTML = `
                    <div class="lbl-header">
                        <span class="lbl-art">Арт: <LaTex>id_4</LaTex>{qty > 1 ? (i+1)+'/'+qty : ''}</span>
                    </div>
                    <div class="lbl-barcode">
                        <svg id="<LaTex>id_3</LaTex>{item.expiry}</span>
                        <span>Квант: <LaTex>id_2</LaTex>{item.name}</div>
                    <LaTex>id_1</LaTex>{tzShort}</div>` : ''}
                `;
                grid.appendChild(div);

                // Генерация штрихкода
                try {
                    JsBarcode(`#${id}`, sku, {
                        format: "CODE128",
                        width: 1.5,
                        height: 30,
                        displayValue: true,
                        fontSize: 10,
                        margin: 0
                    });
                } catch(e) {
                    console.error(e);
                }
            }
        });

        setTimeout(() => window.print(), 500);
