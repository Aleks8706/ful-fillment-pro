<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS: Честный ЗНАК (Исправленная версия)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/bwip-js@3.4.3/dist/bwip-js-min.js"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white; margin: 0; padding: 0; }
            
            /* Этикетка КИЗ 30x20 мм */
            .print-kiz { 
                width: 30mm; height: 20mm; page-break-after: always;
                display: flex; flex-direction: column; align-items: center; justify-content: center;
                box-sizing: border-box; padding: 1mm;
            }
            .print-kiz canvas { max-width: 28mm; max-height: 15mm; }
            .print-kiz .kiz-text { font-size: 7px; text-align: center; word-break: break-all; margin-top: 1mm; color: #333; }

            /* Этикетка КОРОБА 58x40 мм */
            .print-box {
                width: 58mm; height: 40mm; page-break-after: always;
                display: flex; flex-direction: column; align-items: center; justify-content: center;
                border: 1px solid #000; box-sizing: border-box; padding: 2mm;
            }
            .print-box canvas { max-width: 50mm; max-height: 18mm; }
            .print-box .box-title { font-size: 14px; font-weight: bold; margin-bottom: 2mm; text-transform: uppercase; }
            .print-box .box-info { font-size: 10px; text-align: center; line-height: 1.2; }
        }
        #printArea { display: none; }
        @media print { #printArea { display: block !important; } }
        .scan-ok { animation: flashGreen 0.4s; }
        .scan-err { animation: flashRed 0.4s; }
        @keyframes flashGreen { 0% { background-color: #dcfce7; } 100% { background-color: white; } }
        @keyframes flashRed { 0% { background-color: #fee2e2; } 100% { background-color: white; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">

    <header class="bg-blue-700 text-white p-4 shadow-md no-print">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">📦 WMS: Честный ЗНАК + Короба</h1>
            <div class="text-right bg-white/10 px-3 py-1 rounded">
                <div class="text-xs opacity-80">Короб:</div>
                <div class="text-xl font-mono font-bold text-yellow-300" id="currentBoxIdDisplay">BOX-000</div>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4">
        <!-- Навигация -->
        <div class="flex gap-2 mb-4 no-print">
            <button onclick="showTab('tab-catalog')" class="flex-1 bg-white px-4 py-2 rounded shadow font-bold text-blue-700 border-b-4 border-blue-700">1. Товары и КИЗ</button>
            <button onclick="showTab('tab-print')" class="flex-1 bg-white px-4 py-2 rounded shadow font-bold text-gray-500 border-b-4 border-transparent">2. Печать 30x20</button>
            <button onclick="showTab('tab-packing')" class="flex-1 bg-green-50 px-4 py-2 rounded shadow font-bold text-green-700 border-b-4 border-green-600">3. Сборка</button>
        </div>

        <!-- ВКЛАДКА 1: Товары -->
        <div id="tab-catalog" class="tab-content">
            <div class="bg-white p-4 rounded shadow mb-4">
                <h2 class="font-bold mb-2">1. Добавить товар</h2>
                <div class="flex gap-2">
                    <input type="text" id="newSku" placeholder="Артикул (напр. TSHIRT-01)" class="border p-2 rounded flex-1">
                    <input type="text" id="newName" placeholder="Название" class="border p-2 rounded flex-1">
                    <button onclick="addProduct()" class="bg-blue-600 text-white px-4 py-2 rounded font-bold">Добавить</button>
                </div>
            </div>

            <div class="bg-white p-4 rounded shadow mb-4">
                <h2 class="font-bold mb-2">2. Загрузить коды КИЗ (Самый надежный способ)</h2>
                <select id="kizProductSelect" class="w-full border p-2 rounded mb-2"><option value="">Выберите товар...</option></select>
                <textarea id="manualKizInput" rows="4" placeholder="Откройте выгрузку из Честного ЗНАКа или Excel, скопируйте столбец с кодами и вставьте сюда (Ctrl+V)" class="w-full border p-2 rounded text-xs font-mono mb-2"></textarea>
                <button onclick="processManualKiz()" class="bg-green-600 text-white px-4 py-2 rounded font-bold w-full">✅ Добавить коды в базу</button>
            </div>

            <div class="bg-white p-4 rounded shadow">
                <h2 class="font-bold mb-2">Список товаров</h2>
                <table class="w-full text-sm text-left">
                    <thead class="bg-gray-100"><tr><th class="p-2">Артикул</th><th class="p-2">Название</th><th class="p-2 text-center">Всего КИЗ</th><th class="p-2 text-right">Действие</th></tr></thead>
                    <tbody id="productsTableBody"></tbody>
                </table>
            </div>
        </div>

        <!-- ВКЛАДКА 2: Печать -->
        <div id="tab-print" class="tab-content hidden">
            <div class="bg-white p-4 rounded shadow mb-4 no-print flex gap-2 items-end">
                <div class="flex-1">
                    <label class="text-sm font-bold block mb-1">Выберите товар для печати этикеток:</label>
                    <select id="printKizProductSelect" class="w-full border p-2 rounded"></select>
                </div>
                <button onclick="printAllKizForProduct()" class="bg-blue-600 text-white px-6 py-2 rounded font-bold h-10">🖨️ Печать всех (30x20)</button>
            </div>
            <div id="kizPreviewArea" class="grid grid-cols-3 md:grid-cols-6 gap-2 no-print"></div>
        </div>

        <!-- ВКЛАДКА 3: Сборка -->
        <div id="tab-packing" class="tab-content hidden">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="md:col-span-2 bg-white p-4 rounded shadow border-t-4 border-blue-600">
                    <h2 class="font-bold mb-2">Сканирование КИЗ</h2>
                    <input type="text" id="scanInput" class="w-full text-lg border-2 border-blue-300 p-3 rounded mb-2 font-mono" placeholder="Кликните сюда и сканируйте..." autocomplete="off">
                    <div id="scanFeedback" class="hidden p-2 rounded mb-2 text-center font-bold"></div>
                    <div class="h-48 overflow-y-auto border rounded bg-gray-50 p-2" id="boxItemsList">
                        <p class="text-gray-400 text-center mt-16 italic">Короб пуст</p>
                    </div>
                </div>
                <div class="bg-white p-4 rounded shadow border-t-4 border-green-600 flex flex-col">
                    <h2 class="font-bold mb-2 text-green-700">Короб</h2>
                    <div class="bg-green-50 p-3 rounded mb-4 text-center border border-green-200">
                        <div class="text-sm text-green-800">Отсканировано:</div>
                        <div class="text-3xl font-bold text-green-700" id="totalScannedCount">0</div>
                    </div>
                    <button onclick="closeBoxAndPrint()" class="w-full bg-green-600 text-white py-3 rounded font-bold shadow mb-4">✅ ЗАКРЫТЬ И ПЕЧАТАТЬ ЯРЛЫК</button>
                    <div class="mt-auto">
                        <h3 class="font-bold text-xs text-gray-500 mb-1">История:</h3>
                        <div class="h-32 overflow-y-auto border rounded bg-gray-50 p-1 text-xs" id="closedBoxesList"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="printArea"></div>

    <script>
        let products = JSON.parse(localStorage.getItem('cz_products')) || {};
        let currentBoxId = localStorage.getItem('cz_current_box') || 'BOX-' + Math.floor(Math.random() * 10000);
        let currentBoxItems = JSON.parse(localStorage.getItem('cz_current_box_items')) || [];
        let closedBoxes = JSON.parse(localStorage.getItem('cz_closed_boxes')) || [];

        document.getElementById('currentBoxIdDisplay').innerText = currentBoxId;
        updateAllUI();

        window.addEventListener('click', (e) => {
            if(!e.target.closest('button') && !e.target.closest('input') && !e.target.closest('select') && !e.target.closest('textarea')) {
                document.getElementById('scanInput').focus();
            }
        });

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            if(tabId === 'tab-catalog') renderProductsTable();
            if(tabId === 'tab-print') { updateSelects(); renderPrintPreview(); }
            if(tabId === 'tab-packing') { updatePackingUI(); setTimeout(() => document.getElementById('scanInput').focus(), 100); }
        }

        function addProduct() {
            const sku = document.getElementById('newSku').value.trim().toUpperCase();
            const name = document.getElementById('newName').value.trim();
            if(!sku || !name) return alert("Заполните оба поля");
            if(products[sku]) return alert("Такой артикул уже есть");
            products[sku] = { name: name, kiz_list: [], packed_count: 0 };
            saveData();
            document.getElementById('newSku').value = '';
            document.getElementById('newName').value = '';
            updateAllUI();
        }

        function processManualKiz() {
            const sku = document.getElementById('kizProductSelect').value;
            if(!sku) return alert("Выберите товар");
            const text = document.getElementById('manualKizInput').value.trim();
            if(!text) return;
            const codes = text.split(/[\n,\s]+/).map(c => c.trim()).filter(c => c.length > 10);
            const uniqueNewCodes = [...new Set(codes)];
            
            const existing = new Set(products[sku].kiz_list);
            uniqueNewCodes.forEach(code => {
                if(!existing.has(code)) {
                    products[sku].kiz_list.push(code);
                    existing.add(code);
                }
            });
            saveData();
            document.getElementById('manualKizInput').value = '';
            alert(`Добавлено ${uniqueNewCodes.length} кодов.`);
            updateAllUI();
        }

        function updateSelects() {
            const selects = ['kizProductSelect', 'printKizProductSelect'];
            selects.forEach(id => {
                const sel = document.getElementById(id);
                const val = sel.value;
                sel.innerHTML = '<option value="">Выберите товар...</option>';
                Object.keys(products).forEach(sku => {
                    const opt = document.createElement('option');
                    opt.value = sku;
                    opt.innerText = `${sku} - ${products[sku].name}`;
                    sel.appendChild(opt);
                });
                sel.value = val;
            });
        }

        function renderProductsTable() {
            const tbody = document.getElementById('productsTableBody');
            tbody.innerHTML = '';
            Object.keys(products).forEach(sku => {
                const p = products[sku];
                const tr = document.createElement('tr');
                tr.className = "border-b";
                tr.innerHTML = `
                    <td class="p-2 font-mono font-bold text-blue-700">${sku}</td>
                    <td class="p-2">${p.name}</td>
                    <td class="p-2 text-center font-bold">${p.kiz_list.length}</td>
                    <td class="p-2 text-right"><button onclick="deleteProduct('${sku}')" class="text-red-500 text-xs font-bold">Удалить</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function deleteProduct(sku) {
            if(confirm(`Удалить ${sku}?`)) {
                delete products[sku];
                saveData();
                updateAllUI();
            }
        }

        function renderPrintPreview() {
            const sku = document.getElementById('printKizProductSelect').value;
            const container = document.getElementById('kizPreviewArea');
            container.innerHTML = '';
            if(!sku || !products[sku]) return;

            products[sku].kiz_list.slice(0, 12).forEach(code => { // Показываем превью первых 12
                const div = document.createElement('div');
                div.className = 'bg-white p-2 border rounded flex flex-col items-center';
                const canvas = document.createElement('canvas');
                const text = document.createElement('div');
                text.className = 'text-[8px] text-center mt-1 truncate w-full';
                text.innerText = code;
                div.appendChild(canvas);
                div.appendChild(text);
                container.appendChild(div);
                try {
                    bwipjs.toCanvas(canvas, { bcid: 'datamatrix', text: code, scale: 2, width: 28, height: 15, includetext: false });
                } catch(e) {}
            });
        }

        function printAllKizForProduct() {
            const sku = document.getElementById('printKizProductSelect').value;
            if(!sku || !products[sku]) return alert("Выберите товар");
            const printArea = document.getElementById('printArea');
            printArea.innerHTML = '';
            
            products[sku].kiz_list.forEach(code => {
                const div = document.createElement('div');
                div.className = 'print-kiz';
                const canvas = document.createElement('canvas');
                const text = document.createElement('div');
                text.className = 'kiz-text';
                text.innerText = code.length > 25 ? code.substring(0, 12) + '...' + code.substring(code.length-10) : code;
                div.appendChild(canvas);
                div.appendChild(text);
                printArea.appendChild(div);
                try {
                    bwipjs.toCanvas(canvas, { bcid: 'datamatrix', text: code, scale: 3, width: 28, height: 15, includetext: false });
                } catch(e) {}
            });
            setTimeout(() => window.print(), 300);
        }

        document.getElementById('scanInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                processScan();
            }
        });

        function processScan() {
            let code = document.getElementById('scanInput').value.trim();
            if (!code) return;

            let foundSku = null;
            for (const [sku, data] of Object.entries(products)) {
                if (data.kiz_list.includes(code)) { foundSku = sku; break; }
            }

            const feedback = document.getElementById('scanFeedback');
            if (!foundSku) {
                feedback.innerHTML = `❌ НЕИЗВЕСТНЫЙ КОД`;
                feedback.className = "p-2 rounded mb-2 text-center font-bold bg-red-100 text-red-800 border border-red-500 scan-err block";
            } else if (currentBoxItems.includes(code)) {
                feedback.innerHTML = `⚠️ УЖЕ В ЭТОМ КОРОБЕ`;
                feedback.className = "p-2 rounded mb-2 text-center font-bold bg-yellow-100 text-yellow-800 border border-yellow-500 scan-err block";
            } else {
                currentBoxItems.push(code);
                products[foundSku].packed_count += 1;
                saveData();
                feedback.innerHTML = `✅ ВЕРНО: ${products[foundSku].name}`;
                feedback.className = "p-2 rounded mb-2 text-center font-bold bg-green-100 text-green-800 border border-green-500 scan-ok block";
            }
            document.getElementById('scanInput').value = '';
            document.getElementById('scanInput').focus();
            updatePackingUI();
        }

        function updatePackingUI() {
            document.getElementById('currentBoxIdDisplay').innerText = currentBoxId;
            document.getElementById('totalScannedCount').innerText = currentBoxItems.length;
            
            const list = document.getElementById('boxItemsList');
            list.innerHTML = '';
            if (currentBoxItems.length === 0) {
                list.innerHTML = '<p class="text-gray-400 text-center mt-16 italic">Короб пуст</p>';
            } else {
                [...currentBoxItems].reverse().forEach(code => {
                    let pName = "Неизвестно";
                    for(const [sku, data] of Object.entries(products)) {
                        if(data.kiz_list.includes(code)) { pName = data.name; break; }
                    }
                    const div = document.createElement('div');
                    div.className = "flex justify-between items-center p-2 border-b bg-white rounded mb-1 text-xs";
                    div.innerHTML = `<div class="flex-1"><div class="font-bold">${pName}</div><div class="font-mono text-gray-500 truncate">${code}</div></div>`;
                    list.appendChild(div);
                });
            }

            const histList = document.getElementById('closedBoxesList');
            histList.innerHTML = '';
            [...closedBoxes].reverse().forEach(box => {
                const div = document.createElement('div');
                div.className = "p-1 border-b bg-white rounded mb-1 flex justify-between";
                div.innerHTML = `<span class="font-bold">${box.id}</span><span class="text-gray-500">${box.itemsCount} шт.</span>`;
                histList.appendChild(div);
            });
        }

        function closeBoxAndPrint() {
            if (currentBoxItems.length === 0 && !confirm('Короб пуст. Печатать?')) return;

            const boxId = currentBoxId;
            const itemCount = currentBoxItems.length;
            closedBoxes.push({ id: boxId, itemsCount: itemCount, date: new Date().toLocaleString() });
            
            const printArea = document.getElementById('printArea');
            printArea.innerHTML = '';
            const div = document.createElement('div');
            div.className = 'print-box';
            const title = document.createElement('div');
            title.className = 'box-title';
            title.innerText = `КОРОБ: ${boxId}`;
            const canvas = document.createElement('canvas');
            const info = document.createElement('div');
            info.className = 'box-info';
            info.innerHTML = `КИЗ внутри: <b>${itemCount} шт.</b><br>${new Date().toLocaleString()}`;
            div.appendChild(title);
            div.appendChild(canvas);
            div.appendChild(info);
            printArea.appendChild(div);

            try {
                bwipjs.toCanvas(canvas, { bcid: 'code128', text: boxId, scale: 3, height: 15, includetext: true, textxalign: 'center' });
            } catch(e) {}

            currentBoxItems = [];
            currentBoxId = 'BOX-' + Math.floor(Math.random() * 10000);
            saveData();
            updatePackingUI();
            setTimeout(() => window.print(), 300);
        }

        function saveData() {
            localStorage.setItem('cz_products', JSON.stringify(products));
            localStorage.setItem('cz_current_box', currentBoxId);
            localStorage.setItem('cz_current_box_items', JSON.stringify(currentBoxItems));
            localStorage.setItem('cz_closed_boxes', JSON.stringify(closedBoxes));
        }

        function updateAllUI() {
            renderProductsTable();
            updateSelects();
            updatePackingUI();
        }
        showTab('tab-catalog');
    </script>
</body>
</html>
