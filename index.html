<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart HRM & WMS v2.1</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0f172a; --bg-panel: #1e293b; --bg-hover: #334155; --bg-input: #0b1120;
      --text: #f8fafc; --text-muted: #94a3b8; --primary: #3b82f6; --primary-dark: #2563eb;
      --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --info: #0ea5e9;
      --border: #334155; --radius: 10px; --shadow: 0 4px 12px rgba(0,0,0,0.3);
      --font: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    [data-theme="light"] {
      --bg: #f1f5f9; --bg-panel: #ffffff; --bg-hover: #e2e8f0; --bg-input: #ffffff;
      --text: #0f172a; --text-muted: #64748b; --border: #cbd5e1;
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font); }
    body { background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; transition: all 0.3s; }
    .hidden { display: none !important; }
    .btn { padding: 0.5rem 1rem; border: none; border-radius: var(--radius); cursor: pointer; font-weight: 500; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.4rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { background: var(--bg-hover); }
    .input, .select { width: 100%; padding: 0.65rem; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 0.9rem; }
    .input:focus, .select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(59,130,246,0.25); }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { padding: 0.8rem 0.6rem; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    th { color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.5px; }
    tr:hover td { background: var(--bg-hover); }
    .card { background: var(--bg-panel); border-radius: var(--radius); padding: 1.2rem; margin-bottom: 1.2rem; box-shadow: var(--shadow); }
    .grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    .flex { display: flex; gap: 0.6rem; align-items: center; flex-wrap: wrap; }
    .badge { padding: 0.2rem 0.5rem; border-radius: 99px; font-size: 0.7rem; font-weight: 600; white-space: nowrap; }
    .badge-ok { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid rgba(34,197,94,0.3); }
    .badge-warn { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
    .badge-err { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
    header { background: var(--bg-panel); padding: 0.7rem 1.2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    nav { background: var(--bg-panel); padding: 0.5rem 1.2rem; display: flex; gap: 0.4rem; border-bottom: 1px solid var(--border); overflow-x: auto; }
    nav button { background: transparent; color: var(--text-muted); border: none; padding: 0.4rem 0.7rem; cursor: pointer; border-radius: var(--radius); transition: 0.2s; font-weight: 500; }
    nav button.active, nav button:hover { background: var(--bg-hover); color: var(--text); }
    main { padding: 1.2rem; max-width: 1500px; margin: 0 auto; }
    .login-box { width: 100%; max-width: 380px; margin: 10vh auto; background: var(--bg-panel); padding: 2rem; border-radius: var(--radius); box-shadow: var(--shadow); }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(4px); }
    .modal-content { background: var(--bg-panel); padding: 1.5rem; border-radius: var(--radius); width: 95%; max-width: 650px; max-height: 90vh; overflow-y: auto; position: relative; }
    .close-modal { position: absolute; top: 0.8rem; right: 0.8rem; background: none; border: none; font-size: 1.4rem; cursor: pointer; color: var(--text-muted); }
    .toast { position: fixed; top: 1rem; right: 1rem; padding: 0.8rem 1rem; background: var(--bg-panel); border-left: 4px solid var(--primary); border-radius: var(--radius); z-index: 200; animation: slide 0.3s; box-shadow: var(--shadow); max-width: 300px; font-size: 0.9rem; }
    @keyframes slide { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .stat-val { font-size: 2rem; font-weight: 700; margin: 0.3rem 0; line-height: 1; }
    .stat-label { color: var(--text-muted); font-size: 0.8rem; }
    @media (max-width: 768px) { nav { padding: 0.4rem; } .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2 style="margin-bottom:1.2rem; text-align:center; font-weight:700;">📦 Smart HRM & WMS</h2>
    <input type="text" id="login-user" class="input" placeholder="Логин" style="margin-bottom:0.8rem;">
    <input type="password" id="login-pass" class="input" placeholder="Пароль" style="margin-bottom:0.8rem;">
    <button onclick="Auth.login()" class="btn btn-primary" style="width:100%;">Войти</button>
    <p style="margin-top:0.8rem; text-align:center; font-size:0.75rem; color:var(--text-muted);">
      Демо: <b>admin</b> / admin123 &nbsp;|&nbsp; <b>manager</b> / manager123 &nbsp;|&nbsp; <b>operator</b> / operator123
    </p>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <h3 style="display:flex;align-items:center;gap:0.5rem;">📊 Smart System <span class="badge badge-info">v2.1</span></h3>
    <div class="flex">
      <button onclick="UI.toggleTheme()" class="btn btn-ghost" title="Тема">🌓</button>
      <button onclick="Sync.exportBackup()" class="btn btn-ghost">💾 Бэкап</button>
      <span id="user-badge" class="badge"></span>
      <button onclick="Auth.logout()" class="btn btn-danger">Выйти</button>
    </div>
  </header>
  <nav id="nav"></nav>
  <main id="content"></main>
</div>

<div id="modal" class="hidden modal">
  <div class="modal-content">
    <button class="close-modal" onclick="UI.closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// 🔒 Global Error Handler
window.onerror = function(msg, url, line, col, err) {
  console.error('SYSTEM ERROR:', msg, 'at', line, col);
  alert('⚠️ Ошибка системы. Откройте консоль браузера (F12) для деталей.');
  return false;
};

// ==========================================
// 💾 DATA LAYER
// ==========================================
const DB = {
  _key: 'smarthrm_wms_v3',
  _defaults: {
    users: [
      { id: 'u1', username: 'admin', pass: 'admin123', role: 'admin', active: true, created: new Date().toISOString() },
      { id: 'u2', username: 'manager', pass: 'manager123', role: 'manager', active: true, created: new Date().toISOString() },
      { id: 'u3', username: 'operator', pass: 'operator123', role: 'operator', active: true, created: new Date().toISOString() }
    ],
    employees: [
      { id: 'e1', userId: 'u3', fullName: 'Иванов И.И.', dept: 'Склад', position: 'Оператор', hireDate: '2024-01-15', status: 'active' },
      { id: 'e2', userId: 'u2', fullName: 'Петрова А.С.', dept: 'Логистика', position: 'Менеджер', hireDate: '2023-11-05', status: 'active' }
    ],
    products: [
      { id: 'p1', sku: 'BOLT-M10', name: 'Болт М10x50', unit: 'шт', minStock: 50, category: 'Крепёж' },
      { id: 'p2', sku: 'NUT-M10', name: 'Гайка М10', unit: 'шт', minStock: 100, category: 'Крепёж' },
      { id: 'p3', sku: 'BOX-A1', name: 'Коробка транспортная', unit: 'уп', minStock: 20, category: 'Тара' }
    ],
    locations: [
      { id: 'l1', code: 'Z-A-01', name: 'Зона А, Стеллаж 1' },
      { id: 'l2', code: 'Z-B-02', name: 'Зона Б, Стеллаж 2' }
    ],
    movements: [],
    leaves: [],
    inventory: [],
    audit: [],
    settings: { theme: 'dark' }
  },
  init() {
    if (!localStorage.getItem(this._key)) {
      localStorage.setItem(this._key, JSON.stringify(this._defaults));
    } else {
      const d = JSON.parse(localStorage.getItem(this._key));
      // Migration patch for older versions
      if (!d.audit) d.audit = [];
      if (!d.inventory) d.inventory = [];
      if (!d.settings) d.settings = { theme: 'dark' };
      localStorage.setItem(this._key, JSON.stringify(d));
    }
  },
  get() { return JSON.parse(localStorage.getItem(this._key)); },
  save(d) { localStorage.setItem(this._key, JSON.stringify(d)); },
  ledger(pid) {
    const m = this.get().movements.filter(x => x.productId === pid && x.status === 'posted');
    return m.reduce((sum, x) => sum + (['IN','ADJUST_POS','COUNT_POS'].includes(x.type) ? x.qty : -x.qty), 0);
  },
  log(entity, id, action) {
    const d = this.get();
    d.audit.unshift({ id: `a${Date.now()}`, user: Auth.user?.username || 'system', entity, id, action, ts: new Date().toISOString() });
    if (d.audit.length > 1500) d.audit = d.audit.slice(0, 1200);
    this.save(d);
  }
};

// ==========================================
// 🔐 AUTH
// ==========================================
const Auth = {
  user: null,
  roles: ['operator', 'manager', 'admin'], // hierarchy
  login() {
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value.trim();
    const d = DB.get();
    const found = d.users.find(x => x.username === u && x.pass === p && x.active);
    if (!found) return UI.toast('❌ Неверный логин или пароль', 'err');
    Auth.user = found;
    localStorage.setItem('session', JSON.stringify({ uid: found.id, ts: Date.now() }));
    DB.log('auth', found.id, 'login');
    UI.renderApp();
  },
  logout() {
    DB.log('auth', Auth.user?.id, 'logout');
    localStorage.removeItem('session');
    location.reload();
  },
  canAccess(requiredRole) {
    const idx = this.roles.indexOf(Auth.user.role);
    const reqIdx = this.roles.indexOf(requiredRole);
    return idx >= reqIdx;
  },
  init() {
    const s = JSON.parse(localStorage.getItem('session'));
    if (s && Date.now() - s.ts < 28800000) {
      const u = DB.get().users.find(x => x.id === s.uid);
      if (u && u.active) { Auth.user = u; UI.renderApp(); return; }
    }
    document.getElementById('login-screen').classList.remove('hidden');
  }
};

// ==========================================
// 📦 WMS & HR & SYNC
// ==========================================
const WMS = {
  addMovement(data) {
    if (data.type === 'OUT' && DB.ledger(data.productId) < data.qty) return UI.toast('❌ Недостаточно остатка', 'err');
    const m = { id: `m${Date.now()}`, ...data, status: 'posted', synced: false, ts: new Date().toISOString() };
    const d = DB.get(); d.movements.push(m); DB.save(d);
    DB.log('movement', m.id, 'create');
    UI.toast('✅ Движение проведено', 'ok'); UI.render();
  },
  startInventory() {
    const d = DB.get();
    const inv = { id: `i${Date.now()}`, status: 'draft', created: new Date().toISOString(), user: Auth.user.id, items: [] };
    d.products.forEach(p => inv.items.push({ productId: p.id, systemQty: DB.ledger(p.id), actualQty: null, diff: null }));
    d.inventory.push(inv); DB.save(d);
    DB.log('inventory', inv.id, 'start');
    UI.toast('📋 Акт создан. Заполните факт.', 'info');
    UI.openInv(inv.id);
  },
  postInventory(id) {
    const d = DB.get(); const inv = d.inventory.find(i => i.id === id);
    if (!inv || inv.status !== 'draft') return UI.toast('❌ Уже завершена', 'err');
    inv.status = 'completed';
    inv.items.forEach(item => {
      if (item.actualQty === null || item.actualQty === item.systemQty) return;
      const diff = item.actualQty - item.systemQty;
      this.addMovement({ productId: item.productId, type: diff > 0 ? 'COUNT_POS' : 'COUNT_NEG', qty: Math.abs(diff), locationId: 'l1', refDoc: id });
      item.diff = diff;
    });
    DB.log('inventory', id, 'complete');
    UI.toast('✅ Инвентаризация проведена', 'ok');
  }
};

const HR = {
  addLeave() {
    const d = DB.get();
    const emp = document.getElementById('l-emp').value.trim();
    if (!emp || !document.getElementById('l-start').value || !document.getElementById('l-end').value) return UI.toast('❌ Заполните все поля', 'err');
    d.leaves.push({ id: `l${Date.now()}`, employeeName: emp, type: document.getElementById('l-type').value, start: document.getElementById('l-start').value, end: document.getElementById('l-end').value, status: 'pending' });
    DB.save(d); UI.toast('✅ Заявка создана', 'ok'); UI.render();
  },
  approve(id, status) {
    const d = DB.get(); const l = d.leaves.find(x => x.id === id);
    if (l) { l.status = status; DB.save(d); UI.toast(status==='approved'?'✅ Согласовано':'❌ Отклонено', status==='approved'?'ok':'err'); UI.render(); }
  }
};

const Sync = {
  queue() { return DB.get().movements.filter(m => !m.synced); },
  push() {
    const q = this.queue(); if (!q.length) return UI.toast('ℹ️ Очередь пуста', 'info');
    UI.toast('🔄 Отправка в 1С...', 'info');
    setTimeout(() => {
      const d = DB.get(); q.forEach(m => m.synced = true); DB.save(d);
      DB.log('sync', q.length, '1c_push');
      UI.toast(`🚀 Отправлено: ${q.length}`, 'ok'); UI.render();
    }, 600);
  },
  exportBackup() {
    const blob = new Blob([JSON.stringify(DB.get(), null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
    UI.toast('💾 Бэкап сохранён', 'ok');
  },
  importBackup(file) {
    if (!file) return;
    const r = new FileReader();
    r.onload = (e) => {
      try {
        const d = JSON.parse(e.target.result);
        if (!d.users || !d.products) throw 'Invalid';
        localStorage.setItem(DB._key, JSON.stringify(d));
        UI.toast('✅ Данные восстановлены', 'ok'); setTimeout(() => location.reload(), 1000);
      } catch { UI.toast('❌ Ошибка файла', 'err'); }
    };
    r.readAsText(file);
  }
};

// ==========================================
// 🖥️ UI
// ==========================================
const UI = {
  tabs: [
    { id: 'dash', label: '📊 Дашборд', role: 'operator' },
    { id: 'wms', label: '📦 Склад', role: 'operator' },
    { id: 'hr', label: '👥 Персонал', role: 'manager' },
    { id: 'inv', label: '🔍 Инвентаризация', role: 'operator' },
    { id: 'sync', label: '🔄 1С Синхронизация', role: 'manager' },
    { id: 'admin', label: '⚙️ Управление', role: 'admin' }
  ],
  active: 'dash',
  charts: {},
  renderApp() {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('user-badge').textContent = `${Auth.user.username} | ${Auth.user.role}`;
    document.getElementById('nav').innerHTML = UI.tabs.filter(t => Auth.canAccess(t.role))
      .map(t => `<button data-tab="${t.id}" onclick="UI.switchTab('${t.id}')">${t.label}</button>`).join('');
    UI.switchTab('dash');
    if (DB.get().settings.theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
  },
  switchTab(id) {
    UI.active = id;
    document.querySelectorAll('#nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
    const c = document.getElementById('content');
    if (id === 'dash') c.innerHTML = UI.vDash();
    else if (id === 'wms') c.innerHTML = UI.vWms();
    else if (id === 'hr') c.innerHTML = UI.vHr();
    else if (id === 'inv') c.innerHTML = UI.vInv();
    else if (id === 'sync') c.innerHTML = UI.vSync();
    else if (id === 'admin') c.innerHTML = UI.vAdmin();
    setTimeout(UI.initChart, 50);
  },
  vDash() {
    const d = DB.get();
    const low = d.products.filter(p => DB.ledger(p.id) < p.minStock).length;
    return `<div class="grid">
      <div class="card"><div class="stat-val" style="color:var(--primary)">${d.products.length}</div><div class="stat-label">Позиций</div></div>
      <div class="card"><div class="stat-val" style="color:${low?'var(--warning)':'var(--success)'}">${low}</div><div class="stat-label">Ниже минимума</div></div>
      <div class="card"><div class="stat-val">${d.movements.length}</div><div class="stat-label">Движений</div></div>
      <div class="card"><div class="stat-val">${d.leaves.filter(l=>l.status==='approved').length}</div><div class="stat-label">Отпусков утверждено</div></div>
    </div>
    <div class="grid" style="grid-template-columns:2fr 1fr;margin-top:1rem;">
      <div class="card"><canvas id="chart-stock"></canvas></div>
      <div class="card">
        <h3 style="margin-bottom:1rem;">⚡ Действия</h3>
        <div class="flex" style="flex-direction:column;gap:0.5rem;">
          <button onclick="UI.modal('move')" class="btn btn-primary">📦 Движение</button>
          <button onclick="WMS.startInventory()" class="btn btn-success">📋 Инвентаризация</button>
          <button onclick="Sync.push()" class="btn btn-ghost">🔄 Отправить в 1С</button>
        </div>
      </div>
    </div>`;
  },
  vWms() {
    const d = DB.get();
    const rows = d.products.map(p => {
      const q = DB.ledger(p.id);
      return `<tr><td>${p.sku}</td><td>${p.name}</td><td>${p.category}</td><td><span class="badge ${q<p.minStock?'badge-warn':'badge-ok'}">${q} ${p.unit}</span></td>
        <td><button class="btn btn-ghost" onclick="UI.modal('move','${p.id}')">+</button></td></tr>`;
    }).join('');
    return `<div class="card"><h3>📦 Остатки</h3>
      <table><thead><tr><th>Артикул</th><th>Название</th><th>Категория</th><th>Остаток</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
  },
  vHr() {
    const d = DB.get();
    const emps = d.employees.map(e => `<tr><td>${e.fullName}</td><td>${e.dept}</td><td>${e.position}</td><td><span class="badge badge-${e.status==='active'?'ok':'err'}">${e.status}</span></td></tr>`).join('');
    const leaves = d.leaves.map(l => `<tr><td>${l.employeeName}</td><td>${l.type}</td><td>${l.start}→${l.end}</td><td><span class="badge badge-${l.status==='approved'?'ok':l.status==='rejected'?'err':'warn'}">${l.status}</span></td>
      ${l.status==='pending'?`<td><button class="btn btn-success" onclick="HR.approve('${l.id}','approved')">✓</button> <button class="btn btn-danger" onclick="HR.approve('${l.id}','rejected')">✕</button></td>`:'<td>-</td>'}</tr>`).join('');
    return `<div class="grid"><div class="card"><h3>👥 Сотрудники</h3><table><thead><tr><th>ФИО</th><th>Отдел</th><th>Должность</th><th>Статус</th></tr></thead><tbody>${emps}</tbody></table></div>
      <div class="card"><div class="flex"><h3>📅 Заявки</h3><button class="btn btn-primary" onclick="UI.modal('leave')">+</button></div>
      <table><thead><tr><th>Сотрудник</th><th>Тип</th><th>Период</th><th>Статус</th><th></th></tr></thead><tbody>${leaves||'<tr><td colspan="5">Нет заявок</td></tr>'}</tbody></table></div></div>`;
  },
  vInv() {
    const d = DB.get();
    const rows = d.inventory.slice().reverse().map(i => `<tr><td>${i.id}</td><td>${new Date(i.created).toLocaleDateString()}</td><td><span class="badge badge-${i.status==='completed'?'ok':'warn'}">${i.status}</span></td><td><button class="btn btn-ghost" onclick="UI.openInv('${i.id}')">Открыть</button></td></tr>`).join('');
    return `<div class="card"><div class="flex"><h3>🔍 Акты</h3><button class="btn btn-primary" onclick="WMS.startInventory()">+ Создать</button></div>
      <table><thead><tr><th>ID</th><th>Дата</th><th>Статус</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
  },
  vSync() {
    const q = Sync.queue();
    const rows = q.map(m => `<tr><td>${m.id}</td><td>${m.type}</td><td>${m.qty}</td><td>Ожидает</td></tr>`).join('');
    return `<div class="card"><h3>🔄 Обмен с 1С</h3>
      <p style="margin:0.5rem 0 1rem;color:var(--text-muted);font-size:0.9rem">Локальная очередь несинхронизированных движений. При нажатии имитируется отправка.</p>
      <div class="flex">
        <button onclick="Sync.push()" class="btn btn-success">🚀 Отправить (${q.length})</button>
        <button onclick="Sync.exportBackup()" class="btn btn-ghost">📥 JSON Бэкап</button>
        <label class="btn btn-ghost">📤 Восстановить <input type="file" hidden onchange="Sync.importBackup(this.files[0])"></label>
      </div>
      <table style="margin-top:1rem;"><thead><tr><th>ID</th><th>Тип</th><th>Кол-во</th><th>Статус</th></tr></thead><tbody>${rows||'<tr><td colspan="4">Очередь пуста ✅</td></tr>'}</tbody></table></div>`;
  },
  vAdmin() {
    const d = DB.get();
    const users = d.users.map(u => `<tr><td>${u.username}</td><td>${u.role}</td><td><span class="badge ${u.active?'badge-ok':'badge-err'}">${u.active?'Активен':'Блок'}</span></td>
      <td><button class="btn btn-ghost" onclick="Admin.toggle('${u.id}')">🔄</button></td></tr>`).join('');
    const logs = d.audit.slice(0,40).map(a => `<tr><td>${new Date(a.ts).toLocaleString()}</td><td>${a.user}</td><td>${a.entity}</td><td>${a.action}</td></tr>`).join('');
    return `<div class="grid">
      <div class="card"><div class="flex"><h3>👤 Пользователи</h3><button class="btn btn-primary" onclick="UI.modal('user')">+</button></div>
        <table><thead><tr><th>Логин</th><th>Роль</th><th>Статус</th><th></th></tr></thead><tbody>${users}</tbody></table></div>
      <div class="card"><h3>📜 Аудит</h3><table><thead><tr><th>Время</th><th>Пользователь</th><th>Объект</th><th>Действие</th></tr></thead><tbody>${logs}</tbody></table></div>
    </div>`;
  },
  modal(type, presetId=null) {
    document.getElementById('modal').classList.remove('hidden');
    const m = document.getElementById('modal-body');
    if (type === 'move') {
      const d = DB.get();
      const opts = d.products.map(p => `<option value="${p.id}" ${presetId===p.id?'selected':''}>${p.name} (${p.sku}) [${DB.ledger(p.id)}]</option>`).join('');
      m.innerHTML = `<h3>📦 Движение</h3>
        <select id="m-prod" class="select" style="margin:0.5rem 0">${opts}</select>
        <div class="grid" style="grid-template-columns:1fr 1fr"><select id="m-type" class="select"><option value="IN">Приход</option><option value="OUT">Расход</option><option value="ADJUST_POS">Коррекция +</option><option value="ADJUST_NEG">Коррекция -</option></select>
        <input id="m-qty" type="number" class="input" placeholder="Количество"></div>
        <input id="m-ref" class="input" placeholder="№ накладной" style="margin:0.5rem 0">
        <button onclick="WMS.addMovement({productId:document.getElementById('m-prod').value,type:document.getElementById('m-type').value,qty:parseFloat(document.getElementById('m-qty').value),locationId:'l1',refDoc:document.getElementById('m-ref').value});UI.closeModal();" class="btn btn-success" style="margin-top:0.5rem;width:100%">Провести</button>`;
    } else if (type === 'leave') {
      m.innerHTML = `<h3>📅 Заявка</h3>
        <input id="l-emp" class="input" placeholder="ФИО" style="margin:0.5rem 0">
        <select id="l-type" class="select"><option value="vacation">Отпуск</option><option value="sick">Больничный</option></select>
        <div class="grid" style="margin:0.5rem 0"><input id="l-start" type="date" class="input"><input id="l-end" type="date" class="input"></div>
        <button onclick="HR.addLeave();UI.closeModal();" class="btn btn-primary" style="margin-top:0.5rem;width:100%">Отправить</button>`;
    } else if (type === 'user') {
      m.innerHTML = `<h3>👤 Пользователь</h3>
        <input id="u-name" class="input" placeholder="Логин" style="margin:0.5rem 0">
        <input id="u-pass" type="password" class="input" placeholder="Пароль" style="margin:0.5rem 0">
        <select id="u-role" class="select"><option value="operator">Оператор</option><option value="manager">Менеджер</option><option value="admin">Админ</option></select>
        <button onclick="Admin.add();UI.closeModal();" class="btn btn-primary" style="margin-top:0.5rem;width:100%">Создать</button>`;
    }
  },
  closeModal() { document.getElementById('modal').classList.add('hidden'); },
  openInv(id) {
    const d = DB.get(); const inv = d.inventory.find(i => i.id === id);
    if (!inv) return;
    const rows = inv.items.map((item, idx) => {
      const p = d.products.find(x => x.id === item.productId);
      return `<tr><td>${p.sku} ${p.name}</td><td>${item.systemQty}</td><td><input type="number" value="${item.actualQty!==null?item.actualQty:''}" class="input" style="width:80px" onchange="UI.setInv('${id}',${idx},this.value)"></td><td>${item.diff!==null?item.diff:'-'}</td></tr>`;
    }).join('');
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('modal-body').innerHTML = `<h3>🔍 Акт ${id}</h3><table><thead><tr><th>Товар</th><th>Система</th><th>Факт</th><th>Разница</th></tr></thead><tbody>${rows}</tbody></table>
      <button onclick="WMS.postInventory('${id}');UI.closeModal();" class="btn btn-success" style="margin-top:0.5rem;width:100%">Провести</button>`;
  },
  setInv(invId, idx, val) {
    const d = DB.get(); const inv = d.inventory.find(i => i.id === invId);
    inv.items[idx].actualQty = val === '' ? null : parseFloat(val);
    inv.items[idx].diff = inv.items[idx].actualQty === null ? null : inv.items[idx].actualQty - inv.items[idx].systemQty;
    DB.save(d);
  },
  toast(msg, type='info') {
    const t = document.createElement('div'); t.className = 'toast';
    t.style.borderLeftColor = type==='err'?'var(--danger)':type==='ok'?'var(--success)':'var(--primary)';
    t.textContent = msg; document.body.appendChild(t); setTimeout(()=>t.remove(), 3000);
  },
  toggleTheme() {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    document.documentElement.setAttribute('data-theme', isLight ? 'dark' : 'light');
    DB.get().settings.theme = isLight ? 'dark' : 'light';
    DB.save(DB.get());
  },
  initChart() {
    if (UI.active !== 'dash') return;
    const ctx = document.getElementById('chart-stock');
    if (!ctx) return;
    if (UI.charts.stock) UI.charts.stock.destroy();
    const d = DB.get();
    UI.charts.stock = new Chart(ctx.getContext('2d'), {
      type: 'bar',
      data: { labels: d.products.map(p => p.name), datasets: [{ label: 'Остаток', data: d.products.map(p => DB.ledger(p.id)), backgroundColor: 'rgba(59,130,246,0.6)', borderColor: '#3b82f6', borderWidth: 1 }] },
      options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'var(--border)' } }, x: { grid: { display: false } } } }
    });
  }
};

const Admin = {
  add() {
    const d = DB.get();
    const u = document.getElementById('u-name').value.trim(), p = document.getElementById('u-pass').value.trim(), r = document.getElementById('u-role').value;
    if (!u || !p) return UI.toast('❌ Заполните поля', 'err');
    if (d.users.some(x => x.username === u)) return UI.toast('❌ Логин занят', 'err');
    d.users.push({ id: `u${Date.now()}`, username: u, pass: p, role: r, active: true, created: new Date().toISOString() });
    DB.save(d); DB.log('user', u, 'create'); UI.toast('✅ Создан', 'ok'); UI.render();
  },
  toggle(id) {
    const d = DB.get(); const u = d.users.find(x => x.id === id);
    if (!u || u.username === 'admin') return UI.toast('⚠️ Админа нельзя менять', 'warn');
    u.active = !u.active; DB.save(d); UI.toast(u.active?'✅ Активирован':'🔒 Заблокирован', 'ok'); UI.render();
  }
};

// 🚀 INIT
document.addEventListener('DOMContentLoaded', () => {
  DB.init();
  Auth.init();
  document.getElementById('login-pass').onkeydown = e => e.key === 'Enter' && Auth.login();
});
</script>
</body>
</html>
