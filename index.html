<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏭 WMS AI PRO — Единая Система</title>
<style>
:root{
 --bg:#0f172a;--s:#1e293b;--s2:#334155;--p:#6366f1;--pg:rgba(99,102,241,.3);
 --ok:#10b981;--wrn:#f59e0b;--err:#ef4444;--t:#f8fafc;--tm:#94a3b8;--brd:#475569;--r:12px;
}
*{m:0;p:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif}
body{background:var(--bg);color:var(--t);display:flex;height:100vh;overflow:hidden}
.sidebar{width:250px;background:var(--s);border-right:1px solid var(--brd);display:flex;flex-direction:column;padding:12px;gap:4px;overflow-y:auto;transition:0.3s}
.logo{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px;padding:8px;margin-bottom:12px}
.nav{padding:10px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:.2s;font-size:13px}
.nav:hover{background:var(--s2)} .nav.act{background:var(--p);color:#fff}
.divider{height:1px;background:var(--brd);margin:8px 0}
.wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.hdr{background:var(--s);padding:12px 20px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.hdr h2{font-size:16px} .hdr-ctrls{display:flex;gap:10px;align-items:center}
.content{flex:1;padding:20px;overflow-y:auto}
.card{background:var(--s);padding:16px;border-radius:var(--r);box-shadow:0 4px 12px rgba(0,0,0,.3);margin-bottom:12px}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:16px}
.st{text-align:center;padding:14px;background:var(--s2);border-radius:10px} .sv{font-size:24px;font-weight:800} .sl{font-size:12px;color:var(--tm);margin-top:4px}
table{width:100%;border-collapse:collapse} th{background:var(--s2);padding:10px;text-align:left;font-size:11px;text-transform:uppercase;color:var(--tm);border-bottom:2px solid var(--brd)}
td{padding:10px;border-bottom:1px solid var(--brd);font-size:13px} tr:hover{background:rgba(255,255,255,.03)}
.badge{padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600} .b-ok{background:rgba(16,185,129,.2);color:var(--ok)} .b-wrn{background:rgba(245,158,11,.2);color:var(--wrn)} .b-err{background:rgba(239,68,68,.2);color:var(--err)}
.btn{padding:8px 14px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:12px;transition:.2s} .b-p{background:var(--p);color:#fff} .b-s{background:var(--s2);color:var(--t);border:1px solid var(--brd)} .b-d{background:var(--err);color:#fff}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px)} .modal-bg.show{display:flex}
.modal{background:var(--s);border-radius:var(--r);width:95%;max-width:700px;max-height:90vh;display:flex;flex-direction:column;animation:slideUp .2s} @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.m-h{padding:16px 20px;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between} .m-b{padding:20px;overflow-y:auto;flex:1} .m-f{padding:16px 20px;border-top:1px solid var(--brd);display:flex;justify-content:flex-end;gap:8px}
.fg{display:flex;flex-direction:column;gap:6px} .fl{font-size:12px;color:var(--tm);font-weight:600} .fc{padding:8px 12px;background:var(--s2);border:1px solid var(--brd);color:var(--t);border-radius:8px;font-size:13px;outline:none} .fc:focus{border-color:var(--p)}
.fg-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.toast-box{position:fixed;top:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--s);border-left:4px solid var(--p);padding:12px 16px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.4);color:var(--t);font-size:13px;animation:sI .3s;pointer-events:auto} .toast.wrn{border-color:var(--wrn)} .toast.err{border-color:var(--err)} .toast.ok{border-color:var(--ok)} @keyframes sI{from{transform:translateX(100%)}to{transform:translateX(0)}}
.ai-panel{position:fixed;right:-360px;top:0;width:340px;height:100vh;background:var(--s);border-left:1px solid var(--brd);box-shadow:0 8px 24px rgba(0,0,0,.5);transition:.3s;display:flex;flex-direction:column;z-index:90} .ai-panel.open{right:0} .ai-ch{padding:14px;border-bottom:1px solid var(--brd);display:flex;justify-content:space-between} .ai-body{flex:1;padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:10px} .ai-msg{max-width:90%;padding:10px 12px;border-radius:10px;font-size:13px;line-height:1.5;animation:pop .2s} .ai-msg.u{background:var(--p);color:#fff;align-self:flex-end} .ai-msg.b{background:var(--s2);border:1px solid var(--brd)} .ai-in{padding:12px;border-top:1px solid var(--brd);display:flex;gap:6px} .ai-in input{flex:1;background:var(--s2);border:1px solid var(--brd);color:var(--t);padding:8px;border-radius:6px;outline:none} @keyframes pop{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.mic{padding:6px 12px;background:var(--s2);border:1px solid var(--brd);color:var(--t);border-radius:6px;cursor:pointer;font-size:12px} .mic.listening{background:var(--err);animation:pulse 1.5s infinite} @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(239,68,68,.5)}70%{box-shadow:0 0 0 10px transparent}100%{box-shadow:0 0 0 0 transparent}}
@media(max-width:768px){.sidebar{position:fixed;left:-250px;height:100%;z-index:80}.sidebar.open{left:0}.content{padding:12px}}
</style>
</head>
<body>
<aside class="sidebar" id="sb"><div class="logo">🏭 WMS AI PRO</div><div id="nav"></div><div class="divider"></div><div class="nav" style="background:linear-gradient(135deg,#8b5cf6,#ec4899)" onclick="App.AI.open()">🤖 ИИ: Создать модуль</div></aside>
<div class="wrap"><div class="hdr"><div style="display:flex;align-items:center;gap:10px"><button class="b-s" id="menuBtn" onclick="document.getElementById('sb').classList.toggle('open')" style="display:none">☰</button><h2 id="pTitle">Дашборд</h2></div><div class="hdr-ctrls"><span id="clk" style="font-family:monospace;font-weight:600"></span><button class="mic" id="micBtn" onclick="App.V.toggle()">🎤 Голос</button></div></div><div class="content" id="mc"></div></div>
<div class="ai-panel" id="aiP"><div class="ai-ch"><span>🤖 ИИ-Конструктор</span><button class="b-s" onclick="App.AI.close()">✕</button></div><div class="ai-body" id="aiC"></div><div class="ai-in"><input id="aiI" placeholder="Опишите модуль или задайте вопрос..."><button class="b-p" onclick="App.AI.send()">➤</button></div></div>
<div class="toast-box" id="tb"></div>
<div class="modal-bg" id="mBg"><div class="modal" id="mM"><div class="m-h"><span id="mT"></span><button class="b-s" onclick="App.M.close()">✕</button></div><div class="m-b" id="mB"></div><div class="m-f" id="mF"></div></div></div>
<script>
const App={M:{},act:'dash',{g(k){try{return JSON.parse(localStorage.getItem('wms_'+k))||[]}catch(e){return[]}},s(k,v){localStorage.setItem('wms_'+k,JSON.stringify(v))}},init(){this.bootData();this.regMod();this.renderNav();this.route('dash');setInterval(()=>document.getElementById('clk').textContent=new Date().toLocaleTimeString('ru-RU'),1000);if(innerWidth<768)document.getElementById('menuBtn').style.display='block'},
 bootData(){if(!this.data.g('rcv').length)this.data.s('rcv',[{id:'r1',n:'ПР-2026-001',dt:'2026-05-11',sup:'ООО Альфа',st:'ok',items:[{nm:'Монитор',q:10,p:15000}]},{id:'r2',n:'ПР-2026-002',dt:'2026-05-10',sup:'ИП Петров',st:'pend',items:[{nm:'Клавиатура',q:50,p:1200}]}]);if(!this.data.g('wh').length)this.data.s('wh',[{id:'w1',c:'A-01-1-1',z:'Приемка',cap:100,cur:65,items:[{nm:'Монитор',q:65}]},{id:'w2',c:'B-02-3-2',z:'Хранение',cap:200,cur:12,items:[{nm:'Сервер',q:12}]}]);if(!this.data.g('hr').length)this.data.s('hr',[{id:'e1',nm:'Иванов А.П.',pos:'Кладовщик',dep:'Склад',st:'ok',sh:'5/2',sess:{s:Date.now()-7200000}},{id:'e2',nm:'Смирнова М.В.',pos:'Оператор',dep:'Бухгалтерия',st:'vac',sh:'5/2',sess:null}]);},
regMod(){let r=(i,n,ic,rd)=>App.M[i]={id:i,nm:n,ic,rd,ok:true};r('dash','📊 Дашборд','📈',ModDash);r('rcv','📥 Приёмка','📦',ModRcv);r('inv','📋 Инвентаризация','🔍',ModInv);r('wh','🗺️ Склад','📍',ModWh);r('hr','👥 Сотрудники','🆔',ModHR)},
renderNav(){const l=document.getElementById('nav');l.innerHTML='';for(const k in App.M){const m=App.M[k];const d=document.createElement('div');d.className=`nav ${m.ok?'':'dis'} ${App.act===k?'act':''}`;d.innerHTML=`<span>${m.ic}</span> ${m.nm}`;d.onclick=()=>App.route(k);l.appendChild(d)}},
route(id){App.act=id;document.querySelectorAll('.nav').forEach(n=>n.classList.toggle('act',n.textContent.includes(App.M[id]?.nm?.replace('📊','')?.trim()||'')));document.getElementById('pTitle').textContent=App.M[id]?.nm||id;const c=document.getElementById('mc');c.innerHTML='<div style="text-align:center;padding:40px;color:var(--tm)">⏳ Загрузка...</div>';setTimeout(()=>App.M[id]?.rd(c),80)}
};
App.T={s(m,t='ok'){const d=document.createElement('div');d.className=`toast ${t}`;d.textContent=m;document.getElementById('tb').appendChild(d);setTimeout(()=>d.remove(),3500)},ok(m){this.s(m)},wrn(m){this.s(m,'wrn')},err(m){this.s(m,'err')}};

/** === МОДУЛИ === */
const ModDash=c=>{const r=App.data.g('rcv').length,w=App.data.g('wh'),e=App.data.g('hr'),oc=w.length?Math.round(w.reduce((a,x)=>a+x.cur,0)/w.reduce((a,x)=>a+x.cap,0)*100):0,ae=e.filter(x=>x.sess).length;
c.innerHTML=`<div class="sg"><div class="st"><div class="sv">${r}</div><div class="sl">Приёмок</div></div><div class="st"><div class="sv">${oc}%</div><div class="sl">Заполненность</div></div><div class="st"><div class="sv">${ae}</div><div class="sl">На смене</div></div><div class="st"><div class="sv">${Object.keys(App.M).filter(k=>App.M[k].ok).length}</div><div class="sl">Модулей</div></div></div><div class="card"><h3>📈 Последние операции</h3><p style="margin:8px 0 0;color:var(--tm)">Система работает стабильно. Голосовой помощник активен. Создавайте новые модули через ИИ.</p></div><div class="card"><h3>🔔 Рекомендации ИИ</h3><ul style="margin:8px 0 0 16px;line-height:1.6"><li>Проверьте ячейки с заполненностью >80%</li><li>Назначьте ответственных за зону приёмки</li><li>Запустите плановую инвентаризацию</li></ul></div>`;};

const ModRcv=c=>{const d=App.data.g('rcv');c.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:12px"><h2>📥 Приёмка товара</h2><button class="btn b-p" onclick="RcvAdd()">➕ Новая приёмка</button></div><div class="card" style="padding:0;overflow:hidden"><table><thead><tr><th>№</th><th>Дата</th><th>Поставщик</th><th>Статус</th><th>Товаров</th><th>Действия</th></tr></thead><tbody>${d.map((x,i)=>`<tr><td>${x.n}</td><td>${x.dt}</td><td>${x.sup}</td><td><span class="badge ${x.st==='ok'?'b-ok':'b-wrn'}">${x.st}</span></td><td>${x.items.length}</td><td><button class="btn b-s" onclick="RcvView('${x.id}')">👁️</button> <button class="btn b-s" onclick="RcvDel(${i})">🗑️</button></td></tr>`).join('')}${d.length?'':'<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--tm)">Нет данных</td></tr>'}</tbody></table></div>`;
window.RcvAdd=()=>{const sup=prompt('Поставщик:');if(!sup)return;const d=App.data.g('rcv');const nm=`ПР-${new Date().getFullYear()}-${String(d.length+1).padStart(3,'0')}`;d.push({id:'r'+Date.now(),n:nm,dt:new Date().toISOString().split('T')[0],sup,st:'pend',items:[{nm:'Товар',q:1,p:0}]});App.data.s('rcv',d);App.T.ok('Создано');App.route('rcv')};
window.RcvView=id=>{const x=App.data.g('rcv').find(v=>v.id===id);App.T.ok(`${x.n}: ${x.items.map(i=>`${i.nm} x${i.q}`).join(', ')}`)};
window.RcvDel=i=>{const d=App.data.g('rcv');d.splice(i,1);App.data.s('rcv',d);App.T.wrn('Удалено');App.route('rcv')};};

const ModInv=c=>{const d=App.data.g('inv')||[];c.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:12px"><h2>📋 Инвентаризация</h2><button class="btn b-p" onclick="InvAdd()">🚀 Начать</button></div><div class="card" style="padding:0;overflow:hidden"><table><thead><tr><th>№</th><th>Дата</th><th>Склад</th><th>Позиций</th><th>Отклонения</th><th>Действия</th></tr></thead><tbody>${d.map((x,i)=>`<tr><td>${x.n}</td><td>${x.dt}</td><td>${x.wh}</td><td>${x.items.length}</td><td><span class="badge ${x.diff>0?'b-wrn':'b-ok'}">${x.diff}</span></td><td><button class="btn b-s" onclick="InvView('${x.id}')">👁️</button> <button class="btn b-s" onclick="InvDel(${i})">🗑️</button></td></tr>`).join('')}${d.length?'':'<tr><td colspan="6" style="text-align:center;padding:20px;color:var(--tm)">Нет инвентаризаций</td></tr>'}</tbody></table></div>`;
window.InvAdd=()=>{const d=App.data.g('inv')||[];d.push({id:'i'+Date.now(),n:`ИНВ-${d.length+1}`,dt:new Date().toISOString().split('T')[0],wh:'Основной',items:[{nm:'Товар',book:10,fact:10}],diff:0});App.data.s('inv',d);App.T.ok('Создана');App.route('inv')};
window.InvView=id=>{const x=App.data.g('inv').find(v=>v.id===id);App.T.ok(`${x.n}: ${x.items.map(i=>`${i.nm} ${i.book}/${i.fact}`).join(', ')}`)};
window.InvDel=i=>{const d=App.data.g('inv');d.splice(i,1);App.data.s('inv',d);App.T.wrn('Удалено');App.route('inv')};};

const ModWh=c=>{const w=App.data.g('wh');c.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:12px"><h2>🗺️ Склад и ячейки</h2><button class="btn b-p" onclick="WhAdd()">➕ Ячейка</button></div><div class="sg">${w.map(x=>`<div class="st"><div class="sv">${x.cur}/${x.cap}</div><div class="sl">${x.c} (${x.z})</div></div>`).join('')}</div><div class="card" style="padding:0;overflow:hidden"><table><thead><tr><th>Код</th><th>Зона</th><th>Заполн.</th><th>Статус</th><th>Действия</th></tr></thead><tbody>${w.map((x,i)=>{const p=Math.round(x.cur/x.cap*100);return`<tr><td>${x.c}</td><td>${x.z}</td><td>${p}%</td><td><span class="badge ${p>80?'b-err':p>50?'b-wrn':'b-ok'}">${p>80?'Переполн':'Норма'}</span></td><td><button class="btn b-s" onclick="WhView('${x.id}')">👁️</button> <button class="btn b-s" onclick="WhDel(${i})">🗑️</button></td></tr>`}).join('')}</tbody></table></div>`;
window.WhAdd=()=>{const w=App.data.g('wh');const c=prompt('Код ячейки:','C-01-1-1');if(!c)return;w.push({id:'w'+Date.now(),c,z:'Приемка',cap:100,cur:0,items:[]});App.data.s('wh',w);App.T.ok('Создана');App.route('wh')};
window.WhView=id=>{const x=App.data.g('wh').find(v=>v.id===id);App.T.ok(`${x.c}: ${x.items.map(i=>`${i.nm} x${i.q}`).join(', ')||'Пусто'}`)};
window.WhDel=i=>{const w=App.data.g('wh');w.splice(i,1);App.data.s('wh',w);App.T.wrn('Удалено');App.route('wh')};};

const ModHR=c=>{const e=App.data.g('hr');c.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:12px"><h2>👥 Сотрудники и табель</h2><button class="btn b-p" onclick="HRAdd()">➕ Сотрудник</button></div><div class="card" style="padding:0;overflow:hidden"><table><thead><tr><th>ФИО</th><th>Должность</th><th>Отдел</th><th>Статус</th><th>Смена</th><th>Действия</th></tr></thead><tbody>${e.map((x,i)=>`<tr><td>${x.nm}</td><td>${x.pos}</td><td>${x.dep}</td><td><span class="badge ${x.st==='ok'?'b-ok':'b-wrn'}">${x.st}</span></td><td>${x.sess?'⏱️ В работе':'🔴 Оффлайн'}</td><td><button class="btn b-s" onclick="HRView('${x.id}')">🆔</button> <button class="btn b-s" onclick="HRDel(${i})">🗑️</button></td></tr>`).join('')}</tbody></table></div>`;
window.HRAdd=()=>{const nm=prompt('ФИО:');if(!nm)return;const e=App.data.g('hr');e.push({id:'e'+Date.now(),nm,pos:'Сотрудник',dep:'Склад',st:'ok',sh:'5/2',sess:null});App.data.s('hr',e);App.T.ok('Добавлен');App.route('hr')};
window.HRView=id=>{const x=App.data.g('hr').find(v=>v.id===id);App.T.ok(`${x.nm} — ${x.pos}, ${x.dep}`)};
window.HRDel=i=>{const e=App.data.g('hr');e.splice(i,1);App.data.s('hr',e);App.T.wrn('Удалён');App.route('hr')};};

/** === ИИ-КОНСТРУКТОР === */
App.AI={chat:[],open(){document.getElementById('aiP').classList.add('open')},close(){document.getElementById('aiP').classList.remove('open')},send(){const i=document.getElementById('aiI'),t=i.value.trim();if(!t)return;i.value='';this.chat.push({r:'u',t:t});const res=this.proc(t);this.chat.push({r:'b',t:res});this.rend();App.V.speak(res)},rend(){const b=document.getElementById('aiC');b.innerHTML=this.chat.map(c=>`<div class="ai-msg ${c.r}">${c.t.replace(/\n/g,'<br>')}</div>`).join('');b.scrollTop=b.scrollHeight},proc(t){const tl=t.toLowerCase();if(/создай|сгенерируй|нужен модуль|хочу/.test(tl)){const m=tl.match(/(?:создай|сгенерируй|нужен модуль|хочу)\s+(?:модуль\s+)?(.+?)(?:\s+с|\s+для|\s+\.|$)/);const n=m?m[1].replace(/учет|реестр|модуль/gi,'').trim():'Новый модуль';const id='m_'+n.replace(/\s/g,'_')+'_'+Date.now();App.M[id]={id,nm:`📂 ${n}`,ic:'📊',ok:true,rd:c=>{const d=App.data.g(id)||[];c.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:12px"><h2>📂 ${n}</h2><button class="btn b-p" onclick="App.data.s('${id}',[...(App.data.g('${id}')||[]),{nm:'Запись',dt:new Date().toISOString().split('T')[0]}]);App.T.ok('Добавлено');App.route('${id}')">➕ Добавить</button></div><div class="card" style="padding:0;overflow:hidden"><table><thead><tr><th>№</th><th>Название</th><th>Дата</th><th>Действия</th></tr></thead><tbody>${d.map((x,i)=>`<tr><td>#${i+1}</td><td>${x.nm}</td><td>${x.dt}</td><td><button class="btn b-s" onclick="let d=App.data.g('${id}');d.splice(${i},1);App.data.s('${id}',d);App.route('${id}')">🗑️</button></td></tr>`).join('')}${d.length?'':'<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--tm)">Нет данных</td></tr>'}</tbody></table></div>`};App.T.ok(`Модуль "${n}" создан и подключен!`);this.rend();App.renderNav();return `✅ Модуль «${n}» создан и добавлен в меню.`}else if(/включи|отключи|активируй/.test(tl)){const k=Object.keys(App.M).find(k=>App.M[k].nm.toLowerCase().includes(tl.replace(/включи|отключи|активируй|модуль\s/gi,'').trim()));if(!k)return 'Модуль не найден';App.M[k].ok=!/отключи|деактивируй/.test(tl);App.renderNav();App.T.ok(`${App.M[k].nm} переключен`);return `Готово: ${App.M[k].nm}`;}return App.V.nlp(t)}};
document.getElementById('aiI').onkeydown=e=>{if(e.key==='Enter')App.AI.send()};

/** === ГОЛОСОВОЙ АССИСТЕНТ === */
App.V={r:null,ok:false,spk:false,init(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){document.getElementById('micBtn').textContent='🎤 Нет API';return}this.r=new SR();this.r.lang='ru-RU';this.r.interimResults=false;this.r.onresult=e=>this.proc(e.results[0][0].transcript);this.r.onstart=()=>{this.ok=true;this.ui('🎤 Слушаю...');document.getElementById('micBtn').classList.add('listening')};this.r.onend=()=>{this.ok=false;this.ui('🎤 Голос');document.getElementById('micBtn').classList.remove('listening')};this.r.onerror=()=>{this.ok=false;this.ui('🎤 Ошибка')}};toggle(){this.spk?(speechSynthesis.cancel(),this.spk=false):this.ok?this.r.stop():this.r.start()},proc(t){this.ui('🎤 ...');const r=this.nlp(t);this.ui('🎤 Готово');this.speak(r)},nlp(t){const tl=t.toLowerCase();if(/где.*лежит|найди.*товар/.test(tl)){const q=tl.replace(/где.*лежит|найди|товар/gi,'').trim();const w=App.data.g('wh').filter(x=>x.items?.some(i=>i.nm.toLowerCase().includes(q)));return w.length?`Нашёл: ${w.map(f=>`${f.c} (${f.items.find(i=>i.nm.toLowerCase().includes(q)).q} шт)`).join(', ')}`:`"${q}" не найден.`}if(/статистик|сводк|отчет/.test(tl)){const r=App.data.g('rcv').length,e=App.data.g('hr').filter(x=>x.sess).length;return `Статистика: Приёмок ${r}, на смене ${e} чел.`}if(/кто.*смен|на смен/.test(tl)){const o=App.data.g('hr').filter(x=>x.sess).map(x=>x.nm);return o.length?`На смене: ${o.join(', ')}`:'Никого нет.'}if(/привет|здравствуй/.test(tl))return'Привет! Готов помочь.';return `Понял: "${t}". Спросите: "Где товар?", "Статистика", "Кто на смене?"`},speak(t){if(!speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='ru-RU';u.onstart=()=>{this.spk=true;document.getElementById('micBtn').classList.add('listening')};u.onend=()=>{this.spk=false;document.getElementById('micBtn').classList.remove('listening')};speechSynthesis.speak(u)},ui(t){document.getElementById('micBtn').textContent=t}};

App.init();
</script>
