<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FBO Master WMS | Система Управления Складом</title>
<!-- Иконки и Шрифты -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Библиотеки для графики и штрихкодов -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.0/dist/JsBarcode.all.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
:root {
    --primary: #4f46e5; --primary-hover: #4338ca;
    --bg-light: #f3f4f6; --card-light: #ffffff; --text-light: #1f2937;
    --bg-dark: #0f172a; --card-dark: #1e293b; --text-dark: #f8fafc;
    --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
    --border-light: #e5e7eb; --border-dark: #334155;
    --radius: 12px; --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
}

/* Темы */
body.light-mode { --bg: var(--bg-light); --card: var(--card-light); --text: var(--text-light); --border: var(--border-light); }
body.dark-mode { --bg: var(--bg-dark); --card: var(--card-dark); --text: var(--text-dark); --border: var(--border-dark); }

* { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; height: 100vh; overflow: hidden; display: flex; }

/* Login Screen */
#login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
.login-box { background: var(--card); padding: 40px; border-radius: 20px; box-shadow: var(--shadow); width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
.login-logo { font-size: 40px; color: var(--primary); margin-bottom: 20px; }

/* Layout */
.sidebar { width: 260px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: transform 0.3s; z-index: 100; }
.main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
.top-bar { height: 60px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
.content-area { flex: 1; overflow-y: auto; padding: 20px; }

/* Nav */
.nav-item { padding: 12px 20px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: var(--text); opacity: 0.7; transition: 0.2s; font-weight: 500; }
.nav-item:hover, .nav-item.active { opacity: 1; background: rgba(79, 70, 229, 0.1); color: var(--primary); border-right: 3px solid var(--primary); }
.nav-icon { width: 20px; text-align: center; }

/* Components */
.btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 8px; transition: 0.2s; font-size: 14px; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-danger { background: var(--danger); color: white; }
.btn-success { background: var(--success); color: white; }
.card { background: var(--card); border-radius: var(--radius); padding: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 20px; }
.grid-dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 20px; }
.stat-card { display: flex; align-items: center; gap: 15px; }
.stat-icon { width: 50px; height: 50px; border-radius: 12px; background: rgba(79, 70, 229, 0.1); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 20px; }

/* Forms & Tables */
.form-group { margin-bottom: 15px; text-align: left; }
.form-label { display: block; margin-bottom: 5px; font-size: 12px; font-weight: 600; color: var(--text); opacity: 0.8; }
.form-control { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th { text-align: left; padding: 12px; background: rgba(0,0,0,0.05); font-weight: 600; font-size: 12px; text-transform: uppercase; }
td { padding: 12px; border-bottom: 1px solid var(--border); }
.badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
.badge-green { background: rgba(16, 185, 129, 0.1); color: var(--success); }
.badge-red { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

/* Specific Modules */
.warehouse-map { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
.cell { aspect-ratio: 1; border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; position: relative; }
.cell.occupied { background: rgba(245, 158, 11, 0.1); border-color: var(--warning); }
.cell.free { background: rgba(16, 185, 129, 0.1); border-color: var(--success); }

.employee-clock { text-align: center; padding: 40px; }
.clock-btn { width: 200px; height: 200px; border-radius: 50%; border: 8px solid var(--border); background: var(--card); font-size: 24px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto; }
.clock-btn.active { border-color: var(--success); color: var(--success); box-shadow: 0 0 30px rgba(16, 185, 129, 0.4); }

/* Print Styles (58x40mm) */
@media print {
    body * { visibility: hidden; }
    #print-area, #print-area * { visibility: visible; }
    #print-area { position: absolute; left: 0; top: 0; width: 58mm; height: 40mm; padding: 2mm; margin: 0; overflow: hidden; }
    .label-container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; text-align: center; }
    .label-title { font-size: 10px; font-weight: bold; margin-bottom: 2px; }
    .label-barcode { height: 25px; width: 100%; }
    .label-info { font-size: 8px; display: flex; justify-content: space-between; }
}

/* Mobile */
@media (max-width: 768px) {
    .sidebar { position: fixed; height: 100%; transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .mobile-menu-btn { display: block !important; }
}
.mobile-menu-btn { display: none; background: none; border: none; font-size: 20px; color: var(--text); cursor: pointer; }
</style>
</head>
<body class="light-mode">

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-box">
            <i class="fas fa-cubes login-logo"></i>
            <h2>FBO Master WMS</h2>
            <p style="margin-bottom: 20px; opacity: 0.7;">Система управления складом</p>
            <div class="form-group">
                <input type="text" id="login-user" class="form-control" placeholder="Логин (admin)">
            </div>
            <div class="form-group">
                <input type="password" id="login-pass" class="form-control" placeholder="Пароль (admin)">
            </div>
            <button class="btn btn-primary" style="width: 100%" onclick="app.login()">ВОЙТИ В СИСТЕМУ</button>
        </div>
    </div>

    <!-- APP STRUCTURE -->
    <aside class="sidebar" id="sidebar">
        <div style="padding: 20px; font-weight: 800; font-size: 18px; color: var(--primary); display: flex; align-items: center; gap: 10px;">
            <i class="fas fa-cubes"></i> FBO MASTER
        </div>
        <nav id="nav-menu">
            <!-- Generated by JS -->
        </nav>
        <div style="margin-top: auto; padding: 20px; border-top: 1px solid var(--border);">
            <div class="nav-item" onclick="app.toggleTheme()"><i class="fas fa-moon nav-icon"></i> Тема</div>
            <div class="nav-item" onclick="app.logout()"><i class="fas fa-sign-out-alt nav-icon"></i> Выход</div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')"><i class="fas fa-bars"></i></button>
                <h3 id="page-title">Дашборд</h3>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span id="user-display" class="badge badge-green">Admin</span>
                <div id="live-clock" style="font-weight: 600; font-size: 14px;"></div>
            </div>
        </header>

        <div id="content" class="content-area">
            <!-- Dynamic Content Here -->
        </div>
    </main>

    <!-- PRINT AREA (Hidden usually) -->
    <div id="print-area"></div>

<script>
/**
 * FBO MASTER WMS CORE
 * Модульная архитектура
 */

const DB = {
    // Имитация базы данных в LocalStorage
    get: (key) => JSON.parse(localStorage.getItem('fbo_wms_' + key) || '[]'),
    set: (key, data) => localStorage.setItem('fbo_wms_' + key, JSON.stringify(data)),
    add: (key, item) => {
        let data = DB.get(key);
        item.id = Date.now().toString(36) + Math.random().toString(36).substr(2);
        item.created_at = new Date().toISOString();
        data.push(item);
        DB.set(key, data);
        return item;
    },
    update: (key, id, newData) => {
        let data = DB.get(key);
        const index = data.findIndex(x => x.id === id);
        if(index !== -1) {
            data[index] = { ...data[index], ...newData };
            DB.set(key, data);
        }
    },
    delete: (key, id) => {
        let data = DB.get(key).filter(x => x.id !== id);
        DB.set(key, data);
    }
};

const Utils = {
    formatMoney: (n) => new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB' }).format(n),
    formatDate: (d) => new Date(d).toLocaleString('ru-RU'),
    generateBarcodeHTML: (code, type='CODE128') => `<svg class="jsbarcode"></svg>`,
    printLabel: (product) => {
        const area = document.getElementById('print-area');
        area.innerHTML = `
            <div class="label-container">
                <div class="label-title">${product.name}</div>
                <div class="label-title" style="font-size:8px; opacity:0.8">${product.sku || 'Без артикула'}</div>
                <img id="label-barcode-img" style="width:100%; height:25px;" />
                <div class="label-info">
                    <span>Арт: ${product.sku || '-'}</span>
                    <span>Годен до: ${product.expiry || '-'}</span>
                </div>
            </div>
        `;
        JsBarcode("#label-barcode-img", product.barcode || product.sku || "123456", {
            format: "CODE128",
            height: 25,
            displayValue: false,
            margin: 0
        });
        setTimeout(() => window.print(), 200);
    },
    exportToExcel: (data, filename) => {
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Data");
        XLSX.writeFile(wb, filename + ".xlsx");
    },
    fileToBase64: (file) => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    })
};

const app = {
    currentUser: null,
    activeSection: 'dashboard',
    
    init: () => {
        app.renderNav();
        setInterval(() => {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('ru-RU');
        }, 1000);
        
        // Проверка сессии
        if(localStorage.getItem('fbo_session')) {
            app.currentUser = JSON.parse(localStorage.getItem('fbo_session'));
            document.getElementById('login-screen').style.display = 'none';
            app.navigate('dashboard');
        }
    },

    login: () => {
        const u = document.getElementById('login-user').value;
        const p = document.getElementById('login-pass').value;
        if(u === 'admin' && p === 'admin') {
            app.currentUser = { name: 'Администратор', role: 'admin', id: 1 };
            localStorage.setItem('fbo_session', JSON.stringify(app.currentUser));
            document.getElementById('login-screen').style.display = 'none';
            app.navigate('dashboard');
        } else {
            alert('Неверный логин или пароль!');
        }
    },

    logout: () => {
        localStorage.removeItem('fbo_session');
        location.reload();
    },

    toggleTheme: () => {
        document.body.classList.toggle('light-mode');
        document.body.classList.toggle('dark-mode');
    },

    renderNav: () => {
        const menu = [
            { id: 'dashboard', icon: 'fa-chart-pie', label: 'Дашборд' },
            { id: 'warehouse', icon: 'fa-warehouse', label: 'Склад (Карта)' },
            { id: 'products', icon: 'fa-boxes', label: 'Товары' },
            { id: 'acceptance', icon: 'fa-dolly', label: 'Приемка (FBO)' },
            { id: 'shipment', icon: 'fa-truck-loading', label: 'Отгрузка' },
            { id: 'inventory', icon: 'fa-clipboard-check', label: 'Инвентаризация' },
            { id: 'employees', icon: 'fa-users', label: 'Сотрудники & KPI' },
            { id: 'tasks', icon: 'fa-tasks', label: 'Задачи' },
            { id: 'settings', icon: 'fa-cogs', label: 'Настройки / Интеграции' }
        ];
        
        document.getElementById('nav-menu').innerHTML = menu.map(item => `
            <div class="nav-item" onclick="app.navigate('${item.id}')">
                <i class="fas ${item.icon} nav-icon"></i> ${item.label}
            </div>
        `).join('');
    },

    navigate: (section) => {
        app.activeSection = section;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        // Simple highlight logic could be improved with IDs
        
        const content = document.getElementById('content');
        const title = document.getElementById('page-title');
        
        // Mobile sidebar close
        document.getElementById('sidebar').classList.remove('open');

        switch(section) {
            case 'dashboard':
                title.innerText = 'Обзор склада';
                modules.dashboard(content);
                break;
            case 'warehouse':
                title.innerText = 'Карта склада';
                modules.warehouse(content);
                break;
            case 'products':
                title.innerText = 'Номенклатура';
                modules.products(content);
                break;
            case 'acceptance':
                title.innerText = 'Приемка товара';
                modules.acceptance(content);
                break;
            case 'employees':
                title.innerText = 'Сотрудники и Контроль';
                modules.employees(content);
                break;
            case 'settings':
                title.innerText = 'Настройки и Интеграции';
                modules.settings(content);
                break;
            default:
                content.innerHTML = '<div class="card">Раздел в разработке...</div>';
        }
    }
};

const modules = {
    dashboard: (container) => {
        const products = DB.get('products');
        const employees = DB.get('employees');
        const fines = DB.get('fines');
        
        container.innerHTML = `
            <div class="grid-dashboard">
                <div class="card stat-card">
                    <div class="stat-icon"><i class="fas fa-box"></i></div>
                    <div><div style="font-size:24px; font-weight:bold">${products.length}</div><div style="opacity:0.7">Товаров</div></div>
                </div>
                <div class="card stat-card">
                    <div class="stat-icon" style="color:var(--success); background:rgba(16,185,129,0.1)"><i class="fas fa-users"></i></div>
                    <div><div style="font-size:24px; font-weight:bold">${employees.length}</div><div style="opacity:0.7">Сотрудников</div></div>
                </div>
                <div class="card stat-card">
                    <div class="stat-icon" style="color:var(--danger); background:rgba(239,68,68,0.1)"><i class="fas fa-exclamation-triangle"></i></div>
                    <div><div style="font-size:24px; font-weight:bold">${fines.length}</div><div style="opacity:0.7">Штрафов</div></div>
                </div>
            </div>
            
            <div style="display:grid; grid-template-columns: 2fr 1fr; gap:20px;">
                <div class="card">
                    <h4>Эффективность склада (Часы)</h4>
                    <canvas id="dashChart" height="150"></canvas>
                </div>
                <div class="card">
                    <h4>Быстрые действия</h4>
                    <button class="btn btn-primary" style="width:100%; margin-bottom:10px" onclick="app.navigate('acceptance')">📥 Новая приемка</button>
                    <button class="btn btn-success" style="width:100%; margin-bottom:10px" onclick="app.navigate('shipment')">📤 Отгрузка</button>
                    <button class="btn btn-danger" style="width:100%" onclick="app.navigate('inventory')">📋 Инвентаризация</button>
                </div>
            </div>
        `;
        
        // Chart
        new Chart(document.getElementById('dashChart'), {
            type: 'line',
            data: {
                labels: ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'],
                datasets: [{
                    label: 'Отгружено заказов',
                    data: [12, 19, 3, 5, 2, 3, 10],
                    borderColor: '#4f46e5',
                    tension: 0.4
                }]
            },
            options: { responsive: true, plugins: { legend: { display: false } } }
        });
    },

    products: (container) => {
        const products = DB.get('products');
        container.innerHTML = `
            <div class="card">
                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                    <input type="text" placeholder="Поиск по названию, SKU, ШК..." class="form-control" style="width:300px">
                    <div>
                        <button class="btn btn-primary" onclick="modules.products.addModal()"><i class="fas fa-plus"></i> Добавить</button>
                        <button class="btn btn-success" onclick="Utils.exportToExcel(DB.get('products'), 'Products_Export')"><i class="fas fa-file-excel"></i> Экспорт</button>
                    </div>
                </div>
                <table>
                    <thead><tr><th>Фото</th><th>Название</th><th>Артикул</th><th>ШК</th><th>Остаток</th><th>Ячейка</th><th>Действия</th></tr></thead>
                    <tbody>
                        ${products.map(p => `
                            <tr>
                                <td><img src="${p.photo || 'https://via.placeholder.com/40'}" style="width:40px; height:40px; border-radius:4px; object-fit:cover"></td>
                                <td>${p.name}</td>
                                <td>${p.sku}</td>
                                <td>${p.barcode}</td>
                                <td>${p.stock}</td>
                                <td>${p.cell_id || '-'}</td>
                                <td>
                                    <button class="btn btn-sm" onclick="Utils.printLabel(${JSON.stringify(p).replace(/"/g, '&quot;')})"><i class="fas fa-print"></i></button>
                                    <button class="btn btn-sm btn-danger" onclick="DB.delete('products','${p.id}'); app.navigate('products')"><i class="fas fa-trash"></i></button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    },

    products: {
        ...modules.products, // keep reference
        addModal: async () => {
            // Simplified modal via prompt for prototype, ideally use a real modal
            const name = prompt("Название товара:");
            if(!name) return;
            const sku = prompt("Артикул:");
            const barcode = prompt("Штрихкод:");
            
            // Photo simulation
            const photoInput = document.createElement('input');
            photoInput.type = 'file';
            photoInput.onchange = async e => {
                const base64 = await Utils.fileToBase64(e.target.files[0]);
                DB.add('products', { name, sku, barcode, stock: 0, photo: base64, cell_id: null });
                app.navigate('products');
            };
            photoInput.click();
        }
    },

    warehouse: (container) => {
        // Generate Grid A1 to C5 for demo
        let cellsHTML = '';
        const rows = ['A','B','C','D','E'];
        const cols = [1,2,3,4,5,6];
        
        const products = DB.get('products');

        rows.forEach(r => {
            cols.forEach(c => {
                const cellId = `${r}${c}`;
                const item = products.find(p => p.cell_id === cellId);
                cellsHTML += `
                    <div class="cell ${item ? 'occupied' : 'free'}" onclick="modules.warehouse.cellClick('${cellId}', '${item ? item.name : ''}')">
                        <strong>${cellId}</strong>
                        ${item ? '<i class="fas fa-box" style="margin-top:5px"></i>' : ''}
                    </div>
                `;
            });
        });

        container.innerHTML = `
            <div class="card">
                <h4>Схема склада (Онлайн)</h4>
                <div style="margin-bottom:10px; font-size:12px; opacity:0.7">
                    <span style="color:var(--success)">■</span> Свободно 
                    <span style="color:var(--warning); margin-left:10px">■</span> Занято
                </div>
                <div class="warehouse-map">
                    ${cellsHTML}
                </div>
            </div>
        `;
    },
    
    warehouse: {
        ...modules.warehouse,
        cellClick: (id, content) => {
            alert(`Ячейка: ${id}\nСодержимое: ${content || 'Пусто'}`);
        }
    },

    acceptance: (container) => {
        container.innerHTML = `
            <div class="card">
                <h3>📥 Приемка товара (FBO)</h3>
                <div class="form-group">
                    <label class="form-label">Сканер ШК / Ввод вручную</label>
                    <input type="text" id="acc-scan" class="form-control" autofocus onkeypress="if(event.key==='Enter') modules.acceptance.processScan(this.value)">
                </div>
                <div id="acc-result"></div>
            </div>
            <div class="card">
                <h4>Текущая поставка</h4>
                <table id="acc-table">
                    <thead><tr><th>Товар</th><th>Кол-во</th><th>Статус</th></tr></thead>
                    <tbody></tbody>
                </table>
                <button class="btn btn-primary" style="margin-top:15px" onclick="alert('Поставка сохранена и отправлена в 1С (эмуляция)')">✅ Завершить приемку</button>
            </div>
        `;
    },
    
    acceptance: {
        ...modules.acceptance,
        processScan: (code) => {
            const resDiv = document.getElementById('acc-result');
            // Mock lookup
            const prod = DB.get('products').find(p => p.barcode === code) || { name: 'Новый товар ('+code+')' };
            
            resDiv.innerHTML = `<div class="badge badge-green" style="margin-top:10px; padding:10px;">Распознан: ${prod.name}</div>`;
            
            // Add to temp table
            const tbody = document.querySelector('#acc-table tbody');
            tbody.innerHTML += `<tr><td>${prod.name}</td><td>1</td><td><span class="badge badge-green">OK</span></td></tr>`;

        container.innerHTML = `

                                    <div style="font-size:12px; opacity:0.7">Ставка: ${e.rate} ₽/ч</div>
                                </div>
                                <div style="text-align:right">
                                    <div class="badge ${e.status === 'work' ? 'badge-green' : 'badge-red'}">${e.status === 'work' ? 'РАБОТАЕТ' : 'ОФФЛАЙН'}</div>

                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
            
            <div class="card">
                <h4>Штрафы и Поощрения</h4>
                <button class="btn btn-danger" onclick="modules.employees.fineModal()">Выписать штраф</button>
                <!-- Table of fines would go here -->
            </div>
        `;
    },
    
    employees: {
        ...modules.employees,
        addEmp: async () => {
            const name = prompt("ФИО Сотрудника:");
            const rate = prompt("Ставка в час:");
            
            // Генерация QR кода при создании
            const empId = Date.now().toString();
            
            // Фото
            const photoInput = document.createElement('input');
            photoInput.type = 'file';
            photoInput.onchange = async e => {
                const base64 = await Utils.fileToBase64(e.target.files[0]);
                DB.add('employees', { 
                    name, rate, photo: base64, status: 'offline', last_action: '-', qr_data: empId 
                });
                app.navigate('employees');
            };
            photoInput.click();
        },
        handleClock: (val) => {
            // Logic to find employee by QR val and toggle status
            alert(`Сканирован ID: ${val}. Время зафиксировано.`);
            // Update logic here
        },
        fineModal: () => {
             alert("Модальное окно штрафа: Выбор сотрудника -> Причина -> Сумма -> Фото фиксация");
        }

            <div class="card">
