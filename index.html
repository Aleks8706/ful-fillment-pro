<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart HRM & WMS v2.0</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0f172a; --bg-panel: #1e293b; --bg-hover: #334155; --bg-input: #0b1120;
      --text: #f8fafc; --text-muted: #94a3b8; --primary: #3b82f6; --primary-dark: #2563eb;
      --success: #22c55e; --danger: #ef4444; --warning: #f59e0b; --info: #0ea5e9;
      --border: #334155; --radius: 12px; --shadow: 0 4px 12px rgba(0,0,0,0.35);
      --font: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    [data-theme="light"] {
      --bg: #f1f5f9; --bg-panel: #ffffff; --bg-hover: #e2e8f0; --bg-input: #ffffff;
      --text: #0f172a; --text-muted: #64748b; --border: #cbd5e1;
      --shadow: 0 4px 12px rgba(0,0,0,0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font); }
    body { background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; transition: background 0.3s, color 0.3s; }
    .hidden { display: none !important; }
    .btn { padding: 0.6rem 1.2rem; border: none; border-radius: var(--radius); cursor: pointer; font-weight: 500; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.4rem; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { background: var(--bg-hover); }
    .input, .select { width: 100%; padding: 0.75rem; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 0.95rem; }
    .input:focus, .select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px rgba(59,130,246,0.3); }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { padding: 0.9rem 0.6rem; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
    th { color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.5px; }
    tr:hover td { background: var(--bg-hover); }
    .card { background: var(--bg-panel); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: var(--shadow); }
    .grid { display: grid; gap: 1.2rem; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .flex { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; }
    .badge { padding: 0.25rem 0.6rem; border-radius: 99px; font-size: 0.75rem; font-weight: 600; white-space: nowrap; }
    .badge-ok { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid rgba(34,197,94,0.3); }
    .badge-warn { background: rgba(245,158,11,0.15); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
    .badge-err { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); }
    .badge-info { background: rgba(14,165,233,0.15); color: var(--info); border: 1px solid rgba(14,165,233,0.3); }
    header { background: var(--bg-panel); padding: 0.8rem 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
    nav { background: var(--bg-panel); padding: 0.6rem 1.5rem; display: flex; gap: 0.5rem; border-bottom: 1px solid var(--border); overflow-x: auto; }
    nav button { background: transparent; color: var(--text-muted); border: none; padding: 0.5rem 0.8rem; cursor: pointer; border-radius: var(--radius); transition: 0.2s; font-weight: 500; }
    nav button.active, nav button:hover { background: var(--bg-hover); color: var(--text); }
    main { padding: 1.5rem; max-width: 1600px; margin: 0 auto; }
    .login-box { width: 100%; max-width: 420px; margin: 12vh auto; background: var(--bg-panel); padding: 2.5rem; border-radius: var(--radius); box-shadow: var(--shadow); }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(4px); }
    .modal-content { background: var(--bg-panel); padding: 2rem; border-radius: var(--radius); width: 95%; max-width: 700px; max-height: 90vh; overflow-y: auto; position: relative; }
    .close-modal { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-muted); }
    .toast { position: fixed; top: 1rem; right: 1rem; padding: 1rem 1.2rem; background: var(--bg-panel); border-left: 4px solid var(--primary); border-radius: var(--radius); z-index: 200; animation: slide 0.3s; box-shadow: var(--shadow); max-width: 320px; }
    @keyframes slide { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .stat-val { font-size: 2.2rem; font-weight: 700; margin: 0.3rem 0; line-height: 1; }
    .stat-label { color: var(--text-muted); font-size: 0.85rem; }
    .search-box { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .search-box input { max-width: 300px; }
    @media (max-width: 768px) { nav { padding: 0.5rem; } .grid { grid-template-columns: 1fr; } .flex { flex-direction: column; align-items: stretch; } }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2 style="margin-bottom:1.5rem; text-align:center; font-weight:700;">📦 Smart HRM & WMS</h2>
    <input type="text" id="login-user" class="input" placeholder="Логин" style="margin-bottom:1rem;">
    <input type="password" id="login-pass" class="input" placeholder="Пароль" style="margin-bottom:1rem;">
    <button onclick="Auth.login()" class="btn btn-primary" style="width:100%;">Войти в систему</button>
    <p style="margin-top:1rem; text-align:center; font-size:0.8rem; color:var(--text-muted);">
      Демо: <b>admin</b> / admin123 &nbsp;|&nbsp; <b>manager</b> / manager123 &nbsp;|&nbsp; <b>operator</b> / operator123
    </p>
  </div>
</div>

<div id="app" class="hidden">
  <header>
    <h3 style="display:flex;align-items:center;gap:0.5rem;">📊 Smart System <span class="badge badge-info">v2.0</span></h3>
    <div class="flex">
      <button onclick="UI.toggleTheme()" class="btn btn-ghost" title="Сменить тему">🌓</button>
      <button onclick="UI.exportBackup()" class="btn btn-ghost">💾 Бэкап</button>
      <span id="user-badge" class="badge"></span>
      <button onclick="Auth.logout()" class="btn btn-danger">Выйти</button>
    </div>
  </header>
  <nav id="nav"></nav>
  <main id="content"></main>
</div>

<div id="modal" class="hidden modal">
  <div class="modal-content">
    <button class="close-modal" onclick="UI.closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ==========================================
// 💾 DATA LAYER (Versioned LocalStorage + Ledger)
// ==========================================
const DB = {
  v: 3,
  key: () => `smarthrm_wms_v${DB.v}`,
  defaults: {
    users: [
      { id: 'u1', username: 'admin', pass: 'admin123', role: 'admin', active: true, created: new Date().toISOString() },
      { id: 'u2', username: 'manager', pass: 'manager123', role: 'manager', active: true, created: new Date().toISOString() },
      { id: 'u3', username: 'operator', pass: 'operator123', role: 'operator', active: true, created: new Date().toISOString() }
    ],
    employees: [
      { id: 'e1', userId: 'u3', fullName: 'Иванов И.И.', dept: 'Склад', position: 'Оператор ТСД', hireDate: '2024-01-15', status: 'active' },
      { id: 'e2', userId: 'u2', fullName: 'Петрова А.С.', dept: 'Логистика', position: 'Менеджер', hireDate: '2023-11-05', status: 'active' }
    ],
    products: [
      { id: 'p1', sku: 'BOLT-M10', name: 'Болт М10x50', unit: 'шт', minStock: 50, category: 'Крепёж' },
      { id: 'p2', sku: 'NUT-M10', name: 'Гайка М10', unit: 'шт', minStock: 100, category: 'Крепёж' },
      { id: 'p3', sku: 'BOX-A1', name: 'Коробка транспортная', unit: 'уп', minStock: 20, category: 'Тара' }
    ],
    batches: [
      { id: 'b1', productId: 'p1', batch: 'B-2024-001', expiry: '2026-12-31', supplier: 'Завод №1', cost: 12.5 },
      { id: 'b2', productId: 'p2', batch: 'B-2024-002', expiry: null, supplier: 'ИП Сидоров', cost: 8.2 }
    ],
    locations: [
      { id: 'l1', code: 'Z-A-01', name: 'Зона А, Стеллаж 1' },
      { id: 'l2', code: 'Z-B-02', name: 'Зона Б, Стеллаж 2' }
    ],
    movements: [],
    leaves: [],
    inventory: [],
    audit: [],
    settings: { theme: 'dark', companyName: 'ООО "ЛогистикПром"' }
  },
  get() {
    try { return JSON.parse(localStorage.getItem(DB.key())) || DB.defaults; } catch { return DB.defaults; }
  },
  save(d) { localStorage.setItem(DB.key(), JSON.stringify(d)); },
  init() {
    if (!localStorage.getItem(DB.key())) DB.save(DB.defaults);
    // Integrity check
    const d = DB.get();
    if (!d.audit) d.audit = []; if (!d.inventory) d.inventory = []; if (!d.settings) d.settings = DB.defaults.settings;
    DB.save(d);
  },
  ledger(productId) {
    const d = DB.get();
    return d.movements.filter(m => m.productId === productId && m.status === 'posted')
      .reduce((sum, m) => sum + (m.type === 'IN' || m.type === 'ADJUST_POS' || m.type === 'COUNT_POS' ? m.qty : -m.qty), 0);
  },
  auditLog(entity, entityId, action) {
    const d = DB.get();
    d.audit.unshift({ id: `a${Date.now()}`, user: Auth.user?.username || 'system', entity, entityId, action, ts: new Date().toISOString() });
    if (d.audit.length > 2000) d.audit = d.audit.slice(0, 1500);
    DB.save(d);
  }
};

// ==========================================
// 🔐 AUTH & RBAC
// ==========================================
const Auth = {
  user: null,
  roles: {
    admin: ['admin','manager','operator'],
    manager: ['manager','operator'],
    operator: ['operator']
  },
  login() {
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value.trim();
    const d = DB.get();
    const found = d.users.find(x => x.username === u && x.pass === p && x.active);
    if (!found) return UI.toast('❌ Неверный логин или пароль', 'err');
    Auth.user = found;
    localStorage.setItem('session', JSON.stringify({ uid: found.id, ts: Date.now() }));
    DB.auditLog('auth', found.id, 'login');
    UI.renderApp();
  },
  logout() {
    DB.auditLog('auth', Auth.user?.id, 'logout');
    localStorage.removeItem('session');
    location.reload();
  },
  checkRole(required) {
    if (Auth.user.role === 'admin') return true;
    if (Auth.roles[Auth.user.role]?.includes(required)) return true;
    UI.toast('🔒 Недостаточно прав', 'err'); return false;
  },
  initSession() {
    const s = JSON.parse(localStorage.getItem('session'));
    if (s && Date.now() - s.ts < 8*3600*1000) {
      const d = DB.get();
      const u = d.users.find(x => x.id === s.uid);
      if (u) { Auth.user = u; UI.renderApp(); return; }
    }
    document.getElementById('login-screen').classList.remove('hidden');
  }
};

// ==========================================
// 📦 WMS ENGINE
// ==========================================
const WMS = {
  addMovement(data) {
    const d = DB.get();
    if (data.type === 'OUT' && DB.ledger(data.productId) < data.qty) return UI.toast('❌ Недостаточный остаток', 'err');
    const mov = { id: `m${Date.now()}`, ...data, status: 'posted', synced: false, ts: new Date().toISOString() };
    d.movements.push(mov);
    DB.auditLog('movement', mov.id, 'create');
    DB.save(d);
    UI.toast('✅ Движение проведено', 'ok');
    return mov;
  },
  startInventory() {
    const d = DB.get();
    const inv = { id: `i${Date.now()}`, status: 'draft', created: new Date().toISOString(), user: Auth.user.id, items: [] };
    d.products.forEach(p => inv.items.push({ productId: p.id, systemQty: DB.ledger(p.id), actualQty: null, diff: null, note: '' }));
    d.inventory.push(inv);
    DB.auditLog('inventory', inv.id, 'start');
    DB.save(d);
    return inv;
  },
  postInventory(invId) {
    const d = DB.get();
    const inv = d.inventory.find(i => i.id === invId);
    if (!inv || inv.status !== 'draft') return UI.toast('❌ Инвентаризация не в черновике', 'err');
    inv.status = 'completed';
    inv.items.forEach(item => {
      if (item.actualQty === null || item.actualQty === item.systemQty) return;
      const diff = item.actualQty - item.systemQty;
      WMS.addMovement({ productId: item.productId, type: diff > 0 ? 'COUNT_POS' : 'COUNT_NEG', qty: Math.abs(diff), locationId: 'l1', refDoc: invId, note: `Инвентаризация ${invId}` });
      item.diff = diff;
    });
    DB.save(d);
    UI.toast('✅ Инвентаризация проведена', 'ok');
  }
};

// ==========================================
// 🔄 1C SYNC SIMULATOR
// ==========================================
const Sync1C = {
  queue() { return DB.get().movements.filter(m => !m.synced); },
  async push() {
    const queue = Sync1C.queue();
    if (!queue.length) return UI.toast('ℹ️ Все движения синхронизированы', 'info');
    UI.toast('🔄 Отправка в 1С...', 'info');
    // Simulate network delay
    await new Promise(r => setTimeout(r, 800));
    const d = DB.get();
    queue.forEach(m => m.synced = true);
    DB.auditLog('sync', queue.length, '1c_push');
    DB.save(d);
    UI.toast(`🚀 Успешно отправлено: ${queue.length}`, 'ok');
    UI.render();
  },
  exportJSON() {
    const d = DB.get();
    const blob = new Blob([JSON.stringify(d, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `backup_${new Date().toISOString().slice(0,10)}.json`; a.click();
  },
  importJSON(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.users || !data.products) throw 'Invalid structure';
        DB.save(data);
        UI.toast('✅ Данные восстановлены', 'ok');
        location.reload();
      } catch(err) { UI.toast('❌ Ошибка импорта: ' + err, 'err'); }
    };
    reader.readAsText(file);
  }
};

// ==========================================
// 🖥️ UI RENDERER
// ==========================================
const UI = {
  tabs: [
    { id: 'dash', label: '📊 Дашборд', roles: ['operator'] },
    { id: 'wms', label: '📦 Склад', roles: ['operator'] },
    { id: 'hr', label: '👥 Персонал', roles: ['manager'] },
    { id: 'inv', label: '🔍 Инвентаризация', roles: ['operator'] },
    { id: 'sync', label: '🔄 1С Синхронизация', roles: ['manager'] },
    { id: 'admin', label: '⚙️ Управление', roles: ['admin'] }
  ],
  activeTab: 'dash',
  charts: {},
  renderApp() {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('user-badge').textContent = `${Auth.user.username} | ${Auth.user.role}`;
    document.getElementById('nav').innerHTML = UI.tabs.filter(t => Auth.checkRole(t.roles[0])).map(t => 
      `<button data-tab="${t.id}" class="${t.id===UI.activeTab?'active':''}" onclick="UI.switchTab('${t.id}')">${t.label}</button>`
    ).join('');
    UI.render();
    if (localStorage.getItem('theme') === 'light') document.documentElement.setAttribute('data-theme', 'light');
  },
  switchTab(id) {
    UI.activeTab = id;
    document.querySelectorAll('#nav button').forEach(b => b.classList.toggle('active', b.dataset.tab===id));
    UI.render();
  },
  render() {
    const c = document.getElementById('content');
    if (UI.activeTab === 'dash') c.innerHTML = UI.viewDash();
    else if (UI.activeTab === 'wms') c.innerHTML = UI.viewWMS();
    else if (UI.activeTab === 'hr') c.innerHTML = UI.viewHR();
    else if (UI.activeTab === 'inv') c.innerHTML = UI.viewInv();
    else if (UI.activeTab === 'sync') c.innerHTML = UI.viewSync();
    else if (UI.activeTab === 'admin') c.innerHTML = UI.viewAdmin();
    setTimeout(UI.initCharts, 100);
  },
  viewDash() {
    const d = DB.get();
    const stock = d.products.map(p => ({ id: p.id, name: p.name, qty: DB.ledger(p.id), min: p.minStock }));
    const low = stock.filter(s => s.qty < s.min).length;
    const moves = d.movements.length;
    const leaves = d.leaves.filter(l => l.status === 'approved').length;
    return `
      <div class="grid">
        <div class="card"><div class="stat-val" style="color:var(--primary)">${d.products.length}</div><div class="stat-label">Позиций в справочнике</div></div>
        <div class="card"><div class="stat-val" style="color:${low?'var(--warning)':'var(--success)'}">${low}</div><div class="stat-label">Позиций ниже минимума</div></div>
        <div class="card"><div class="stat-val">${moves}</div><div class="stat-label">Всего движений</div></div>
        <div class="card"><div class="stat-val">${leaves}</div><div class="stat-label">Утверждённых отпусков</div></div>
      </div>
      <div class="grid" style="grid-template-columns: 2fr 1fr; margin-top:1.5rem;">
        <div class="card"><canvas id="chart-stock"></canvas></div>
        <div class="card"><h3 style="margin-bottom:1rem;">⚡ Быстрые действия</h3>
          <div class="flex" style="flex-direction:column; gap:0.5rem;">
            <button onclick="UI.modal('move')" class="btn btn-primary">📦 Новое движение</button>
            <button onclick="WMS.startInventory();UI.render();" class="btn btn-success">📋 Начать инвентаризацию</button>
            <button onclick="Sync1C.push()" class="btn btn-ghost">🔄 Синхронизировать 1С</button>
          </div>
        </div>
      </div>`;
  },
  viewWMS() {
    const d = DB.get();
    const rows = d.products.map(p => {
      const qty = DB.ledger(p.id);
      const cls = qty < p.minStock ? 'badge-warn' : 'badge-ok';
      return `<tr><td>${p.sku}</td><td>${p.name}</td><td>${p.category}</td><td><span class="badge ${cls}">${qty} ${p.unit}</span></td>
        <td><button class="btn btn-ghost" onclick="UI.modal('move','${p.id}')">+</button></td></tr>`;
    }).join('');
    return `<div class="card"><div class="flex"><h3>📦 Остатки склада</h3><div class="search-box"><input id="s-wms" class="input" placeholder="Поиск..." oninput="UI.filterTable(this,'wms-table')"></div></div>
      <table id="wms-table"><thead><tr><th>Артикул</th><th>Название</th><th>Категория</th><th>Остаток</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
  },
  viewHR() {
    const d = DB.get();
    const emps = d.employees.map(e => `<tr><td>${e.fullName}</td><td>${e.dept}</td><td>${e.position}</td><td><span class="badge ${e.status==='active'?'badge-ok':'badge-err'}">${e.status}</span></td></tr>`).join('');
    const leaves = d.leaves.map(l => `<tr><td>${l.employeeName}</td><td>${l.type}</td><td>${l.start} → ${l.end}</td><td><span class="badge badge-${l.status==='approved'?'ok':l.status==='rejected'?'err':'warn'}">${l.status}</span></td>
      ${l.status==='pending' ? `<td><button class="btn btn-success" onclick="HR.approve('${l.id}')">✓</button> <button class="btn btn-danger" onclick="HR.reject('${l.id}')">✕</button></td>` : '<td>-</td>'}</tr>`).join('');
    return `<div class="grid"><div class="card"><h3>👥 Сотрудники</h3><table><thead><tr><th>ФИО</th><th>Отдел</th><th>Должность</th><th>Статус</th></tr></thead><tbody>${emps}</tbody></table></div>
      <div class="card"><div class="flex"><h3>📅 Заявки на отпуск</h3><button class="btn btn-primary" onclick="UI.modal('leave')">+ Новая</button></div>
      <table><thead><tr><th>Сотрудник</th><th>Тип</th><th>Период</th><th>Статус</th><th>Действия</th></tr></thead><tbody>${leaves||'<tr><td colspan="5">Нет заявок</td></tr>'}</tbody></table></div></div>`;
  },
  viewInv() {
    const d = DB.get();
    const rows = d.inventory.slice().reverse().map(i => `<tr><td>${i.id}</td><td>${new Date(i.created).toLocaleDateString()}</td><td><span class="badge badge-${i.status==='completed'?'ok':'warn'}">${i.status}</span></td><td><button class="btn btn-ghost" onclick="UI.openInv('${i.id}')">Открыть</button></td></tr>`).join('');
    return `<div class="card"><div class="flex"><h3>🔍 Инвентаризации</h3><button class="btn btn-primary" onclick="WMS.startInventory();UI.render();">+ Начать</button></div>
      <table><thead><tr><th>ID</th><th>Дата</th><th>Статус</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
  },
  viewSync() {
    const q = Sync1C.queue();
    const rows = q.map(m => `<tr><td>${m.id}</td><td>${m.type}</td><td>${m.qty}</td><td>Ожидает</td></tr>`).join('');
    return `<div class="card"><h3>🔄 Обмен с 1С:Бухгалтерия</h3>
      <p style="margin:0.5rem 0 1rem;color:var(--text-muted)">Отправка проведённых движений в учётную систему. Очередь хранится локально.</p>
      <div class="flex">
        <button onclick="Sync1C.push()" class="btn btn-success">🚀 Отправить очередь (${q.length})</button>
        <button onclick="Sync1C.exportJSON()" class="btn btn-ghost">📥 Экспорт JSON</button>
        <label class="btn btn-ghost">📤 Импорт <input type="file" hidden onchange="Sync1C.importJSON(this.files[0])"></label>
      </div>
      <table style="margin-top:1.5rem;"><thead><tr><th>ID</th><th>Тип</th><th>Кол-во</th><th>Статус</th></tr></thead><tbody>${rows||'<tr><td colspan="4">Очередь пуста ✅</td></tr>'}</tbody></table></div>`;
  },
  viewAdmin() {
    const d = DB.get();
    const users = d.users.map(u => `<tr><td>${u.username}</td><td>${u.role}</td><td><span class="badge ${u.active?'badge-ok':'badge-err'}">${u.active?'Активен':'Заблокирован'}</span></td>
      <td><button class="btn btn-ghost" onclick="Admin.toggleUser('${u.id}')">🔄</button></td></tr>`).join('');
    const logs = d.audit.slice(0,50).map(a => `<tr><td>${new Date(a.ts).toLocaleString()}</td><td>${a.user}</td><td>${a.entity}</td><td>${a.action}</td></tr>`).join('');
    return `<div class="grid">
      <div class="card"><div class="flex"><h3>👤 Пользователи</h3><button class="btn btn-primary" onclick="UI.modal('user')">+ Добавить</button></div>
        <table><thead><tr><th>Логин</th><th>Роль</th><th>Статус</th><th></th></tr></thead><tbody>${users}</tbody></table></div>
      <div class="card"><h3>📜 Аудит (последние 50)</h3><table><thead><tr><th>Время</th><th>Пользователь</th><th>Объект</th><th>Действие</th></tr></thead><tbody>${logs}</tbody></table></div>
    </div>`;
  },

  // MODALS & FORMS
  modal(type, presetId=null) {
    document.getElementById('modal').classList.remove('hidden');
    const m = document.getElementById('modal-body');
    if (type === 'move') {
      const d = DB.get();
      const opts = d.products.map(p => `<option value="${p.id}" ${presetId===p.id?'selected':''}>${p.name} (${p.sku}) [${DB.ledger(p.id)} шт]</option>`).join('');
      m.innerHTML = `<h3>📦 Движение товара</h3>
        <select id="m-prod" class="select" style="margin:0.5rem 0">${opts}</select>
        <div class="grid" style="grid-template-columns:1fr 1fr">
          <select id="m-type" class="select"><option value="IN">Приход</option><option value="OUT">Расход</option><option value="ADJUST_POS">Коррекция (+)</option><option value="ADJUST_NEG">Коррекция (-)</option></select>
          <input id="m-qty" type="number" class="input" placeholder="Количество">
        </div>
        <select id="m-loc" class="select" style="margin:0.5rem 0">${d.locations.map(l=>`<option value="${l.id}">${l.name}</option>`).join('')}</select>
        <input id="m-ref" class="input" placeholder="№ накладной / заказа">
        <button onclick="WMS.addMovement({productId:document.getElementById('m-prod').value,type:document.getElementById('m-type').value,qty:parseFloat(document.getElementById('m-qty').value),locationId:document.getElementById('m-loc').value,refDoc:document.getElementById('m-ref').value});UI.closeModal();UI.render();" class="btn btn-success" style="margin-top:1rem;width:100%">Провести</button>`;
    } else if (type === 'leave') {
      m.innerHTML = `<h3>📅 Заявка на отпуск</h3>
        <input id="l-emp" class="input" placeholder="ФИО сотрудника" style="margin:0.5rem 0">
        <select id="l-type" class="select"><option value="vacation">Отпуск</option><option value="sick">Больничный</option></select>
        <div class="grid" style="margin:0.5rem 0"><input id="l-start" type="date" class="input"><input id="l-end" type="date" class="input"></div>
        <button onclick="HR.addLeave();UI.closeModal();" class="btn btn-primary" style="margin-top:1rem;width:100%">Отправить</button>`;
    } else if (type === 'user') {
      m.innerHTML = `<h3>👤 Новый пользователь</h3>
        <input id="u-name" class="input" placeholder="Логин" style="margin:0.5rem 0">
        <input id="u-pass" type="password" class="input" placeholder="Пароль" style="margin:0.5rem 0">
        <select id="u-role" class="select"><option value="operator">Оператор</option><option value="manager">Менеджер</option><option value="admin">Администратор</option></select>
        <button onclick="Admin.addUser();UI.closeModal();" class="btn btn-primary" style="margin-top:1rem;width:100%">Создать</button>`;
    }
  },
  closeModal() { document.getElementById('modal').classList.add('hidden'); },
  openInv(id) {
    const d = DB.get(); const inv = d.inventory.find(i => i.id === id);
    if (!inv) return;
    const rows = inv.items.map((item, idx) => {
      const p = d.products.find(x => x.id === item.productId);
      return `<tr><td>${p.sku} ${p.name}</td><td>${item.systemQty}</td><td><input type="number" value="${item.actualQty!==null?item.actualQty:''}" class="input" style="width:80px" onchange="UI.updateInv('${id}',${idx},this.value)"></td><td>${item.diff!==null?item.diff:'-'}</td></tr>`;
    }).join('');
    document.getElementById('modal').classList.remove('hidden');
    document.getElementById('modal-body').innerHTML = `<h3>🔍 Инвентаризация ${id}</h3><table><thead><tr><th>Товар</th><th>Система</th><th>Факт</th><th>Разница</th></tr></thead><tbody>${rows}</tbody></table>
      <button onclick="WMS.postInventory('${id}');UI.closeModal();UI.render();" class="btn btn-success" style="margin-top:1rem;width:100%">Провести и списать/оприходовать</button>`;
  },
  updateInv(invId, idx, val) {
    const d = DB.get(); const inv = d.inventory.find(i => i.id === invId);
    inv.items[idx].actualQty = val === '' ? null : parseFloat(val);
    inv.items[idx].diff = inv.items[idx].actualQty === null ? null : inv.items[idx].actualQty - inv.items[idx].systemQty;
    DB.save(d);
  },

  // HELPERS
  filterTable(input, tableId) {
    const q = input.value.toLowerCase();
    document.querySelectorAll(`#${tableId} tbody tr`).forEach(r => {
      r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  },
  toast(msg, type='info') {
    const t = document.createElement('div'); t.className = 'toast';
    t.style.borderLeftColor = type==='err'?'var(--danger)':type==='ok'?'var(--success)':'var(--primary)';
    t.textContent = msg; document.body.appendChild(t); setTimeout(()=>t.remove(), 3000);
  },
  toggleTheme() {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    document.documentElement.setAttribute('data-theme', isLight ? 'dark' : 'light');
    localStorage.setItem('theme', isLight ? 'dark' : 'light');
  },
  exportBackup() { Sync1C.exportJSON(); UI.toast('💾 Бэкап сохранён', 'ok'); },
  initCharts() {
    if (UI.activeTab !== 'dash') return;
    const ctx = document.getElementById('chart-stock'); if (!ctx) return;
    if (UI.charts.stock) UI.charts.stock.destroy();
    const d = DB.get();
    const labels = d.products.map(p => p.name);
    const data = d.products.map(p => DB.ledger(p.id));
    UI.charts.stock = new Chart(ctx.getContext('2d'), {
      type: 'bar', data: { labels, datasets: [{ label: 'Остаток', data, backgroundColor: 'rgba(59,130,246,0.6)', borderColor: 'var(--primary)', borderWidth: 1 }] },
      options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: 'var(--border)' } }, x: { grid: { display: false } } } }
    });
  }
};

// ==========================================
// 👥 HR LOGIC
// ==========================================
const HR = {
  addLeave() {
    const d = DB.get();
    const emp = document.getElementById('l-emp').value.trim();
    if (!emp) return UI.toast('❌ Укажите ФИО', 'err');
    const l = { id: `l${Date.now()}`, employeeName: emp, type: document.getElementById('l-type').value, start: document.getElementById('l-start').value, end: document.getElementById('l-end').value, status: 'pending', approver: null };
    d.leaves.push(l); DB.save(d); UI.toast('✅ Заявка создана', 'ok'); UI.render();
  },
  approve(id) {
    const d = DB.get(); const l = d.leaves.find(x => x.id === id);
    if (!l) return; l.status = 'approved'; l.approver = Auth.user.id;
    DB.save(d); UI.toast('✅ Согласовано', 'ok'); UI.render();
  },
  reject(id) {
    const d = DB.get(); const l = d.leaves.find(x => x.id === id);
    if (!l) return; l.status = 'rejected'; l.approver = Auth.user.id;
    DB.save(d); UI.toast('❌ Отклонено', 'err'); UI.render();
  }
};

// ==========================================
// ⚙️ ADMIN LOGIC
// ==========================================
const Admin = {
  addUser() {
    const d = DB.get();
    const u = document.getElementById('u-name').value.trim();
    const p = document.getElementById('u-pass').value.trim();
    const r = document.getElementById('u-role').value;
    if (!u || !p) return UI.toast('❌ Заполните логин и пароль', 'err');
    if (d.users.some(x => x.username === u)) return UI.toast('❌ Логин занят', 'err');
    d.users.push({ id: `u${Date.now()}`, username: u, pass: p, role: r, active: true, created: new Date().toISOString() });
    DB.auditLog('user', u, 'create'); DB.save(d); UI.toast('✅ Пользователь создан', 'ok'); UI.render();
  },
  toggleUser(id) {
    const d = DB.get(); const u = d.users.find(x => x.id === id);
    if (!u || u.username === 'admin') return UI.toast('⚠️ Нельзя менять админа', 'warn');
    u.active = !u.active; DB.save(d); UI.render();
  }
};

// ==========================================
// 🚀 INIT
// ==========================================
document.addEventListener('DOMContentLoaded', () => {
  DB.init();
  Auth.initSession();
  document.getElementById('login-pass').onkeydown = e => e.key === 'Enter' && Auth.login();
});
</script>
</body>
