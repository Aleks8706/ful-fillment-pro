<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Фулфилмент Про v13.0</title>
<style>
:root{--p:#6366f1;--pd:#4f46e5;--s:#10b981;--d:#ef4444;--w:#f59e0b;--bg:#0f172a;--card:#1e293b;--input:#334155;--text:#f1f5f9;--muted:#94a3b8;--border:#334155;--r:12px}
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
.sidebar{width:240px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .3s}
.sidebar .logo{padding:20px;font-size:18px;font-weight:700;border-bottom:1px solid var(--border)}
.sidebar .logo span{color:var(--p)}
.sidebar nav{flex:1;overflow-y:auto;padding:10px 0}
.sidebar a{display:flex;align-items:center;gap:10px;padding:10px 16px;color:var(--muted);font-size:14px;cursor:pointer;transition:.2s}
.sidebar a:hover,.sidebar a.active{background:var(--input);color:var(--text);border-left:3px solid var(--p)}
.sidebar .sec{padding:15px 16px 4px;font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:1px;margin-top:10px}
.sidebar .foot{padding:15px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:rgba(15,23,42,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;justify-content:space-between;z-index:50}
.topbar h1{font-size:18px;font-weight:600}
.topbar .acts{display:flex;gap:8px;align-items:center}
.content{flex:1;overflow-y:auto;padding:20px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.st-c{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;align-items:center;gap:12px}
.st-c .ico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.st-c .ico.b{background:rgba(99,102,241,.15);color:var(--p)}.st-c .ico.g{background:rgba(16,185,129,.15);color:var(--s)}.st-c .ico.o{background:rgba(245,158,11,.15);color:var(--w)}.st-c .ico.r{background:rgba(239,68,68,.15);color:var(--d)}
.st-c h3{font-size:22px;margin:0}.st-c p{font-size:12px;color:var(--muted);margin:2px 0 0}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:16px;overflow:hidden}
.panel-h{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.panel-h h3{font-size:15px;font-weight:600}
.panel-b{padding:18px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;background:var(--input);color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid var(--border)}
tr:hover td{background:rgba(99,102,241,.05)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-s{background:rgba(16,185,129,.15);color:#065f46}.badge-w{background:rgba(245,158,11,.15);color:#92400e}.badge-d{background:rgba(239,68,68,.15);color:#991b1b}.badge-i{background:rgba(99,102,241,.15);color:#1e40af}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:.2s}
.btn-p{background:var(--p);color:#fff}.btn-p:hover{background:var(--pd)}
.btn-s{background:var(--s);color:#fff}.btn-d{background:var(--d);color:#fff}.btn-w{background:var(--w);color:#fff}
.btn-o{background:transparent;color:var(--muted);border:1px solid var(--border)}.btn-o:hover{background:var(--input);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:11px}
.form-group{margin-bottom:14px}
.form-group label{display:block;margin-bottom:4px;font-size:12px;font-weight:600;color:var(--muted)}
.fc{width:100%;padding:9px 12px;background:var(--input);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px}
.fc:focus{outline:none;border-color:var(--p);box-shadow:0 0 0 2px rgba(99,102,241,.2)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal.active{display:flex}
.mc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.mh{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;font-weight:600}
.mx{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px}
.mb{padding:18px}.mf{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.section{display:none}.section.active{display:block;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.toast-box{position:fixed;top:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:8px;color:#fff;font-size:13px;box-shadow:0 4px 10px rgba(0,0,0,.2);animation:slide .3s}
.toast.s{background:var(--s)}.toast.e{background:var(--d)}.toast.i{background:var(--p)}
@keyframes slide{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.tabs{display:flex;border-bottom:2px solid var(--border);margin-bottom:14px;overflow-x:auto}
.tab{padding:8px 14px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);white-space:nowrap}
.tab.active{border-bottom-color:var(--p);color:var(--p);font-weight:600}
.tc{display:none}.tc.active{display:block}
.log{height:120px;overflow-y:auto;background:var(--input);padding:10px;border-radius:8px;font-family:monospace;font-size:11px;line-height:1.4}
@media(max-width:768px){.sidebar{position:fixed;transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.menu-btn{display:flex!important}}
.menu-btn{display:none;position:fixed;top:12px;left:12px;z-index:110;background:var(--card);padding:8px;border-radius:8px;border:1px solid var(--border);color:var(--text)}
@media print{.sidebar,.topbar,.menu-btn,.btn,.toast-box{display:none!important}.main{margin:0!important}.content{padding:0!important}.panel{border:none!important;box-shadow:none!important}}
</style>
</head>
<body>
<button class="menu-btn" onclick="App.toggleMenu()">☰</button>
<aside class="sidebar" id="sidebar">
  <div class="logo">📦 <span>Фулфилмент</span> Про</div>
  <nav id="nav"></nav>
  <div class="foot">v13.0 • Stable<br><span id="clock"></span><br><span id="status" style="color:var(--p)">💾 Готово</span></div>
</aside>
<main class="main">
  <header class="topbar"><h1 id="pageTitle">Дашборд</h1>
    <div class="acts">
      <button class="btn btn-o btn-sm" data-action="exportJSON">💾 Экспорт</button>
      <label class="btn btn-o btn-sm" style="cursor:pointer">📂 Импорт<input type="file" id="impFile" style="display:none" accept=".json"></label>
      <button class="btn btn-o btn-sm" data-action="resetData">🗑️ Сброс</button>
    </div>
  </header>
  <div class="content" id="content">
    <div class="section active" id="sec-dashboard"></div>
    <div class="section" id="sec-warehouse"></div>
    <div class="section" id="sec-receiving"></div>
    <div class="section" id="sec-shipping"></div>
    <div class="section" id="sec-employees"></div>
    <div class="section" id="sec-timetracking"></div>
    <div class="section" id="sec-labels"></div>
    <div class="section" id="sec-badges"></div>
    <div class="section" id="sec-robot"></div>
    <div class="section" id="sec-integrations"></div>
    <div class="section" id="sec-rates"></div>
    <div class="section" id="sec-fines"></div>
    <div class="section" id="sec-avoidfines"></div>
    <div class="section" id="sec-timesheet"></div>
    <div class="section" id="sec-documents"></div>
    <div class="section" id="sec-chatbot"></div>
    <div class="section" id="sec-importexport"></div>
  </div>
</main>
<div class="toast-box" id="toasts"></div>

<!-- МОДАЛКИ -->
<div class="modal" id="mEmp"><div class="mc">
  <div class="mh"><span id="mEmpT">Сотрудник</span><button class="mx" onclick="App.closeModal('mEmp')">×</button></div>
  <div class="mb">
    <input type="hidden" id="eId">
    <div class="form-group"><label>ФИО *</label><input class="fc" id="eNm"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group"><label>Должность</label><select class="fc" id="ePos"><option>Сборщик</option><option>Администратор</option><option>Кладовщик</option><option>Грузчик</option></select></div>
      <div class="form-group"><label>Ставка ₽/ч</label><input type="number" class="fc" id="eRt" value="300"></div>
    </div>
  </div>
  <div class="mf"><button class="btn btn-o" onclick="App.closeModal('mEmp')">Отмена</button><button class="btn btn-p" onclick="App.saveEmp()">💾 Сохранить</button></div>
</div></div>

<div class="modal" id="mProd"><div class="mc">
  <div class="mh"><span id="mProdT">Товар</span><button class="mx" onclick="App.closeModal('mProd')">×</button></div>
  <div class="mb">
    <input type="hidden" id="pId">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group"><label>Артикул *</label><input class="fc" id="pSku"></div>
      <div class="form-group"><label>Штрихкод</label><input class="fc" id="pBar"></div>
    </div>
    <div class="form-group"><label>Название *</label><input class="fc" id="pNm"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <div class="form-group"><label>Категория</label><input class="fc" id="pCat"></div>
      <div class="form-group"><label>Место</label><input class="fc" id="pLoc"></div>
      <div class="form-group"><label>Срок годности</label><input type="date" class="fc" id="pExp"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <div class="form-group"><label>Кол-во</label><input type="number" class="fc" id="pQ" value="0"></div>
      <div class="form-group"><label>Вес (кг) *</label><input type="number" class="fc" id="pW" value="0" step="0.001"></div>
      <div class="form-group"><label>Цена</label><input type="number" class="fc" id="pPr" value="0"></div>
    </div>
  </div>
  <div class="mf"><button class="btn btn-o" onclick="App.closeModal('mProd')">Отмена</button><button class="btn btn-p" onclick="App.saveProd()">💾 Сохранить</button></div>
</div></div>

<div class="modal" id="mFine"><div class="mc">
  <div class="mh"><span>Назначить штраф</span><button class="mx" onclick="App.closeModal('mFine')">×</button></div>
  <div class="mb">
    <div class="form-group"><label>Сотрудник</label><select class="fc" id="fEmp"></select></div>
    <div class="form-group"><label>Причина</label><select class="fc" id="fReason" onchange="App.autoFineAmt()"><option value="">Выберите...</option><option value="Опоздание|500">Опоздание (500 ₽)</option><option value="Курение|1000">Курение (1000 ₽)</option><option value="Телефон|500">Телефон (500 ₽)</option><option value="Чистота|700">Чистота (700 ₽)</option><option value="Порча товара|2000">Порча товара (2000 ₽)</option><option value="Без спецодежды|1000">Без спецодежды (1000 ₽)</option><option value="Конфликт|2000">Конфликт (2000 ₽)</option><option value="Нарушение ТБ|3000">Нарушение ТБ (3000 ₽)</option></select></div>
    <div class="form-group"><label>Сумма (₽)</label><input type="number" class="fc" id="fAmt"></div>
    <div class="form-group"><label>Комментарий</label><textarea class="fc" id="fCom" rows="2"></textarea></div>
  </div>
  <div class="mf"><button class="btn btn-o" onclick="App.closeModal('mFine')">Отмена</button><button class="btn btn-d" onclick="App.applyFine()">⚠️ Назначить</button></div>
</div></div>

<script>
'use strict';
const App = {
  state: {
    employees: [], products: [], timeRecords: [], fines: [], receivings: [], shippings: [], apiKeys: [],
    nextEmpId: 1, nextProdId: 1, curSection: 'dashboard', robotInt: null, scanned: []
  },
  nav: [
    {id:'dashboard',t:'📊 Дашборд'},{id:'warehouse',t:'🏭 Склад'},{id:'receiving',t:'📥 Приёмка'},{id:'shipping',t:'📤 Отгрузка'},
    {id:'employees',t:'👥 Сотрудники'},{id:'timetracking',t:'⏱️ Учёт времени'},
    {sec:'Управление'},
    {id:'labels',t:'🏷️ Этикетки'},{id:'badges',t:'🪪 Бейджи & Смены'},{id:'robot',t:'🤖 Робот FBS/FBO'},{id:'integrations',t:'🔗 Интеграции'},
    {sec:'Финансы'},
    {id:'rates',t:'💰 Ставки'},{id:'fines',t:'⚠️ Штрафы'},{id:'avoidfines',t:'✅ Без штрафов'},{id:'timesheet',t:'📅 Табель'},
    {sec:'Система'},
    {id:'documents',t:'📄 Документы'},{id:'chatbot',t:'🤖 Бот'},{id:'importexport',t:'📥📤 Данные'}
  ],

  init() {
    try {
      this.load();
      this.renderNav();
      this.go('dashboard');
      setInterval(()=>{const c=document.getElementById('clock');if(c)c.textContent=new Date().toLocaleTimeString('ru-RU');},1000);
      document.addEventListener('click', e => {
        const btn = e.target.closest('[data-action]');
        if(btn && this[btn.dataset.action]) this[btn.dataset.action](btn.dataset.id);
      });
      document.getElementById('impFile')?.addEventListener('change', e => this.importFile(e));
      this.toast('✅ Система v13.0 загружена','s');
    } catch(err) {
      document.body.innerHTML = `<div style="padding:20px;background:#fee2e2;color:#991b1b;margin:20px;border-radius:8px">❌ Ошибка запуска: ${err.message}</div>`;
    }
  },

  // === ХРАНИЛИЩЕ ===
  load() {
    try {
      const d = localStorage.getItem('ff_state');
      if(d) Object.assign(this.state, JSON.parse(d));
    } catch(e) { console.warn('Load error', e); }
  },
  save() {
    try {
      localStorage.setItem('ff_state', JSON.stringify(this.state));
      const s = document.getElementById('status');
      if(s) { s.textContent='💾 Сохранено'; setTimeout(()=>s.textContent='💾 Готово',1500); }
    } catch(e) { this.toast('Ошибка сохранения','e'); }
  },

  // === НАВИГАЦИЯ ===
  renderNav() {
    const nav = document.getElementById('nav');
    if(!nav) return;
    nav.innerHTML = this.nav.map(n => n.sec ? `<div class="sec">${n.sec}</div>` : `<a data-sec="${n.id}">${n.t}</a>`).join('');
    nav.querySelectorAll('a').forEach(a => a.onclick = e => { e.preventDefault(); this.go(a.dataset.sec); });
  },
  go(id) {
    const sec = document.getElementById('sec-'+id);
    if(!sec) { this.toast('Раздел не найден: '+id,'i'); return; }
    this.state.curSection = id;
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    sec.classList.add('active');
    document.querySelectorAll('.sidebar a').forEach(a => a.classList.toggle('active', a.dataset.sec===id));
    document.getElementById('pageTitle').textContent = this.nav.find(n=>n.id===id)?.t || id;
    this.render(id);
    if(window.innerWidth<=768) document.getElementById('sidebar').classList.remove('open');
  },
  toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); },

  // === РЕНДЕРЫ ===
  render(id) {
    const c = document.getElementById('sec-'+id);
    if(!c) return;
    switch(id) {
      case 'dashboard': this.rDash(c); break;
      case 'warehouse': this.rWh(c); break;
      case 'receiving': this.rRec(c); break;
      case 'shipping': this.rShip(c); break;
      case 'employees': this.rEmp(c); break;
      case 'timetracking': this.rTT(c); break;
      case 'labels': this.rLbl(c); break;
      case 'badges': this.rBd(c); break;
      case 'robot': this.rRb(c); break;
      case 'integrations': this.rInt(c); break;
      case 'rates': this.rRates(c); break;
      case 'fines': this.rFines(c); break;
      case 'avoidfines': this.rAvoid(c); break;
      case 'timesheet': this.rTs(c); break;
      case 'documents': this.rDoc(c); break;
      case 'chatbot': this.rBot(c); break;
      case 'importexport': this.rIO(c); break;
    }
  },

  rDash(c) {
    const s = this.state, online = s.employees.filter(e => this.isOnline(e.id)).length;
    const hrs = s.timeRecords.filter(r => r.date.startsWith(this.curMonth()) && r.checkIn).reduce((a,r) => a + parseFloat(this.calcH(r.checkIn, r.checkOut||'23:59')), 0).toFixed(1);
    const fines = s.fines.filter(f => f.date.startsWith(this.curMonth())).length;
    c.innerHTML = `<div class="stats">
      <div class="st-c"><div class="ico b">👥</div><div><h3>${s.employees.length}</h3><p>Сотрудников</p></div></div>
      <div class="st-c"><div class="ico g">✅</div><div><h3>${online}</h3><p>На складе</p></div></div>
      <div class="st-c"><div class="ico o">⏱️</div><div><h3>${hrs}</h3><p>Часов за месяц</p></div></div>
      <div class="st-c"><div class="ico r">⚠️</div><div><h3>${fines}</h3><p>Штрафов</p></div></div>
    </div>
    <div class="panel"><div class="panel-h"><h3>📊 Сегодня</h3></div><div class="panel-b"><table><thead><tr><th>Сотрудник</th><th>Статус</th><th>Приход</th><th>Уход</th><th>Часы</th></tr></thead><tbody id="dEmp"></tbody></table></div></div>`;
    const tb = document.getElementById('dEmp');
    if(!tb) return;
    tb.innerHTML = s.employees.map(e => {
      const rec = this.todayRec(e.id);
      const h = rec.checkIn ? this.calcH(rec.checkIn, rec.checkOut||'23:59') : '0';
      return `<tr><td><strong>${this.esc(e.name)}</strong></td><td>${this.isOnline(e.id)?'<span class="badge badge-s">🟢 На складе</span>':'<span class="badge badge-d">⚫ Нет</span>'}</td><td>${rec.checkIn||'—'}</td><td>${rec.checkOut||'—'}</td><td><strong>${h} ч</strong></td></tr>`;
    }).join('');
  },

  rWh(c) {
    c.innerHTML = `<div class="panel"><div class="panel-h"><h3>🏭 Склад</h3><div style="display:flex;gap:8px"><button class="btn btn-p btn-sm" data-action="openProd">➕ Товар</button><button class="btn btn-o btn-sm" data-action="expWh">📥 Excel</button></div></div>
    <div class="panel-b"><input class="fc" id="whS" placeholder="Поиск..." oninput="App.fWh()"><div style="overflow-x:auto;margin-top:10px"><table><thead><tr><th>Артикул</th><th>Штрихкод</th><th>Название</th><th>Место</th><th>Кол-во</th><th>Вес</th><th>Цена</th><th>Годен</th><th>Действия</th></tr></thead><tbody id="whT"></tbody></table></div></div></div>`;
    this.fWh();
  },
  fWh() {
    const s = (document.getElementById('whS')?.value||'').toLowerCase();
    const tb = document.getElementById('whT'); if(!tb) return;
    tb.innerHTML = this.state.products.filter(p => (p.sku+p.bar+p.nm+p.loc).toLowerCase().includes(s)).map(p => {
      const exp = p.exp ? (new Date(p.exp)<new Date()?'<span style="color:var(--d)">Просрочен</span>':p.exp) : '—';
      return `<tr><td><strong>${this.esc(p.sku)}</strong></td><td>${this.esc(p.bar)}</td><td>${this.esc(p.nm)}</td><td>${this.esc(p.loc)}</td><td>${p.q}</td><td><strong>${p.w} кг</strong></td><td>${this.fmt(p.pr)}</td><td>${exp}</td><td><button class="btn btn-o btn-sm" data-action="openProd" data-id="${p.id}">✏️</button> <button class="btn btn-d btn-sm" data-action="delProd" data-id="${p.id}">🗑️</button></td></tr>`;
    }).join('') || '<tr><td colspan="9" style="text-align:center;color:var(--muted)">Нет товаров</td></tr>';
  },

  rRec(c) {
    c.innerHTML = `<div class="panel"><div class="panel-h"><h3>📥 Приёмка</h3><button class="btn btn-p btn-sm" data-action="openRec">➕</button></div><div class="panel-b"><table><thead><tr><th>№</th><th>Дата</th><th>Поставщик</th><th>Товар</th><th>Кол-во</th><th>Вес</th><th>Статус</th></tr></thead><tbody id="rT"></tbody></table></div></div>`;
    const tb = document.getElementById('rT'); if(!tb) return;
    tb.innerHTML = this.state.receivings.sort((a,b)=>b.id-a.id).map(r => {
      const p = this.state.products.find(x=>x.id===r.pid);

    const v = document.getElementById('lV'); if(!v) return;
    let h = '';
    for(let i=0;i<q;i++) h+=`<div style="border:1px solid #000;padding:8px;width:58mm;height:40mm;font-size:11px;display:inline-flex;flex-direction:column;justify-content:center;text-align:center;background:#fff;color:#000"><b>${this.esc(p.nm)}</b><div style="margin:2px 0">Арт: ${this.esc(p.sku)}</div><div style="font-family:monospace">||| ${this.esc(p.bar||p.sku)} |||</div><div style="font-size:10px;margin-top:2px">Вес: ${p.w} кг ${p.exp?'| Годен: '+p.exp:''}</div></div>`;
    v.innerHTML = h;
    const w = window.open('','_blank','width=600,height=500');
    if(!w) return this.toast('Разрешите всплывающие окна','e');
    w.document.write(`<html><head><title>Этикетки</title><style>body{margin:10px;font-family:Arial}@media print{body{margin:0}}</style></head><body>${h}</body></html>`);
    w.document.close(); setTimeout(()=>w.print(),500);

    const prev = document.getElementById('bPrev'); if(!prev) return;
    const e = this.state.employees.find(x=>x.id===eid);
    if(!e) { prev.innerHTML='Выберите сотрудника'; return; }
    const qr = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=EMP:${e.id}`;
    prev.innerHTML = `<div style="border:2px solid #000;padding:12px;width:120mm;height:76mm;margin:0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;color:#000"><b style="font-size:14px">${this.esc(e.name)}</b><span style="font-size:11px;color:#666">${e.role}</span><img src="${qr}" style="width:50mm;height:50mm;margin:8px 0" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><div style="display:none;font-family:monospace;font-size:20px;margin:8px 0">EMP:${e.id}</div><span style="font-size:8px;color:#888">ID: ${e.id}</span></div>`;
  },
  printBd() {
    const eid = +document.getElementById('bE')?.value;
    const e = this.state.employees.find(x=>x.id===eid); if(!e) return this.toast('Выберите сотрудника','e');
    const qr = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=EMP:${e.id}`;
    const w = window.open('','_blank','width=400,height=500');
    if(!w) return this.toast('Разрешите всплывающие окна','e');
    w.document.write(`<html><head><title>Бейдж</title><style>body{margin:0;display:flex;align-items:center;justify-content:center;height:100vh;background:#f5f5f5}.bd{border:2px solid #000;padding:12px;width:120mm;height:76mm;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;text-align:center}.nm{font-size:14px;font-weight:bold}.rl{font-size:11px;color:#666;margin-bottom:6px}.qr{width:50mm;height:50mm;margin:6px 0}.id{font-size:8px;color:#888;margin-top:4px}@media print{body{background:#fff}.bd{border:2px solid #000}}</style></head><body><div class="bd"><div class="nm">${this.esc(e.name)}</div><div class="rl">${e.role}</div><img src="${qr}" class="qr" onerror="this.style.display='none';this.nextElementSibling.style.display='block'"><div style="display:none;font-family:monospace;font-size:20px;margin:6px 0">EMP:${e.id}</div><div class="id">ID: ${e.id}</div></div><script>setTimeout(()=>window.print(),600)<\/script></body></html>`);
    w.document.close();
  },
  logShift() {
    const val = document.getElementById('bScan')?.value.trim();
    if(!val||!val.startsWith('EMP:')) return this.toast('Неверный QR','e');
    const eid = +val.split('|')[0].replace('EMP:','');
    const e = this.state.employees.find(x=>x.id===eid);
    if(!e) return this.toast('Сотрудник не найден','e');
    const rec = this.todayRec(eid);
    if(!rec.checkIn) { rec.checkIn=this.timeNow(); this.toast('🟢 Смена начата: '+e.name,'s'); }
    else if(!rec.checkOut) { rec.checkOut=this.timeNow(); this.toast('🔴 Смена завершена: '+e.name+' ('+this.calcH(rec.checkIn,rec.checkOut)+' ч)','s'); }
    else return this.toast('Смена уже закрыта','i');
    document.getElementById('bScan').value='';
    this.save(); this.render('dashboard');
    const log = document.getElementById('bLog'); if(log) log.innerHTML = `<div style="padding:6px 0;border-bottom:1px solid var(--border)">${e.name}: ${rec.checkIn} → ${rec.checkOut||'...'}</div>` + (log.innerHTML||'');
  },

  togRb() {
    if(this.state.robotInt) { clearInterval(this.state.robotInt); this.state.robotInt=null; document.getElementById('rbL').innerHTML+='⏹ Остановлен<br>'; return; }
    let q=5,w=0,d=0;
    document.getElementById('rbL').innerHTML='🤖 Запущен<br>';
    this.state.robotInt = setInterval(()=>{
      if(q>0&&Math.random()>.5){q--;w++;document.getElementById('rbL').innerHTML+=`📦 Задача #${Math.random().toString(36).slice(2,6)}<br>`;}
      if(w>0&&Math.random()>.4){w--;d++;document.getElementById('rbL').innerHTML+=`✅ Готово<br>`;}
      document.getElementById('rbQ').textContent=q; document.getElementById('rbW').textContent=w; document.getElementById('rbD').textContent=d;
      document.getElementById('rbL').scrollTop=9999;
      if(q===0&&w===0){clearInterval(this.state.robotInt);this.state.robotInt=null;document.getElementById('rbL').innerHTML+='🏁 Очередь пуста<br>';}
    },1200);
  },

  sync1c() { const l=document.getElementById('l1c'); if(l){l.innerHTML+='▶️ Запрос...<br>';setTimeout(()=>{l.innerHTML+='✅ Успешно<br>';l.scrollTop=9999;},1000);} },
  syncdd() { const l=document.getElementById('ldd'); if(l){l.innerHTML+='📤 Отправка...<br>';setTimeout(()=>{l.innerHTML+='✅ Акт подписан<br>';l.scrollTop=9999;},1000);} },
  syncwms() { const l=document.getElementById('lwms'); if(l){l.innerHTML+='📡 Синхронизация...<br>';setTimeout(()=>{l.innerHTML+='✅ Остатки обновлены<br>';l.scrollTop=9999;},1000);} },

  openFine() { this.populateSelects(); document.getElementById('fReason').value=''; document.getElementById('fAmt').value=''; document.getElementById('fCom').value=''; this.openModal('mFine'); },
  autoFineAmt() { const v=document.getElementById('fReason').value; if(v) document.getElementById('fAmt').value=v.split('|')[1]; },
  applyFine() {
    const eid=+document.getElementById('fEmp').value, rsn=document.getElementById('fReason').value.split('|')[0], am=+document.getElementById('fAmt').value, com=document.getElementById('fCom').value.trim();
    if(!eid||!am) return this.toast('Заполните поля','e');
    this.state.fines.push({date:this.today(),eid,rsn,am,com,st:'Активен'});
    this.closeModal('mFine'); this.save(); this.render(this.state.curSection); this.toast('Штраф назначен','w');
  },

  updRate(id,v) { const e=this.state.employees.find(x=>x.id==id); if(e)e.rate=+v||300; },
  saveRates() { this.save(); this.toast('Ставки сохранены','s'); },

  renderTs() {
    const m=document.getElementById('tsM')?.value, eid=document.getElementById('tsE')?.value;
    const tb=document.getElementById('tsT'); if(!tb||!m) return;
    const [y,mo]=m.split('-').map(Number), days=new Date(y,mo,0).getDate();
    let total=0; tb.innerHTML='';
    for(let d=1;d<=days;d++){
      const ds=m+'-'+String(d).padStart(2,'0'), dt=new Date(y,mo-1,d);
      let recs=this.state.timeRecords.filter(r=>r.date===ds);
      if(eid!=='all') recs=recs.filter(r=>r.eid==eid);
      if(!recs.length) continue;
      let h=0, pay=0, fn=0;
      recs.forEach(r=>{if(r.checkIn){const hrs=parseFloat(this.calcH(r.checkIn,r.checkOut||'23:59'));h+=hrs;const emp=this.state.employees.find(x=>x.id==r.eid);if(emp)pay+=hrs*emp.rate;}});
      this.state.fines.filter(f=>f.date===ds&&(eid==='all'||f.eid==eid)).forEach(f=>fn+=f.am);
      total+=pay-fn;
      tb.innerHTML+=`<tr><td>${ds}</td><td>${dt.toLocaleDateString('ru-RU',{weekday:'short'})}</td><td>${recs.map(r=>r.checkIn||'—').join(', ')}</td><td>${recs.map(r=>r.checkOut||'—').join(', ')}</td><td><strong>${h.toFixed(1)} ч</strong></td><td style="color:var(--s)">${this.fmt(Math.round(pay))}</td><td style="color:var(--d)">${fn?'-'+this.fmt(fn):'—'}</td></tr>`;
    }
    document.getElementById('tsNet').textContent = this.fmt(Math.round(total));
  },

  swTab(id,btn) {
    btn.parentElement.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active');
    btn.parentElement.parentElement.querySelectorAll('.tc').forEach(c=>c.classList.remove('active'));
    const tc = document.getElementById('tab-'+id); if(tc) tc.classList.add('active');
  },

  sendBot() {
    const inp=document.getElementById('botIn'), msg=inp?.value.trim(); if(!msg) return;
    this.addBot(msg,1); inp.value='';
    setTimeout(()=>{
      const m=msg.toLowerCase();
      let r='🤖 Не понял. Спросите о штрафах, ставках, товарах или бейджах.';
      if(m.includes('штраф')) r='⚠️ Штрафы: Опоздание 500₽, Курение 1000₽, Телефон 500₽, Чистота 700₽, Порча 2000₽, ТБ 3000₽.';
      else if(m.includes('ставка')) r='💰 Ставки настраиваются в разделе "Ставки". Расчёт: часы × ставка − штрафы.';
      else if(m.includes('бейдж')||m.includes('смен')) r='🪪 Бейджи: раздел "Бейджи" → печать 120×76мм. Сканируйте QR для фиксации смены.';
      else if(m.includes('товар')||m.includes('склад')) r='📦 Склад: добавляйте товары с артикулом, весом и сроком. Приёмка/отгрузка меняют остатки автоматически.';
      else if(m.includes('привет')) r='👋 Привет! Чем помочь?';
      this.addBot(r,0);
    },500);
  },
  addBot(t,u) {
    const c=document.getElementById('botMsgs'); if(!c) return;
    const d=document.createElement('div'); d.style.cssText=`max-width:85%;padding:8px 12px;border-radius:10px;font-size:13px;align-self:${u?'flex-end':'flex-start'};background:${u?'var(--p);color:#fff':'var(--input)'}`;
    d.textContent=t; c.appendChild(d); c.scrollTop=9999;
  },

  exportJSON() {
    const b=new Blob([JSON.stringify(this.state,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='backup_'+this.today()+'.json'; a.click();
    this.toast('Экспорт готов','s');
  },
  expWh() {
    let c='\uFEFFАртикул;Штрихкод;Название;Место;Кол-во;Вес;Цена;Срок\n';
    this.state.products.forEach(p=>c+=`${p.sku};${p.bar};${p.nm};${p.loc};${p.q};${p.w};${p.pr};${p.exp}\n`);
    const b=new Blob([c],{type:'text/csv;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='warehouse.csv'; a.click();
    this.toast('CSV скачан','s');
  },
  importFile(e) {
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(!d.employees&&!d.products) return this.toast('Неверный формат','e');
        if(!confirm('Заменить все данные?')) return;
        Object.assign(this.state, d); this.save(); this.render(this.state.curSection);
        this.toast('Импорт успешен','s');
        const st=document.getElementById('ioStatus'); if(st) st.innerHTML='<span style="color:var(--s)">✅ Данные восстановлены</span>';
      }catch(err){this.toast('Ошибка: '+err.message,'e');}
    }; r.readAsText(f); e.target.value='';
  },
  resetData() {
    if(!confirm('Удалить ВСЕ данные?')) return;
    this.state={employees:[],products:[],timeRecords:[],fines:[],receivings:[],shippings:[],apiKeys:[],nextEmpId:1,nextProdId:1,curSection:'dashboard',robotInt:null,scanned:[]};
    this.save(); this.render('dashboard'); this.toast('Данные очищены','i');
  },

  // === УТИЛИТЫ ===
  openModal(id) { const m=document.getElementById(id); if(m) m.classList.add('active'); },
  closeModal(id) { const m=document.getElementById(id); if(m) m.classList.remove('active'); },
  toast(m,t='i') { const c=document.getElementById('toasts'); if(!c) return; const d=document.createElement('div'); d.className='toast '+t; d.textContent=m; c.appendChild(d); setTimeout(()=>d.remove(),3000); },
  esc(s) { const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; },
  fmt(n) { return Number(n||0).toLocaleString('ru-RU')+' ₽'; },
  now() { return new Date().toLocaleString('ru-RU'); },
  today() { return new Date().toISOString().slice(0,10); },
  timeNow() { const n=new Date(); return String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0'); },
  curMonth() { const n=new Date(); return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0'); },
  calcH(ci,co) { const [h1,m1]=ci.split(':').map(Number),[h2,m2]=co.split(':').map(Number); let d=(h2*60+m2)-(h1*60+m1); if(d<0)d+=1440; return (d/60).toFixed(1); },
  getEmp(id) { const e=this.state.employees.find(x=>x.id==id); return e?e.name:'—'; },
  isOnline(id) { const r=this.todayRec(id); return r.checkIn&&!r.checkOut; },
  todayRec(id) { const t=this.today(); let r=this.state.timeRecords.find(x=>x.eid==id&&x.date===t); if(!r){r={date:t,eid:id,checkIn:null,checkOut:null};this.state.timeRecords.push(r);} return r; },
  populateSelects() {
    const opts = this.state.employees.map(e=>`<option value="${e.id}">${this.esc(e.name)}</option>`).join('');
    ['ttE','fEmp','bE','tsE'].forEach(id=>{const s=document.getElementById(id);if(s){const v=s.value;s.innerHTML='<option value="all">Все</option>'+opts;s.value=v||s.options[0].value;}});
  }
};

document.addEventListener('DOMContentLoaded', ()=>App.init());
</script>
</body>
</html>
