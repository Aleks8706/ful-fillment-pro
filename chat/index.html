<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Чат</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
        }
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            background: white;
            border-radius: 10px;
            max-width: 80%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.other { align-self: flex-start; }
        .message.self { align-self: flex-end; background: #667eea; color: white; }
        
        /* Стили для системных сообщений */
        .message.system {
            align-self: center;
            background: rgba(0,0,0,0.05);
            color: #666;
            text-align: center;
            max-width: 90%;
            font-size: 14px;
            font-style: italic;
            box-shadow: none;
        }
        .message.system .message-name { display: none; }
        .message.system .message-time { color: #999; margin-top: 4px; }

        .message-name { font-weight: bold; margin-bottom: 5px; font-size: 14px; color: #667eea; }
        .message.self .message-name { color: rgba(255,255,255,0.9); }
        .message-text { font-size: 16px; line-height: 1.4; word-wrap: break-word; }
        .message-time { font-size: 12px; color: #999; margin-top: 5px; text-align: right; }
        .message.self .message-time { color: rgba(255,255,255,0.7); }
        
        .chat-input {
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        .chat-input input {
            flex: 1;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        .chat-input input:focus { border-color: #667eea; }
        .chat-input button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .chat-input button:hover { transform: scale(1.05); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .chat-input button:active { transform: scale(0.98); }
        
        .user-name-input {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .user-name-form {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
        }
        .user-name-form h2 { margin-bottom: 20px; color: #333; }
        .user-name-form input {
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
            width: 100%;
            outline: none;
            transition: border-color 0.3s;
        }
        .user-name-form input:focus { border-color: #667eea; }
        .user-name-form button {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        .user-name-form button:hover { transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="user-name-input" id="userNameInput">
        <div class="user-name-form">
            <h2>👋 Привет!</h2>
            <p style="margin-bottom: 20px; color: #666;">Введите ваше имя, чтобы начать общение</p>
            <input type="text" id="name" placeholder="Ваше имя" maxlength="30">
            <button onclick="joinChat()">Войти в чат</button>
        </div>
    </div>

    <div class="chat-container" id="chatContainer" style="display: none;">
        <div class="chat-header">🚀 Мой Чат</div>
        <div class="chat-messages" id="chatMessages">
            <!-- Сообщения будут добавляться сюда -->
        </div>
        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Введите сообщение..." maxlength="500">
            <button onclick="sendMessage()">Отправить</button>
        </div
    </div>

    <script>
        let userName = "";
        let clientId = Math.random().toString(36).substr(2, 9);
        
        // Проверяем, есть ли сохраненное имя в localStorage
        window.onload = function() {
            const savedName = localStorage.getItem("chatUserName");
            if (savedName) {
                userName = savedName;
                document.getElementById("userNameInput").style.display = "none";
                document.getElementById("chatContainer").style.display = "flex";
                addMessage({clientId: "system", name: "Система", text: `С возвращением, ${userName}! 👋`});
            } else {
                document.getElementById("name").focus();
            }
        };
        
        function joinChat() {
            const nameInput = document.getElementById("name");
            userName = nameInput.value.trim();
            
            if (!userName) { 
                alert("Пожалуйста, введите ваше имя!"); 
                return; 
            }
            
            // Сохраняем имя для будущих посещений
            localStorage.setItem("chatUserName", userName);
            
            document.getElementById("userNameInput").style.display = "none";
            document.getElementById("chatContainer").style.display = "flex";
            
            // Используем специальный clientId "system", чтобы сообщение не считалось "своим"
            addMessage({clientId: "system", name: "Система", text: `${userName} присоединился к чату! 🎉`});
        }
        
        function sendMessage() {
            const input = document.getElementById("messageInput");
            const text = input.value.trim();
            if (!text) return;
            
            addMessage({clientId: clientId, name: userName, text: text});
            input.value = "";
            input.focus();
        }
        
        function addMessage(data) {
            const messagesDiv = document.getElementById("chatMessages");
            
            // Определяем тип сообщения для стилизации
            const isSystem = data.clientId === "system";
            const isSelf = !isSystem && data.clientId === clientId;
            
            const messageDiv = document.createElement("div");
            messageDiv.className = "message " + (isSystem ? "system" : (isSelf ? "self" : "other"));
            
            // Создаем элементы через DOM API для защиты от XSS-атак
            const nameDiv = document.createElement("div");
            nameDiv.className = "message-name";
            nameDiv.textContent = data.name;
            
            const textDiv = document.createElement("div");
            textDiv.className = "message-text";
            textDiv.textContent = data.text; // textContent автоматически экранирует HTML
            
            const timeDiv = document.createElement("div");
            timeDiv.className = "message-time";
            timeDiv.textContent = new Date().toLocaleTimeString("ru-RU", {hour: "2-digit", minute: "2-digit"});
            
            // Собираем сообщение
            if (!isSystem) {
                messageDiv.appendChild(nameDiv);
            }
            messageDiv.appendChild(textDiv);
            messageDiv.appendChild(timeDiv);
            
            messagesDiv.appendChild(messageDiv);
            
            // Плавная прокрутка вниз
            messagesDiv.scrollTo({
                top: messagesDiv.scrollHeight,
                behavior: "smooth"
            });
        }
        
        // Обработка нажатия Enter в поле ввода
        document.getElementById("messageInput").addEventListener("keypress", function(e) { 
            if (e.key === "Enter") sendMessage(); 
        });
        document.getElementById("name").addEventListener("keypress", function(e) { 
            if (e.key === "Enter") joinChat(); 
        });
    </script>
</body>
</html>
